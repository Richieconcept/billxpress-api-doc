        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: BillXpress Backend API\nconfig:\n  environments:\n    - name: Billxpress copy\n      variables:\n        - name: baseUrl\n          value: https://billxpressbackend-production.up.railway.app\n        - name: vendorApiKey\n          value: paste-vendor-api-key-here\n        - name: adminSetupSecret\n          value: change-me\n        - name: pocketfiSignature\n          value: generated-hmac-signature\n        - name: monnifySignature\n          value: generated-hmac-signature\n        - name: walletAmount\n          value: '1000'\n        - name: fundingIntentId\n          value: paste-funding-intent-id-here\n        - name: notificationId\n          value: paste-notification-id-here\n        - name: userId\n          value: paste-user-id-here\n        - name: registeredEmail\n          value: user@example.com\n        - name: emailOtp\n          value: '12345'\nitems:\n  - info:\n      name: Health Check\n      type: http\n      seq: 1\n    http:\n      method: GET\n      url: '{{baseUrl}}/api/v1/health'\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: |-\n      # Health Check\n\n      Use this request first. It confirms the BillXpress backend is online before you test auth, wallet, or funding endpoints.\n\n      ## Base URL Used By This Request\n\n      ```txt\n      {{baseUrl}}\n      ```\n\n      Production base URL:\n\n      ```txt\n      https://billxpressbackend-production.up.railway.app\n      ```\n\n      Full production health URL:\n\n      ```txt\n      https://billxpressbackend-production.up.railway.app/api/v1/health\n      ```\n\n      ## Endpoint\n\n      `GET /api/v1/health`\n\n      ## Expected Success Response\n\n      Status: `200 OK`\n\n      Body:\n\n      ```json\n      {\n        \"status\": \"ok\",\n        \"message\": \"BillXpress API is running\",\n        \"service\": \"billxpress-backend\",\n        \"environment\": \"production\",\n        \"timestamp\": \"2026-06-02T12:00:00.000Z\"\n      }\n      ```\n\n      ## Common Issues\n\n      If this fails on production, check Railway deployment logs and required environment variables.\n\n      If this fails locally, start the backend:\n\n      ```txt\n      npm run dev\n      ```\n\n      Then make sure the `Local` environment uses:\n\n      ```txt\n      http://localhost:5000\n      ```\n  - info:\n      name: Auth\n      type: folder\n      seq: 1\n    docs:\n      content: |-\n        # Auth Endpoints\n\n        These endpoints handle tier 1 registration, password login, JWT access tokens, refresh sessions, admin role management, admin vendor approval, optional email OTP verification, API-key auth, and fetching the logged-in user's profile.\n\n        ## Current Auth Flow\n\n        1. Frontend shows registration as 3 UI steps.\n        2. Frontend sends one final `Register User` request when the user taps `Create Account`.\n        3. Backend creates the account as `authTier: \"tier_1\"`.\n        4. Registration does not send an email OTP and does not require email verification.\n        5. User can login after registration.\n        6. Frontend stores the returned `accessToken` and `refreshToken`.\n        7. Frontend sends the access token as `Bearer {{authToken}}` for protected endpoints.\n        8. Mobile PIN/biometric unlock happens locally on the phone.\n        9. After local unlock, frontend calls `Refresh Mobile Session` to get a fresh access token.\n\n        ## Mobile And Web Session Standard\n\n        The backend does not receive fingerprint, Face ID, or local app-unlock PIN data.\n\n        Standard flow for mobile, iOS, and web:\n\n        1. User logs in once with password using `Login User`.\n        2. Backend returns `accessToken` and `refreshToken`.\n        3. App stores the refresh token securely.\n        4. Mobile/iOS can ask for PIN or biometric locally before unlocking the saved session.\n        5. If local unlock succeeds, the app calls:\n\n        ```txt\n        POST /api/v1/auth/refresh-session\n        ```\n\n        6. Backend returns a new `accessToken` and a rotated `refreshToken`.\n\n        The frontend should save the new refresh token every time it calls refresh session.\n\n        If refresh fails with `401`, send the user back to password login.\n\n        There is no backend PIN-login endpoint. PIN and biometric unlock are frontend/device security. The backend only accepts JWT access tokens and refresh tokens.\n\n        `transactionPin` is still used for sensitive wallet actions, such as redeeming referral balance or future payments/transfers.\n\n        ## Admin Role Management\n\n        Admin-only routes use:\n\n        ```js\n        protect, authorizeRoles(\"admin\")\n        ```\n\n        Available admin role actions:\n\n        ```txt\n        PATCH /api/v1/admin/bootstrap-admin/:userId\n        GET /api/v1/admin/admins\n        PATCH /api/v1/admin/make-admin/:userId\n        PATCH /api/v1/admin/remove-admin/:userId\n        ```\n\n        `bootstrap-admin` creates the first admin from an existing active user. It requires `X-Admin-Setup-Secret`, only works when `ADMIN_SETUP_SECRET` is configured, and stops working after an active admin exists.\n\n        `make-admin` upgrades an active existing user to `role: \"admin\"`.\n\n        `remove-admin` changes another admin back to `role: \"user\"`. The backend prevents an admin from removing their own admin role and prevents removing the last active admin.\n\n        ## Vendor Approval\n\n        Users cannot self-register as vendors. Every user registers normally first.\n\n        An admin upgrades a user with:\n\n        ```txt\n        PATCH /api/v1/admin/make-vendor/:userId\n        ```\n\n        This route requires:\n\n        ```js\n        protect, authorizeRoles(\"admin\")\n        ```\n\n        When approved, the backend sets:\n\n        ```json\n        {\n          \"role\": \"vendor\",\n          \"discountRate\": 0.2,\n          \"isVendorActive\": true,\n          \"vendorApprovedAt\": \"current-date\"\n        }\n        ```\n\n        The backend also generates and returns an `apiKey` using the existing `generateApiKey` utility.\n\n        Use `Admin Make Vendor` in this Bruno folder to test vendor approval.\n\n        ## Vendor API Key Auth\n\n        Normal protected routes use JWT auth:\n\n        ```txt\n        Authorization: Bearer {{authToken}}\n        ```\n\n        Vendor API-key requests send the key directly:\n\n        ```txt\n        Authorization: {{vendorApiKey}}\n        ```\n\n        Do not prefix vendor API keys with `Bearer`.\n\n        API-key auth succeeds only for users where:\n\n        ```json\n        {\n          \"role\": \"vendor\",\n          \"isVendorActive\": true\n        }\n        ```\n\n        Use `Vendor API Key Auth` to test the API-key path against `/api/v1/auth/me`.\n\n        ## Registration UI Steps\n\n        Step 1:\n\n        - first name\n        - last name\n        - username\n        - phone\n        - email\n        - referral code\n\n        Step 2:\n\n        - password\n        - confirm password\n\n        Step 3:\n\n        - transaction PIN\n\n        The frontend handles these 3 screens locally. The backend receives only one final registration request.\n\n        ## Auth Tier\n\n        New users start at:\n\n        ```json\n        {\n          \"authTier\": \"tier_1\",\n          \"emailVerified\": false,\n          \"kycLevel\": 0\n        }\n        ```\n\n        Future BVN/KYC upgrades can move the user to `tier_2` or `tier_3`.\n\n        ## Login Identifier\n\n        The login field is called `identifier`. It can be any one of:\n\n        - email\n        - username\n        - phone number\n\n        ## Tier Rule\n\n        Do not block login because email is not verified. Later dollar card, betting, wallet limits, bill payment, transfer, and vendor actions can require a higher product tier.\n\n        Backend middleware is available for those future routes:\n\n        ```js\n        protect, requireAuthTier(\"tier_2\")\n        ```\n\n        `requireVerifiedEmail` is still available for routes that specifically need a verified email address.\n\n        Vendor-only routes can use:\n\n        ```js\n        protect, requireVendor\n        ```\n\n        Admin-only routes can also use:\n\n        ```js\n        protect, requireAuthTier(\"tier_2\"), authorizeRoles(\"admin\")\n        ```\n\n        ## Auth Rate Limits\n\n        The auth routes currently apply these API-level limits:\n\n        - Register: 5 attempts per 15 minutes per IP/user details\n        - Login: 10 attempts per 15 minutes per IP/identifier\n        - Forgot Password: 3 code requests per 10 minutes per IP/email\n        - Reset Password: 5 attempts per 10 minutes per IP/email\n        - Verify OTP: 5 attempts per 10 minutes per IP/email\n        - Resend OTP: 3 attempts per 10 minutes per IP/email\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Register User\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/register'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"test\",\n                \"lastName\": \"user\",\n                \"username\": \"testuser\",\n                \"email\": \"{{registeredEmail}}\",\n                \"phone\": \"08125128766\",\n                \"password\": \"Password123\",\n                \"confirmPassword\": \"Password123\",\n                \"transactionPin\": \"1234\",\n                \"referredBy\": \"\"\n              }\n        runtime:\n          variables:\n            - name: registeredEmail\n              value: richardben365@gmail.com\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Register User\n\n          Creates a new BillXpress user account at `tier_1`.\n\n          Tier 1 registration does not require email verification and does not send an email OTP.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/register`\n\n          ## Body Fields\n\n          `firstName`\n          Required. The user's first name. Some downstream services require this.\n\n          `lastName`\n          Required. The user's last name. Some downstream services require this.\n\n          `username`\n          The user's unique username. It is saved in lowercase.\n\n          `email`\n          The user's email address. This must be real if you want to receive the verification email.\n          In the frontend, keep this email in registration state/client storage after the request succeeds.\n\n          `phone`\n          The user's phone number. It must be unique, 11 digits, and start with `0`.\n\n          `password`\n          Minimum 5 characters.\n\n          `confirmPassword`\n          Must match `password`.\n\n          `transactionPin`\n          Exactly 4 digits. This will be used later for wallet and bill payment actions.\n\n          `referredBy`\n          Optional. Use another user's referral code if available. Leave empty if there is no referral.\n\n          Example with referral:\n\n          ```json\n          {\n            \"referredBy\": \"IMO5751\"\n          }\n          ```\n\n          The user who owns `IMO5751` does not earn immediately on registration. They earn only when this new user makes their first successful wallet funding.\n\n          ## Frontend 3-Step UI\n\n          The frontend should collect registration details in 3 screens, but send only one final request to this endpoint.\n\n          Step 1:\n\n          - first name\n          - last name\n          - username\n          - phone\n          - email\n          - referral code\n\n          Step 2:\n\n          - password\n          - confirm password\n\n          Step 3:\n\n          - transaction PIN\n\n          ## Expected Success Response\n\n          Status: `201 Created`\n\n          ```json\n          {\n            \"message\": \"Account created successfully\",\n            \"requiresVerification\": false,\n            \"virtualAccount\": {\n              \"id\": \"...\",\n              \"provider\": \"pocketfi\",\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (BillXpress)\",\n              \"status\": \"active\",\n              \"createdAt\": \"...\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (BillXpress)\"\n                },\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"kuda\",\n                  \"accountNumber\": \"1234567890\",\n                  \"accountName\": \"Test User (BillXpress)\"\n                }\n              ],\n              \"feePolicy\": {\n                \"paidBy\": \"platform\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              }\n            },\n            \"virtualAccounts\": [\n              {\n                \"provider\": \"pocketfi\",\n                \"bankName\": \"paga\",\n                \"accountNumber\": \"0742053373\",\n                \"accountName\": \"Test User (BillXpress)\"\n              },\n              {\n                \"provider\": \"pocketfi\",\n                \"bankName\": \"kuda\",\n                \"accountNumber\": \"1234567890\",\n                \"accountName\": \"Test User (BillXpress)\"\n              }\n            ],\n            \"virtualAccountCreated\": true,\n            \"virtualAccountError\": null,\n            \"virtualAccountErrors\": [],\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"referralCode\": \"TES1234\",\n              \"referredBy\": null,\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0,\n              \"createdAt\": \"...\"\n            }\n          }\n          ```\n\n          Users always register as normal users. Vendors must be approved later by an admin using `PATCH /api/v1/admin/make-vendor/:userId`.\n\n          After registration succeeds, the user can continue to login. The backend also attempts to create the user's Paga and Kuda funding accounts immediately.\n\n          If `virtualAccount` is `null`, registration still worked. The frontend can later call `Create Virtual Account` from the wallet screen.\n\n          If only one account is returned, show that account and continue.\n\n          ## Referral Note For Frontend\n\n          If the app has a referral input field, send the value as `referredBy`.\n\n          Do not calculate referral reward on the frontend. The backend automatically credits the referrer after the new user's first successful funding.\n      - info:\n          name: 10. Admin Make Vendor\n          type: http\n          seq: 9\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/make-vendor/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMSIsImlhdCI6MTc4MTE3ODM2MCwiZXhwIjoxNzgxNzgzMTYwfQ.JEilhWekd5vtHnOqr-D1mlWnafRHundm00ekDXi5-Rc\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Make Vendor\n\n          Upgrades an existing normal user into a vendor.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/make-vendor/:userId`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          The authenticated user must have:\n\n          ```json\n          {\n            \"role\": \"admin\"\n          }\n          ```\n\n          ## Important\n\n          Users cannot self-register as vendors. Every user registers normally first, then an admin approves the vendor upgrade.\n\n          When approved, the backend sets:\n\n          ```json\n          {\n            \"role\": \"vendor\",\n            \"discountRate\": 0.2,\n            \"isVendorActive\": true,\n            \"vendorApprovedAt\": \"current-date\"\n          }\n          ```\n\n          The backend also generates and returns a unique `apiKey`.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"User upgraded to vendor successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"role\": \"vendor\",\n              \"authTier\": \"tier_1\",\n              \"discountRate\": 0.2,\n              \"isVendorActive\": true,\n              \"vendorApprovedAt\": \"...\"\n            },\n            \"apiKey\": \"generated-api-key\"\n          }\n          ```\n\n          Copy the returned `apiKey` into the Bruno `vendorApiKey` environment variable to test vendor API-key auth.\n      - info:\n          name: 11. Vendor API Key Auth\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/auth/me'\n          headers:\n            - name: Authorization\n              value: '{{vendorApiKey}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Vendor API Key Auth\n\n          Tests vendor authentication using an API key instead of a JWT token.\n\n          ## Endpoint\n\n          `GET /api/v1/auth/me`\n\n          For the vendor-only test endpoint, use:\n\n          ```txt\n          GET /api/v1/test/vendor\n          ```\n\n          ## Authentication\n\n          Send the vendor API key directly in the `Authorization` header:\n\n          ```txt\n          Authorization: {{vendorApiKey}}\n          ```\n\n          Do not prefix vendor API keys with `Bearer`.\n\n          Create the vendor API key through `Admin Make Vendor`; users cannot create vendor accounts during registration.\n\n          `Bearer` is reserved for JWT auth:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Required Vendor State\n\n          API-key auth succeeds only when the matching user has:\n\n          ```json\n          {\n            \"role\": \"vendor\",\n            \"isVendorActive\": true\n          }\n          ```\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"Vendor\",\n              \"username\": \"testvendor\",\n              \"email\": \"vendor@example.com\",\n              \"phone\": \"08087654321\",\n              \"role\": \"vendor\",\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0\n            }\n          }\n          ```\n\n          ## Common Errors\n\n          Missing or invalid API key:\n\n          ```json\n          {\n            \"message\": \"Invalid vendor API key\"\n          }\n          ```\n\n          If the API key belongs to a non-vendor user or an inactive vendor, the request also returns `401`.\n      - info:\n          name: 2. Verify Email OTP\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/verify-email-otp'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{registeredEmail}}\",\n                \"otp\": \"{{emailOtp}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Verify Email OTP\n\n          Verifies a user's email address using a 5-digit OTP.\n\n          Tier 1 registration does not send an OTP automatically. Use `Resend Email OTP` first if you want to run this optional email-verification flow.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/verify-email-otp`\n\n          ## Body Fields\n\n          `email`  \n          The email address used during registration. Prefer the logged-in user's email from `/me`.\n\n          `otp`  \n          The 5-digit code sent to the user's email.\n\n          ## Frontend Email Handling\n\n          If the user is logged in, use the current user's email:\n\n          ```js\n          const email = currentUser.email;\n\n          await api.post(\"/api/v1/auth/verify-email-otp\", {\n            email,\n            otp,\n          });\n          ```\n\n          The user should only type the OTP. They should not be asked to type their email again.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Email verified successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"isActive\": true,\n              \"emailVerified\": true,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 1\n            }\n          }\n          ```\n\n          ## What Backend Does\n\n          If the OTP is correct and not expired:\n\n          - sets `emailVerified` to `true`\n          - sets `kycLevel` to `1`\n          - clears the OTP from the account\n\n          ## Common Errors\n\n          Wrong or expired OTP:\n\n          ```json\n          {\n            \"message\": \"OTP is invalid or has expired\"\n          }\n          ```\n\n          Already verified:\n\n          ```json\n          {\n            \"message\": \"Email is already verified\"\n          }\n          ```\n\n          OTP codes expire after 10 minutes.\n      - info:\n          name: 3. Resend Email OTP\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/resend-email-otp'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{registeredEmail}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Resend Email OTP\n\n          Sends a fresh 5-digit email verification code to a user who has not verified their email yet.\n\n          Tier 1 registration does not send this automatically. Call this only when the app intentionally starts the optional/future email verification flow.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/resend-email-otp`\n\n          ## When To Use This\n\n          Use this if:\n\n          - the app starts an optional email verification flow\n          - the previous OTP expired\n          - the user requests another verification code\n\n          ## Body Fields\n\n          `email`  \n          The email address used during registration. Prefer the logged-in user's email from `/me`.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Verification code sent successfully\"\n          }\n          ```\n\n          ## Frontend Email Handling\n\n          Do not ask the user to type their email again if the user is logged in.\n\n          Use:\n\n          ```js\n          const email = currentUser.email;\n          ```\n\n          Then call:\n\n          ```js\n          await api.post(\"/api/v1/auth/resend-email-otp\", { email });\n          ```\n\n          ## Rate Limits\n\n          The user can request a new code once every 60 seconds.\n\n          The route also has API-level rate limiting:\n\n          - maximum 3 resend requests per 10 minutes per IP/email\n\n          If they request too early:\n\n          ```json\n          {\n            \"message\": \"Please wait before requesting another code\",\n            \"retryAfterSeconds\": 43\n          }\n          ```\n\n          ## Notes For Frontend\n\n          If the response says the email is already verified, send the user to the normal app/dashboard flow.\n      - info:\n          name: 4. Login User\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/login'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"identifier\": \"imo@gmail.com\",\n                \"password\": \"Password\"\n              }\n        runtime:\n          variables:\n            - name: baseUrl\n              value: http://localhost:5000\n          scripts:\n            - type: after-response\n              code: |-\n                if (res.body && (res.body.accessToken || res.body.token)) {\n                  const accessToken = res.body.accessToken || res.body.token;\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"authToken\", accessToken);\n                  } else {\n                    bru.setVar(\"authToken\", accessToken);\n                  }\n                }\n                if (res.body && res.body.refreshToken) {\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"refreshToken\", res.body.refreshToken);\n                  } else {\n                    bru.setVar(\"refreshToken\", res.body.refreshToken);\n                  }\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Login User\n\n          Logs in a user with password and returns an access token plus a mobile refresh token.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/login`\n\n          ## Body Fields\n\n          `identifier`  \n          This can be the user's email, username, or phone number.\n\n          `password`  \n          The user's password.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Login successful\",\n            \"token\": \"access-token-here\",\n            \"accessToken\": \"access-token-here\",\n            \"refreshToken\": \"long-mobile-refresh-token-here\",\n            \"session\": {\n              \"id\": \"...\",\n              \"deviceName\": \"Android phone\",\n              \"expiresAt\": \"...\"\n            },\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0\n            }\n          }\n          ```\n\n          ## Auto Save Tokens\n\n          This Bruno request automatically saves:\n\n          - `accessToken` into `authToken`\n          - `refreshToken` into `refreshToken`\n\n          After login succeeds, you can run protected requests like `Get Current User`.\n\n          ## Mobile PIN / Biometric Unlock Flow\n\n          The backend does not receive fingerprint, Face ID, or local app PIN data.\n\n          Mobile app flow:\n\n          1. User logs in with password once.\n          2. App stores `refreshToken` securely on the phone.\n          3. On next app open, app asks for PIN or biometric locally on the device.\n          4. If local unlock succeeds, app calls `Refresh Mobile Session`.\n          5. Backend returns a fresh `accessToken`.\n\n          The access token can expire. The refresh token is what keeps mobile login smooth.\n\n          There is no backend PIN-login endpoint. PIN and biometric unlock are handled by the frontend/device.\n\n          ## Current Tier 1 Behavior\n\n          Login is allowed without email verification.\n\n          A newly registered user object includes:\n\n          ```json\n          {\n            \"emailVerified\": false,\n            \"authTier\": \"tier_1\",\n            \"kycLevel\": 0\n          }\n          ```\n\n          Later features like dollar card, betting, BVN-gated flows, wallet limits, or other KYC-sensitive actions can require a higher `authTier`.\n\n          ## Login Security Notification\n\n          After successful login, the backend creates a `security` notification.\n\n          Default behavior:\n\n          ```txt\n          AUTH_LOGIN_NOTIFICATION_ENABLED=true\n          AUTH_LOGIN_NOTIFICATION_CHANNEL=both\n          ```\n\n          This means the backend attempts:\n\n          - in-app notification\n          - email notification\n          - push notification if the user has registered a device token\n\n          The frontend does not need to send a separate notification request after login.\n\n          If the app wants to show login popups, call:\n\n          ```txt\n          GET /api/v1/notifications/popup\n          ```\n\n          after login.\n\n          To check whether login email was sent, call:\n\n          ```txt\n          GET /api/v1/notifications?type=security\n          ```\n\n          Then inspect:\n\n          ```json\n          {\n            \"emailDelivery\": {\n              \"attempted\": true,\n              \"successful\": true,\n              \"error\": null\n            }\n          }\n          ```\n\n          If `successful` is `false`, the `error` field explains why.\n\n          ## Rate Limit\n\n          Maximum 10 login attempts per 15 minutes per IP/identifier.\n      - info:\n          name: 4a. Forgot Password\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/forgot-password'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{registeredEmail}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Forgot Password\n\n          Sends a 5-digit password reset code to the user's email address.\n\n          Use this when the user is logged out and taps **Forgot Password** on the login screen.\n\n          The response includes `maskedEmail`, so the app can show:\n\n          ```txt\n          A reset code has been sent to im******en@gmail.com\n          ```\n\n          Codes expire after 10 minutes. A user can request another code once every 60 seconds, with a maximum of 3 requests per 10 minutes.\n      - info:\n          name: 4b. Verify Password Reset Code\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/verify-password-reset-code'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{registeredEmail}}\",\n                \"resetCode\": \"12345\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Verify Password Reset Code\n\n          Use this after the user enters the 5-digit code sent to their email.\n\n          This endpoint only verifies the code. It does not change the password yet.\n\n          On success, the backend returns a `passwordResetToken`. Keep it temporarily in the app state and send it to the reset password endpoint.\n\n          ## UI Flow\n\n          1. User taps **Forgot Password** and enters email.\n          2. Backend sends code using `POST /api/v1/auth/forgot-password`.\n          3. User enters code.\n          4. App calls this endpoint.\n          5. If `resetVerified` is `true`, store `passwordResetToken` and show new password and confirm password fields.\n          6. App calls `PATCH /api/v1/auth/reset-password` with `passwordResetToken`, not the code.\n\n          `resetCode` can also be sent as `code` or `otp`.\n\n          ## Success Response\n\n          ```json\n          {\n            \"message\": \"Password reset code verified successfully\",\n            \"resetVerified\": true,\n            \"passwordResetToken\": \"...\",\n            \"maskedEmail\": \"jo***oe@example.com\"\n          }\n          ```\n      - info:\n          name: 4c. Reset Password\n          type: http\n          seq: 4\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/auth/reset-password'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{registeredEmail}}\",\n                \"passwordResetToken\": \"paste_token_from_verify_step\",\n                \"newPassword\": \"Password123\",\n                \"confirmPassword\": \"Password123\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Reset Password\n\n          Resets the user's login password using the `passwordResetToken` returned by `Verify Password Reset Code`.\n\n          Frontend should call this after `Verify Password Reset Code` succeeds.\n\n          This endpoint does not require the old password and does not require a logged-in token.\n\n          The final reset screen should not ask the user to enter the code again. Keep `passwordResetToken` in app state after the verify step and send it here.\n\n          Backward compatibility: the backend can still accept `resetCode`, `code`, or `otp`, but the recommended frontend flow is `passwordResetToken`.\n      - info:\n          name: 5. Get Current User\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/auth/me'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Current User\n\n          Returns the profile of the currently logged-in user.\n\n          ## Endpoint\n\n          `GET /api/v1/auth/me`\n\n          ## Authentication Required\n\n          Yes.\n\n          For normal app auth, this request needs a Bearer token:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          For vendor API-key auth, send the API key directly:\n\n          ```txt\n          Authorization: {{vendorApiKey}}\n          ```\n\n          Do not prefix vendor API keys with `Bearer`.\n\n          Run `Login User` first for JWT auth. The login request saves the token automatically.\n\n          For vendor API-key auth, approve a vendor with `Admin Make Vendor`, copy the returned `apiKey` into `vendorApiKey`, then run `Vendor API Key Auth`.\n\n          The frontend can call this after app refresh to restore the current user and check:\n\n          ```json\n          {\n            \"emailVerified\": false,\n            \"authTier\": \"tier_1\",\n            \"kycLevel\": 0\n          }\n          ```\n\n          `authTier` is the product access tier. New users start at `tier_1`.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"referralCode\": \"TES1234\",\n              \"referredBy\": null,\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0,\n              \"createdAt\": \"...\"\n            }\n          }\n          ```\n\n          ## Common Error\n\n          If token is missing, invalid, or expired:\n\n          ```json\n          {\n            \"message\": \"Invalid or expired token\"\n          }\n          ```\n      - info:\n          name: 6. Refresh Mobile Session\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/refresh-session'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"refreshToken\": \"{{refreshToken}}\"\n              }\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                if (res.body && (res.body.accessToken || res.body.token)) {\n                  const accessToken = res.body.accessToken || res.body.token;\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"authToken\", accessToken);\n                  } else {\n                    bru.setVar(\"authToken\", accessToken);\n                  }\n                }\n                if (res.body && res.body.refreshToken) {\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"refreshToken\", res.body.refreshToken);\n                  } else {\n                    bru.setVar(\"refreshToken\", res.body.refreshToken);\n                  }\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Refresh Mobile Session\n\n          Use this after mobile PIN or biometric unlock.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/refresh-session`\n\n          ## Body Fields\n\n          `refreshToken`\n          Required. This is returned by `Login User` and should be stored securely by the mobile app.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Session refreshed successfully\",\n            \"token\": \"new-access-token\",\n            \"accessToken\": \"new-access-token\",\n            \"refreshToken\": \"new-refresh-token\",\n            \"session\": {\n              \"id\": \"...\",\n              \"expiresAt\": \"...\"\n            },\n            \"user\": {\n              \"id\": \"...\",\n              \"email\": \"user@example.com\"\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          The mobile app should verify PIN or biometric locally first. If local unlock succeeds, call this endpoint to get a fresh access token.\n\n          Store the new `refreshToken` returned by this endpoint. The backend rotates refresh tokens for better security.\n\n          If this endpoint returns `401`, send the user back to password login.\n      - info:\n          name: 6c. Logout Mobile Session\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/logout'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"refreshToken\": \"{{refreshToken}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Logout Mobile Session\n\n          Logs out the current mobile session by revoking the refresh token.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/logout`\n\n          ## Body Fields\n\n          `refreshToken`\n          Required. The refresh token returned by login or refresh session.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Logged out successfully\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          After logout succeeds, delete both tokens from secure storage:\n\n          - access token\n          - refresh token\n\n          The user must login with password again after logout.\n      - info:\n          name: 8. Admin Make Admin\n          type: http\n          seq: 7\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/make-admin/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Make Admin\n\n          Upgrades an existing active user into an admin.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/make-admin/:userId`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## What Backend Does\n\n          - sets `role` to `admin`\n          - removes vendor API access if the user was previously vendor-related\n          - sets `isVendorActive` to `false`\n          - resets `discountRate` to `0`\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"User upgraded to admin successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"role\": \"admin\",\n              \"authTier\": \"tier_1\",\n              \"isActive\": true\n            }\n          }\n          ```\n      - info:\n          name: 7. Admin List Admins\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/admins'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin List Admins\n\n          Returns all users with the `admin` role.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/admins`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"admins\": [\n              {\n                \"id\": \"...\",\n                \"firstName\": \"Test\",\n                \"lastName\": \"Admin\",\n                \"username\": \"testadmin\",\n                \"email\": \"admin@example.com\",\n                \"phone\": \"08012345678\",\n                \"role\": \"admin\",\n                \"authTier\": \"tier_1\",\n                \"isActive\": true\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 9. Admin Remove Admin\n          type: http\n          seq: 8\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/remove-admin/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Remove Admin\n\n          Removes the admin role from another admin and changes them back to a normal user.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/remove-admin/:userId`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Safety Rules\n\n          The backend will not allow:\n\n          - removing your own admin role\n          - removing the last active admin\n          - removing admin from a user who is not currently an admin\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Admin role removed successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"Admin\",\n              \"username\": \"testadmin\",\n              \"email\": \"admin@example.com\",\n              \"role\": \"user\",\n              \"authTier\": \"tier_1\",\n              \"isActive\": true\n            }\n          }\n          ```\n      - info:\n          name: vtpass\n          type: http\n          seq: 15\n        http:\n          method: GET\n          url: POST https://sandbox.vtpass.com/api/pay\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n  - info:\n      name: Cards\n      type: folder\n    items:\n      - info:\n          name: 1. Get Card Configuration\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/cards/configuration'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTQyNDMwMGI2YTQ3MmViMTVlOWFlNDQiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8zIiwiaWF0IjoxNzgyNzMwNjE2LCJleHAiOjE3ODMzMzU0MTZ9.Zc66W7qXQPUOVfNGKEweDSOXNwHaxUjyTZZpkIdD4Yc\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: Returns available brands, limits, current fees, and exchange markups.\n      - info:\n          name: 10. Freeze Card\n          type: http\n          seq: 10\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}/freeze'\n          body:\n            type: json\n            data: |-\n              {\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: 11. Unfreeze Card\n          type: http\n          seq: 11\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}/unfreeze'\n          body:\n            type: json\n            data: |-\n              {\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: 12. Get Card Transactions\n          type: http\n          seq: 12\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}/transactions?page=1&pageSize=20'\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: 13. Admin Get Card Settings\n          type: http\n          seq: 13\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/cards/settings'\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: 14. Admin Update Card Settings\n          type: http\n          seq: 14\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/cards/settings'\n          body:\n            type: json\n            data: |-\n              {\n                \"isEnabled\": true,\n                \"allowedBrands\": [\"VISA\", \"MASTERCARD\"],\n                \"defaultBrand\": \"VISA\",\n                \"providerCreationFee\": { \"percent\": 0, \"flat\": 2 },\n                \"creationFee\": { \"percent\": 0, \"flat\": 1000 },\n                \"providerFundingFee\": { \"percent\": 1, \"flat\": 0 },\n                \"fundingFee\": { \"percent\": 1, \"flat\": 0 },\n                \"providerWithdrawalFee\": { \"percent\": 0, \"flat\": 1 },\n                \"withdrawalFee\": { \"percent\": 1, \"flat\": 0 },\n                \"fundingExchangeMarkupPercent\": 1,\n                \"withdrawalExchangeMarkupPercent\": 1,\n                \"monthlyMaintenanceFee\": 1,\n                \"maintenanceGracePeriodDays\": 3,\n                \"freezeOnMaintenanceFailure\": true,\n                \"minimumFundingAmount\": 1000,\n                \"maximumFundingAmount\": 1000000,\n                \"minimumWithdrawalAmount\": 1,\n                \"quoteTtlSeconds\": 300\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Provider fee `flat` values are USD. They represent Maplerad's cost.\n          BillXpress `creationFee.flat`, `fundingFee.flat`, and\n          `withdrawalFee.flat` values are NGN and represent customer charges.\n          `monthlyMaintenanceFee` is USD and is converted at the current Maplerad rate.\n          Percentage values are entered as normal percentages, for example `1` = 1%.\n      - info:\n          name: 2. Create Card Quote\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/cards/creation-quote'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"amountNgn\": 10000,\n                \"brand\": \"VISA\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTQyNDMwMGI2YTQ3MmViMTVlOWFlNDQiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8zIiwiaWF0IjoxNzgyNzMwNjE2LCJleHAiOjE3ODMzMzU0MTZ9.Zc66W7qXQPUOVfNGKEweDSOXNwHaxUjyTZZpkIdD4Yc\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Creates a short-lived quote for card creation and initial USD funding.\n          Display `walletDebit`, `target.amount`, fees, and expiry to the user.\n      - info:\n          name: 3. Create Card\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/cards'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"quoteId\": \"6a4254e3ac984635b8262413\",\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTQyNDMwMGI2YTQ3MmViMTVlOWFlNDQiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8zIiwiaWF0IjoxNzgyNzMxODE1LCJleHAiOjE3ODMzMzY2MTV9.xITqIdPid2Qz1g3SY6xygexXXkTRx8PnZKKUKUltYHQ\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Uses a valid creation quote. Card creation is asynchronous and initially\n          returns `PENDING`; the Maplerad webhook changes it to `ACTIVE` or `FAILED`.\n      - info:\n          name: 4. Get My Cards\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/cards'\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: Returns the logged-in user's cards using masked card information.\n      - info:\n          name: 5. Get Card Details\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}'\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Fetches current card details directly from Maplerad. Treat PAN and CVV as\n          sensitive and never log or persist them on the frontend.\n      - info:\n          name: 6. Create Funding Quote\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}/funding-quote'\n          body:\n            type: json\n            data: |-\n              {\n                \"amountNgn\": 10000\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          The user chooses how much NGN to convert. The response states the exact USD\n          amount the card receives and the total NGN wallet debit.\n      - info:\n          name: 7. Fund Card\n          type: http\n          seq: 7\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}/fund'\n          body:\n            type: json\n            data: |-\n              {\n                \"quoteId\": \"paste-card-quote-id\",\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Debits the NGN wallet, executes the Maplerad FX quote, and funds the card.\n          The wallet is refunded automatically if funding fails.\n      - info:\n          name: 8. Create Withdrawal Quote\n          type: http\n          seq: 8\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}/withdrawal-quote'\n          body:\n            type: json\n            data: |-\n              {\n                \"amountUsd\": 5\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Returns the current Maplerad USD-to-NGN quote, fees, markup, and exact NGN\n          amount that will be credited to the wallet.\n      - info:\n          name: 9. Withdraw Card\n          type: http\n          seq: 9\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/cards/{{cardId}}/withdraw'\n          body:\n            type: json\n            data: |-\n              {\n                \"quoteId\": \"paste-card-quote-id\",\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Withdraws USD from the card, executes the Maplerad FX quote, and credits the\n          user's NGN wallet after configured charges.\n  - info:\n      name: Banking\n      type: folder\n      seq: 3\n    docs:\n      content: |-\n        # Banking Endpoints\n\n        This folder contains BillXpress banking features:\n\n        - permanent virtual accounts\n        - one-time funding accounts\n        - bank transfer bank lists and suggestions\n        - account name resolution\n        - sending money to bank accounts\n        - funding settings\n        - provider webhooks\n\n        ## Frontend Rule\n\n        The frontend should call only BillXpress backend endpoints. Do not call PocketFi, Monnify, Maplerad, or any provider API directly from the app.\n\n        ## Funding Flow\n\n        Permanent account:\n\n        ```txt\n        GET  /api/v1/wallet/virtual-account\n        POST /api/v1/wallet/virtual-account\n        ```\n\n        One-time funding account:\n\n        ```txt\n        POST /api/v1/wallet/funding-intents\n        POST /api/v1/wallet/funding-intents/:fundingIntentId/confirm\n        ```\n\n        ## Transfer Flow\n\n        ```txt\n        GET  /api/v1/wallet/transfers/banks\n        POST /api/v1/wallet/transfers/suggest-banks\n        POST /api/v1/wallet/transfers/resolve-account\n        POST /api/v1/wallet/transfers\n        ```\n\n        User flow:\n\n        1. User enters account number.\n        2. App may call bank suggestion endpoint.\n        3. User selects bank.\n        4. App calls resolve account endpoint.\n        5. App displays account name.\n        6. User confirms with transaction PIN.\n        7. Backend debits wallet and sends money through Maplerad.\n\n        ## Important\n\n        The backend endpoint URLs still start with `/api/v1/wallet` for now. This folder is only a documentation reorganization so frontend developers can find banking requests faster.\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Create Virtual Account\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/virtual-account'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: '{}'\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create Virtual Account\n\n          Use this endpoint when a logged-in user does not yet have a wallet funding account.\n\n          This creates a permanent bank account number the user can transfer money into to fund their BillXpress wallet.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/virtual-account`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          No body fields are required.\n\n          The backend creates supported PocketFi funding accounts. Current order is `paga`, then `kuda`.\n\n          ## Important\n\n          The frontend does not need to send the user's name, phone, or email. The backend already gets those from the logged-in user's profile.\n\n          The user's saved phone number must be 11 digits and start with `0`, for example `08012345678`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Virtual account created successfully\",\n            \"virtualAccount\": {\n              \"id\": \"...\",\n              \"provider\": \"pocketfi\",\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (BillXpress)\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (BillXpress)\"\n                },\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"kuda\",\n                  \"accountNumber\": \"1234567890\",\n                  \"accountName\": \"Test User (BillXpress)\"\n                }\n              ],\n              \"feePolicy\": {\n                \"paidBy\": \"platform\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              },\n              \"status\": \"active\"\n            }\n          }\n          ```\n\n          If the user already has a virtual account:\n\n          ```json\n          {\n              \"message\": \"Virtual account already exists\",\n              \"virtualAccount\": {\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (BillXpress)\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (BillXpress)\"\n                }\n              ],\n              \"feePolicy\": {\n                \"paidBy\": \"platform\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              }\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          After success, show every item in `virtualAccount.accounts` on the funding screen. If `accounts` is empty for an older user, show the top-level `bankName`, `accountNumber`, and `accountName`.\n\n          `accountName` is the PocketFi account name formatted with `(BillXpress)` for display, so it matches what users see when transferring.\n\n          `feePolicy` tells the frontend what to show before the user transfers. If the user transfers `N2,000` and the funding charge is `1%`, the fee is `N20` but the wallet still receives the full `N2,000`.\n      - info:\n          name: 10. Admin Get Funding Settings\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/funding/settings'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Get Funding Settings\n\n          Admin uses this endpoint to see the current wallet funding provider and charge settings for PocketFi, Monnify, and Maplerad.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/funding/settings`\n\n          ## Authentication\n\n          Admin JWT required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Expected Response\n\n          ```json\n          {\n            \"providerSettings\": {\n              \"oneTimeFundingProvider\": \"maplerad\"\n            },\n            \"settings\": [\n              {\n                \"provider\": \"pocketfi\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"paidBy\": \"platform\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              },\n              {\n                \"provider\": \"monnify\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"paidBy\": \"platform\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              },\n              {\n                \"provider\": \"maplerad\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"paidBy\": \"platform\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              }\n            ]\n          }\n          ```\n\n          ## Important Rule\n\n          The user always receives the full amount they transfer.\n\n          Example:\n\n          - User transfers: `N2,000`\n          - Funding charge setting: `1%`\n          - Fee shown/accounted for: `N20`\n          - Wallet credit: `N2,000`\n\n          The frontend should display the `message` from `feePolicy` when showing funding account details.\n      - info:\n          name: 11. Admin Update Funding Settings\n          type: http\n          seq: 11\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/funding/settings'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"oneTimeFundingProvider\": \"maplerad\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Update Funding Settings\n\n          Admin uses this endpoint to switch the one-time funding provider or set the wallet funding charge for one provider.\n\n          Use it for:\n\n          - `pocketfi` permanent virtual-account funding\n          - `monnify` one-time funding account\n          - `maplerad` one-time funding account\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/funding/settings`\n\n          ## Authentication\n\n          Admin JWT required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `oneTimeFundingProvider`\n          Optional. Use `maplerad` or `monnify` to switch the provider used by `POST /api/v1/wallet/funding-intents`.\n\n          `provider`\n          Required when updating fees. Use `pocketfi`, `monnify`, or `maplerad`.\n\n          `percent`\n          Optional. Percentage funding charge. Use `1` for 1%.\n\n          `flat`\n          Optional. Flat naira charge. Use `0` when no flat charge is needed.\n\n          ## Example Body\n\n          ```json\n          {\n            \"oneTimeFundingProvider\": \"maplerad\"\n          }\n          ```\n\n          To update PocketFi fees:\n\n          ```json\n          {\n            \"provider\": \"pocketfi\",\n            \"percent\": 1,\n            \"flat\": 0\n          }\n          ```\n\n          To update Monnify instead:\n\n          ```json\n          {\n            \"provider\": \"monnify\",\n            \"percent\": 1,\n            \"flat\": 0\n          }\n          ```\n\n          To update Maplerad fees:\n\n          ```json\n          {\n            \"provider\": \"maplerad\",\n            \"percent\": 1,\n            \"flat\": 0\n          }\n          ```\n\n          ## Expected Response\n\n          ```json\n          {\n            \"message\": \"One-time funding provider updated successfully\",\n            \"providerSettings\": {\n              \"oneTimeFundingProvider\": \"maplerad\"\n            }\n          }\n          ```\n\n          Fee update response:\n\n          ```json\n          {\n            \"message\": \"Funding fee setting updated successfully\",\n            \"setting\": {\n              \"provider\": \"pocketfi\",\n              \"percent\": 1,\n              \"flat\": 0,\n              \"creditPolicy\": \"gross\",\n              \"paidBy\": \"platform\",\n              \"userReceivesFullAmount\": true,\n              \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n            }\n          }\n          ```\n\n          ## Important Rule\n\n          This setting does not reduce the wallet credit.\n\n          If the user transfers `N2,000`, the backend credits `N2,000` to the user's wallet. The `percent` and `flat` values are for funding charge display/accounting.\n\n          The user app does not call this endpoint. Only the admin dashboard should call it.\n      - info:\n          name: 2. Get Virtual Account\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/wallet/virtual-account'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Virtual Account\n\n          Use this endpoint to display the user's wallet funding account.\n\n          ## Endpoint\n\n          `GET /api/v1/wallet/virtual-account`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"virtualAccount\": {\n              \"id\": \"...\",\n              \"provider\": \"pocketfi\",\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (BillXpress)\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (BillXpress)\"\n                },\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"kuda\",\n                  \"accountNumber\": \"1234567890\",\n                  \"accountName\": \"Test User (BillXpress)\"\n                }\n              ],\n              \"feePolicy\": {\n                \"paidBy\": \"platform\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              },\n              \"status\": \"active\"\n            }\n          }\n          ```\n\n          ## Common Error\n\n          If the user does not have a virtual account yet:\n\n          ```json\n          {\n            \"message\": \"Virtual account has not been created\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          If this returns `404`, show a button like `Create Funding Account`, then call `Create Virtual Account`.\n\n          Show the list in `virtualAccount.accounts`. It may contain Paga, Kuda, or both depending on what PocketFi returns.\n\n          Show `feePolicy.message` on the funding screen. The important rule is: if the user transfers `N2,000`, the backend credits `N2,000` to the wallet.\n      - info:\n          name: 3. Create One-Time Funding Account\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/funding-intents'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"amount\": 2000\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create One-Time Funding Account\n\n          Use this when the user enters an amount and wants a temporary transfer account like a checkout screen.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/funding-intents`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `amount`  \n          Required. Amount the user wants to transfer, in naira.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Funding account created successfully\",\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"accountNumber\": \"5010288665\",\n              \"accountName\": \"John Doe\",\n              \"bankName\": \"VFD Bank\",\n              \"amount\": 2000,\n              \"fee\": 20,\n              \"amountToReceive\": 2000,\n              \"feePolicy\": {\n                \"paidBy\": \"platform\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"creditPolicy\": \"gross\",\n                \"userReceivesFullAmount\": true,\n                \"message\": \"Funding charge is 1%. The user wallet is credited with the full transferred amount.\"\n              },\n              \"expiresAt\": \"...\",\n              \"status\": \"pending\",\n              \"createdAt\": \"...\"\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          Show this like a checkout screen:\n\n          - countdown from `expiresAt`\n          - account number\n          - bank name\n          - account name\n          - amount\n          - fee, if you want to show it\n          - amount to receive\n\n          If the user enters `N2,000` and the funding charge is `1%`, show:\n\n          - Amount entered: `N2,000`\n          - Fee: `N20`\n          - Amount to receive: `N2,000`\n\n          `amountToReceive` is the wallet credit amount. It should match the amount the user is asked to transfer.\n\n          When the user taps **I have transferred the money**, call:\n\n          `POST /api/v1/wallet/funding-intents/:fundingIntentId/confirm`\n\n          Use the `fundingIntent.id` from this response as `:fundingIntentId`.\n\n          The frontend should not credit the wallet itself. The backend credits the wallet after payment is confirmed.\n\n          ## Fields To Display\n\n          The app only needs these fields:\n\n          - `fundingIntent.id`\n          - `fundingIntent.accountNumber`\n          - `fundingIntent.accountName`\n          - `fundingIntent.bankName`\n          - `fundingIntent.amount`\n          - `fundingIntent.amountToReceive`\n          - `fundingIntent.expiresAt`\n          - `fundingIntent.status`\n\n          Ignore any extra fields returned by the backend.\n      - info:\n          name: 4. Confirm One-Time Funding Payment\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/funding-intents/{{fundingIntentId}}/confirm'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Confirm One-Time Funding Payment\n\n          Use this endpoint for the **I have transferred the money** button.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/funding-intents/:fundingIntentId/confirm`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## URL Params\n\n          `fundingIntentId`\n          Required. Use the `fundingIntent.id` returned by `POST /api/v1/wallet/funding-intents`.\n\n          ## Body\n\n          No body is required.\n\n          ## What This Does\n\n          The backend checks the funding intent status and returns whether the wallet has been credited.\n\n          The frontend must not credit the wallet by itself.\n\n          ## If Payment Is Still Pending\n\n          ```json\n          {\n            \"message\": \"We have not received this transfer yet. Please wait a moment and try again.\",\n            \"status\": \"pending\",\n            \"alreadyProcessed\": false,\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"status\": \"pending\"\n            }\n          }\n          ```\n\n          Show a friendly waiting state and let the user try again after a f
