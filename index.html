      ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `target`\n          Use `user` for one user or `all` for all active users.\n\n          `userId`\n          Required when `target` is `user`.\n\n          `title`\n          Required.\n\n          `message`\n          Required.\n\n          `channel`\n          Use `in_app`, `push`, `email`, `both`, or `all`.\n\n          `priority`\n          Use `low`, `normal`, or `high`.\n\n          ## Push Notification Note\n\n          Push works only after the mobile app registers a device token with:\n\n          `POST /api/v1/notifications/devices`\n\n          For v1, Expo push tokens are supported.\n      - info:\n          name: 10. Admin List Notifications\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/notifications?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin List Notifications\n\n          Admin audit endpoint for notifications created or sent by the backend.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/notifications`\n\n          ## Authentication\n\n          Admin JWT required.\n\n          ## Query Params\n\n          `page`\n          Optional.\n\n          `limit`\n          Optional.\n\n          `type`\n          Optional. Filter by notification type.\n\n          `userId`\n          Optional. Filter notifications for one user.\n  - info:\n      name: Users\n      type: folder\n      seq: 4\n    docs:\n      content: |-\n        # User Management APIs\n\n        This folder contains user-side profile management and admin-side user management.\n\n        ## User-Side Endpoints\n\n        These endpoints use the logged-in user's token:\n\n        ```txt\n        GET    /api/v1/users/me\n        PATCH  /api/v1/users/me\n        PATCH  /api/v1/users/me/password\n        PATCH  /api/v1/users/me/transaction-pin\n        DELETE /api/v1/users/me\n        ```\n\n        Users can update their own basic profile, change password, change transaction PIN, and deactivate their account.\n\n        ## Admin-Side Endpoints\n\n        Admin endpoints use:\n\n        ```txt\n        Authorization: Bearer {{authToken}}\n        ```\n\n        The authenticated user must have:\n\n        ```json\n        {\n          \"role\": \"admin\"\n        }\n        ```\n\n        Admin user management endpoints:\n\n        ```txt\n        GET    /api/v1/admin/users\n        POST   /api/v1/admin/users\n        GET    /api/v1/admin/users/:userId\n        PATCH  /api/v1/admin/users/:userId\n        PATCH  /api/v1/admin/users/:userId/status\n        DELETE /api/v1/admin/users/:userId\n        ```\n\n        Role changes are intentionally separate:\n\n        ```txt\n        PATCH /api/v1/admin/make-admin/:userId\n        PATCH /api/v1/admin/remove-admin/:userId\n        PATCH /api/v1/admin/make-vendor/:userId\n        ```\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Get My Profile\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/users/me'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get My Profile\n\n          Gets the logged-in user's profile.\n\n          ## Endpoint\n\n          `GET /api/v1/users/me`\n      - info:\n          name: 2. Update My Profile\n          type: http\n          seq: 2\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/users/me'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"Imo\",\n                \"lastName\": \"Ben\",\n                \"username\": \"imoben\",\n                \"phone\": \"08125128766\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update My Profile\n\n          Lets a user update their own basic profile.\n\n          ## Endpoint\n\n          `PATCH /api/v1/users/me`\n\n          ## Editable Fields\n\n          `firstName`, `lastName`, `username`, `phone`\n\n          Email is not editable here for now because email changes should have a verification flow later.\n      - info:\n          name: 3. Change My Password\n          type: http\n          seq: 3\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/users/me/password'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"Password123\",\n                \"newPassword\": \"Password456\",\n                \"confirmPassword\": \"Password456\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Change My Password\n\n          User changes their password after confirming the current password.\n      - info:\n          name: 4. Change My Transaction PIN\n          type: http\n          seq: 4\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/users/me/transaction-pin'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"currentTransactionPin\": \"1234\",\n                \"newTransactionPin\": \"5678\",\n                \"confirmTransactionPin\": \"5678\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Change My Transaction PIN\n\n          User changes their 4-digit transaction PIN.\n\n          This PIN is for sensitive wallet/service actions, not backend login.\n      - info:\n          name: 5. Deactivate My Account\n          type: http\n          seq: 5\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/v1/users/me'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"password\": \"Password123\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Deactivate My Account\n\n          User deactivates their own account after confirming password.\n      - info:\n          name: 6. Admin List Users\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/users?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin List Users\n\n          Admin lists and searches users.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/users`\n\n          ## Query Params\n\n          `search`\n          Search first name, last name, username, email, or phone.\n\n          `role`\n          Optional: `user`, `vendor`, `admin`.\n\n          `status`\n          Optional: `active` or `inactive`.\n\n          `authTier`\n          Optional: `tier_1`, `tier_2`, or `tier_3`.\n\n          `page`, `limit`\n          Pagination.\n      - info:\n          name: 7. Admin Create User\n          type: http\n          seq: 7\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/admin/users'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"Test\",\n                \"lastName\": \"User\",\n                \"username\": \"testuseradmin\",\n                \"email\": \"testuseradmin@example.com\",\n                \"phone\": \"08012345678\",\n                \"password\": \"Password123\",\n                \"transactionPin\": \"1234\",\n                \"authTier\": \"tier_1\",\n                \"kycLevel\": 0,\n                \"emailVerified\": false,\n                \"isActive\": true\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Create User\n\n          Admin creates a normal user account.\n\n          ## Endpoint\n\n          `POST /api/v1/admin/users`\n\n          This creates `role: \"user\"`. To make the user admin or vendor, use the role-specific admin endpoints.\n      - info:\n          name: 8. Admin Get User\n          type: http\n          seq: 8\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Get User\n\n          Admin views one user with wallet summary and transaction count.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/users/:userId`\n      - info:\n          name: 9. Admin Update User\n          type: http\n          seq: 9\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"Updated\",\n                \"lastName\": \"User\",\n                \"authTier\": \"tier_1\",\n                \"kycLevel\": 0,\n                \"emailVerified\": false,\n                \"isActive\": true\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Update User\n\n          Admin updates safe user fields.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/users/:userId`\n\n          ## Editable Fields\n\n          `firstName`, `lastName`, `username`, `email`, `phone`, `isActive`, `emailVerified`, `authTier`, `kycLevel`\n\n          Role changes are intentionally not handled here.\n      - info:\n          name: 10. Admin Set User Status\n          type: http\n          seq: 10\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}/status'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"isActive\": false\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Set User Status\n\n          Admin suspends or activates a user.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/users/:userId/status`\n      - info:\n          name: 11. Admin Delete User\n          type: http\n          seq: 11\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Delete User\n\n          Soft-deletes a user by setting `isActive` to `false`.\n\n          ## Endpoint\n\n          `DELETE /api/v1/admin/users/:userId`\ndocs:\n  content: |-\n    # Billxpress Backend API\n\n    This Bruno collection documents the Billxpress backend endpoints for frontend developers and testers.\n\n    ## Base URLs\n\n    Production:\n\n    ```txt\n    https://billxpressbackend-production.up.railway.app\n    ```\n\n    Local development:\n\n    ```txt\n    http://localhost:5000\n    ```\n\n    In Bruno, choose the right environment before testing:\n\n    - `Production` for the deployed Railway API.\n    - `Local` when the backend is running on your computer.\n\n    ## How to use this collection\n\n    1. Select `Production` or `Local`.\n    2. Run `Health Check` first.\n    3. Run `Register User` if you need a new account.\n    4. Run `Login User`. This saves the JWT into `authToken`.\n    5. Run `Get Current User` to confirm the token works.\n    6. Run wallet requests such as `Get Wallet`, `Get Virtual Account`, or `Create One-Time Funding Account`.\n\n    Every protected endpoint needs:\n\n    ```txt\n    Authorization: Bearer {{authToken}}\n    ```\n\n    ## Mobile PIN / Biometric Unlock\n\n    Password login returns two tokens:\n\n    - `accessToken`: used as `Bearer {{authToken}}` for API calls.\n    - `refreshToken`: stored securely by the mobile app.\n\n    PIN and biometric checks happen on the phone. The backend does not receive fingerprint, Face ID, or local app PIN data.\n\n    After local PIN/biometric unlock, call:\n\n    ```txt\n    POST /api/v1/auth/refresh-session\n    ```\n\n    The backend returns a fresh `accessToken` and a rotated `refreshToken`.\n\n    There is no backend PIN-login endpoint. The backend standard is JWT access token + refresh token.\n\n    ## Important Auth Rule\n\n    Billxpress does not block login when email is unverified. New users start at `authTier: \"tier_1\"`. Later dollar card, betting, BVN/KYC, wallet limits, and other sensitive service actions can require a higher `authTier`.\n\n    ## Frontend Registration Rule\n\n    Registration now collects:\n\n    - `firstName`\n    - `lastName`\n    - `username`\n    - `email`\n    - `phone`\n    - `password`\n    - `confirmPassword`\n    - `transactionPin`\n\n    Email OTP verification remains available as an optional/future flow, but it is not required for tier 1 registration.\n\n    ## Wallet Funding Rule\n\n    The frontend should use only Billxpress API endpoints. Do not call PocketFi or Monnify directly from the app.\n\n    Permanent funding account:\n\n    ```txt\n    GET /api/v1/wallet/virtual-account\n    ```\n\n    One-time Monnify funding account:\n\n    ```txt\n    POST /api/v1/wallet/funding-intents\n    ```\n\n    When the user taps **I have transferred the money**:\n\n    ```txt\n    POST /api/v1/wallet/funding-intents/:fundingIntentId/confirm\n    ```\n\n    The frontend should never credit the wallet itself. The backend credits the wallet after webhook confirmation or Monnify status confirmation.\n\n    Referral earnings are redeemed into the user's main wallet, not withdrawn to bank.\n  type: text/markdown\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-06-03T07:12:53.934Z'\n    exportedUsing: Bruno/3.2.2\n";
