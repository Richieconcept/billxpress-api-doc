            url: '{{baseUrl}}/api/v1/services/cable-tv/verify-smartcard'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"provider\": \"DSTV\",\n                    \"smartcardNumber\": \"1212121212\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Verify Smartcard\n\n              Use this endpoint after user enters smartcard/IUC number.\n\n              Body:\n\n              `provider`\n              Required. Use `DSTV`, `GOTV`, or `STARTIMES`.\n\n              `smartcardNumber`\n              Required.\n          - info:\n              name: 4. Quote Cable TV\n              type: http\n              seq: 4\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/cable-tv/quote'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"provider\": \"DSTV\",\n                    \"packageCode\": \"dstv-padi\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Quote Cable TV\n\n              Use this endpoint after package selection. The frontend sends only package code, not amount.\n\n              The backend fetches the real package amount from VTpass and calculates BillXpress selling price.\n          - info:\n              name: 5. Purchase Cable TV\n              type: http\n              seq: 5\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/cable-tv/purchase'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"provider\": \"DSTV\",\n                    \"smartcardNumber\": \"1212121212\",\n                    \"packageCode\": \"dstv-padi\",\n                    \"subscriptionType\": \"change\",\n                    \"phone\": \"08011111111\",\n                    \"transactionPin\": \"1234\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Purchase Cable TV\n\n              Use this endpoint after smartcard verification and user confirmation.\n\n              The backend verifies smartcard again, fetches package amount from VTpass, debits wallet, purchases through VTpass, and refunds automatically if VTpass fails.\n\n              `subscriptionType`\n              Optional for DSTV/GOTV. Use `change` or `renew`. Defaults to `change`.\n\n              For Startimes, subscription type is ignored.\n          - info:\n              name: 6. Admin Get Cable TV Settings\n              type: http\n              seq: 6\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/admin/services/cable-tv/settings'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Get Cable TV Settings\n\n              `GET /api/v1/admin/services/cable-tv/settings`\n          - info:\n              name: 7. Admin Update Cable TV Settings\n              type: http\n              seq: 7\n            http:\n              method: PATCH\n              url: '{{baseUrl}}/api/v1/admin/services/cable-tv/settings'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"isEnabled\": true,\n                    \"activeProvider\": \"vtpass\",\n                    \"userMarkupPercent\": 0,\n                    \"vendorMarkupPercent\": 0,\n                    \"roundingMode\": \"ceil\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Update Cable TV Settings\n\n              `PATCH /api/v1/admin/services/cable-tv/settings`\n\n              `activeProvider`\n              Current supported value is `vtpass`.\n      - info:\n          name: Electricity\n          type: folder\n          seq: 4\n        docs:\n          content: |-\n            # Electricity Service\n\n            Electricity endpoints are powered by the active electricity provider. Current provider:\n\n            ```txt\n            vtpass\n            ```\n\n            ## User Flow\n\n            1. Call `Get Electricity Discos`.\n            2. User selects disco and meter type.\n            3. User enters meter number.\n            4. Call `Verify Electricity Meter`.\n            5. Display customer name/address.\n            6. Call `Quote Electricity`.\n            7. User enters transaction PIN.\n            8. Call `Purchase Electricity`.\n\n            The backend debits wallet only during purchase. If VTpass fails after debit, the backend automatically refunds.\n\n            ## Endpoints\n\n            ```txt\n            GET  /api/v1/services/electricity/discos\n            POST /api/v1/services/electricity/verify-meter\n            POST /api/v1/services/electricity/quote\n            POST /api/v1/services/electricity/purchase\n            ```\n\n            Admin settings:\n\n            ```txt\n            GET   /api/v1/admin/services/electricity/settings\n            PATCH /api/v1/admin/services/electricity/settings\n            ```\n          type: text/markdown\n        items:\n          - info:\n              name: 1. Get Electricity Discos\n              type: http\n              seq: 1\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/electricity/discos'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQ3NDQ2MSwiZXhwIjoxNzgzMDc5MjYxfQ.Kbgp5fh5mdIKWnIn_ssbWrrX3zlYafn_Hclbe9vv2ms\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Get Electricity Discos\n\n              Use this endpoint to show supported electricity companies and meter types.\n\n              ## Endpoint\n\n              `GET /api/v1/services/electricity/discos`\n\n              ## Response\n\n              ```json\n              {\n                \"provider\": \"vtpass\",\n                \"pricing\": {\n                  \"minimumAmount\": 100,\n                  \"maximumAmount\": 500000,\n                  \"appliedMarkupPercent\": 0\n                },\n                \"discos\": [\n                  {\n                    \"code\": \"IKEDC\",\n                    \"name\": \"Ikeja Electric\",\n                    \"available\": true,\n                    \"meterTypes\": [\n                      { \"code\": \"prepaid\", \"name\": \"Prepaid\" },\n                      { \"code\": \"postpaid\", \"name\": \"Postpaid\" }\n                    ]\n                  }\n                ]\n              }\n              ```\n          - info:\n              name: 2. Verify Electricity Meter\n              type: http\n              seq: 2\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/electricity/verify-meter'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"disco\": \"AEDC\",\n                    \"meterNumber\": \"0195110025069\",\n                    \"meterType\": \"prepaid\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQ3OTcwMSwiZXhwIjoxNzgzMDg0NTAxfQ.HsPmKYJTneCDF4uGM1Rky8Ecw_jUtBnoACmpofFnVkc\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Verify Electricity Meter\n\n              Use this endpoint after user selects disco and meter type, then enters meter number.\n\n              ## Body\n\n              `disco`\n              Required. Use the `code` from `Get Electricity Discos`, for example `IKEDC`.\n\n              `meterNumber`\n              Required. Customer meter/account number.\n\n              `meterType`\n              Required. `prepaid` or `postpaid`.\n\n              ## Success Response\n\n              ```json\n              {\n                \"message\": \"Meter verified successfully\",\n                \"meter\": {\n                  \"provider\": \"vtpass\",\n                  \"meterNumber\": \"1111111111111\",\n                  \"meterType\": \"prepaid\",\n                  \"customerName\": \"John Doe\",\n                  \"address\": \"...\"\n                }\n              }\n              ```\n          - info:\n              name: 3. Quote Electricity\n              type: http\n              seq: 3\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/electricity/quote'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"amount\": 2000\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQ3OTcwMSwiZXhwIjoxNzgzMDg0NTAxfQ.HsPmKYJTneCDF4uGM1Rky8Ecw_jUtBnoACmpofFnVkc\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Quote Electricity\n\n              Use this endpoint to calculate what the user will pay after markup.\n\n              ## Body\n\n              `amount`\n              Required. Electricity value in naira.\n\n              ## Response\n\n              ```json\n              {\n                \"quote\": {\n                  \"amount\": 2000,\n                  \"sellingPrice\": 2000,\n                  \"profit\": 0,\n                  \"markupPercent\": 0,\n                  \"roundingMode\": \"ceil\"\n                }\n              }\n              ```\n          - info:\n              name: 4. Purchase Electricity\n              type: http\n              seq: 4\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/electricity/purchase'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"disco\": \"IKEDC\",\n                    \"meterNumber\": \"1111111111111\",\n                    \"meterType\": \"prepaid\",\n                    \"phone\": \"08011111111\",\n                    \"amount\": 2000,\n                    \"transactionPin\": \"1234\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Purchase Electricity\n\n              Use this endpoint after meter verification and user confirmation.\n\n              The backend verifies the meter again, debits the wallet, sends purchase to VTpass, and refunds automatically if VTpass fails.\n\n              ## Body\n\n              `disco`\n              Required. Example: `IKEDC`.\n\n              `meterNumber`\n              Required.\n\n              `meterType`\n              Required. `prepaid` or `postpaid`.\n\n              `phone`\n              Required. 11-digit Nigerian phone number starting with `0`.\n\n              `amount`\n              Required. Electricity value in naira.\n\n              `transactionPin`\n              Required.\n\n              ## Success Response\n\n              ```json\n              {\n                \"status\": \"successful\",\n                \"message\": \"Electricity purchase successful\",\n                \"token\": \"...\",\n                \"units\": \"...\",\n                \"quote\": {},\n                \"wallet\": {},\n                \"transaction\": {}\n              }\n              ```\n\n              For prepaid meters, display `token` clearly for the user.\n          - info:\n              name: 5. Admin Get Electricity Settings\n              type: http\n              seq: 5\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/admin/services/electricity/settings'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Get Electricity Settings\n\n              `GET /api/v1/admin/services/electricity/settings`\n\n              Returns active provider, available providers, markup, and min/max amount settings.\n          - info:\n              name: 6. Admin Update Electricity Settings\n              type: http\n              seq: 6\n            http:\n              method: PATCH\n              url: '{{baseUrl}}/api/v1/admin/services/electricity/settings'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n                - name: Content-Type\n                  value: application/json\n              body:\n                type: json\n                data: |-\n                  {\n                    \"isEnabled\": true,\n                    \"activeProvider\": \"vtpass\",\n                    \"userMarkupPercent\": 0,\n                    \"vendorMarkupPercent\": 0,\n                    \"roundingMode\": \"ceil\",\n                    \"minimumAmount\": 100,\n                    \"maximumAmount\": 500000\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Update Electricity Settings\n\n              `PATCH /api/v1/admin/services/electricity/settings`\n\n              `activeProvider`\n              Current supported value is `vtpass`.\n\n              `minimumAmount` and `maximumAmount`\n              Control the allowed electricity purchase amount.\n      - info:\n          name: Social Growth\n          type: folder\n          seq: 3\n        docs:\n          content: |-\n            # Social Growth Service\n\n            Social Growth lets users buy services like followers, likes, views, comments, and other social media growth products.\n\n            The frontend should only call BillXpress endpoints. Do not call VheeBoost directly from the app.\n\n            ## User Flow\n\n            1. Call `GET /api/v1/services/social-growth/services`.\n            2. Show categories and services returned by the backend.\n            3. User chooses a service, enters their social media link, and enters quantity.\n            4. Call `POST /api/v1/services/social-growth/quote`.\n            5. Show the final `sellingPrice`.\n            6. When user confirms, call `POST /api/v1/services/social-growth/orders`.\n            7. Backend verifies transaction PIN, debits wallet, sends order to VheeBoost, then saves transaction and order history.\n            8. If VheeBoost fails, backend refunds the wallet automatically.\n\n            ## Pricing Rule\n\n            VheeBoost returns `rate` as provider cost per `1000` quantity.\n\n            Example:\n\n            ```txt\n            rate = 1425.6\n            quantity = 1000\n            provider cost = 1425.6\n            markup = 15%\n            sellingPrice = 1640\n            ```\n\n            Admin can control the markup tiers.\n          type: text/markdown\n        items:\n          - info:\n              name: 1. Social Growth Services\n              type: http\n              seq: 1\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/social-growth/services'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Social Growth Services\n\n              Fetches live social growth services from the active provider and returns BillXpress final prices.\n\n              ## Endpoint\n\n              `GET /api/v1/services/social-growth/services`\n\n              ## Authentication\n\n              User JWT required.\n\n              ## Expected Response\n\n              ```json\n              {\n                \"provider\": \"vheeboost\",\n                \"pricing\": {\n                  \"appliedPricingModel\": \"tiered\",\n                  \"roundingMode\": \"ceil\",\n                  \"rateUnit\": \"per_1000\"\n                },\n                \"services\": [\n                  {\n                    \"id\": \"1\",\n                    \"provider\": \"vheeboost\",\n                    \"name\": \"TikTok Likes\",\n                    \"category\": \"TikTok\",\n                    \"rate\": 1425.6,\n                    \"rateUnit\": \"per_1000\",\n                    \"min\": 10,\n                    \"max\": 1000000,\n                    \"quoteQuantity\": 10,\n                    \"costPrice\": 14.26,\n                    \"sellingPrice\": 17,\n                    \"profit\": 2.74,\n                    \"markupPercent\": 15,\n                    \"available\": true\n                  }\n                ],\n                \"count\": 1530\n              }\n              ```\n\n              ## Frontend Notes\n\n              Group services by `category`.\n\n              Show `sellingPrice` only for the default/minimum quantity shown in this list. When the user enters their own quantity, call `Social Growth Quote` to get the real final price.\n          - info:\n              name: 2. Social Growth Quote\n              type: http\n              seq: 2\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/social-growth/quote'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"serviceId\": \"1\",\n                    \"quantity\": 1000\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Social Growth Quote\n\n              Calculates the final BillXpress price for a social growth order before the user pays.\n\n              ## Endpoint\n\n              `POST /api/v1/services/social-growth/quote`\n\n              ## Body Fields\n\n              `serviceId`\n              Required. Use the `id` from `Social Growth Services`.\n\n              `quantity`\n              Required. Must be between the service `min` and `max`.\n\n              ## Expected Response\n\n              ```json\n              {\n                \"quote\": {\n                  \"id\": \"1\",\n                  \"name\": \"TikTok Likes\",\n                  \"rate\": 1425.6,\n                  \"rateUnit\": \"per_1000\",\n                  \"quoteQuantity\": 1000,\n                  \"costPrice\": 1425.6,\n                  \"sellingPrice\": 1640,\n                  \"profit\": 214.4,\n                  \"markupPercent\": 15,\n                  \"pricingModel\": \"tiered\"\n                }\n              }\n              ```\n\n              ## Frontend Notes\n\n              Show `sellingPrice` as the amount the user will pay from wallet.\n\n              Do not calculate price on the frontend. The backend already applies the correct user/vendor tier.\n          - info:\n              name: 3. Place Social Growth Order\n              type: http\n              seq: 3\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/social-growth/orders'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"serviceId\": \"1\",\n                    \"link\": \"https://www.tiktok.com/@username/video/1234567890\",\n                    \"quantity\": 1000,\n                    \"transactionPin\": \"1234\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Place Social Growth Order\n\n              Places a paid social growth order.\n\n              ## Endpoint\n\n              `POST /api/v1/services/social-growth/orders`\n\n              ## What Backend Does\n\n              1. Checks the user's transaction PIN.\n              2. Fetches the live service from VheeBoost.\n              3. Calculates final BillXpress price.\n              4. Debits the user's wallet.\n              5. Sends the order to VheeBoost.\n              6. Saves order and transaction history.\n              7. If provider fails, refunds the user automatically.\n\n              ## Body Fields\n\n              `serviceId`\n              Required. Use the service `id`.\n\n              `link`\n              Required. Social media link the user wants to grow.\n\n              `quantity`\n              Required. Must respect service min and max.\n\n              `transactionPin`\n              Required. User's 4-digit transaction PIN.\n\n              `runs` and `interval`\n              Optional. Only send these if we later support drip-feed services in the UI.\n\n              ## Expected Success Response\n\n              ```json\n              {\n                \"status\": \"successful\",\n                \"message\": \"Social growth order placed successfully\",\n                \"quote\": {\n                  \"sellingPrice\": 1640,\n                  \"profit\": 214.4,\n                  \"markupPercent\": 15\n                },\n                \"order\": {\n                  \"id\": \"...\",\n                  \"provider\": \"vheeboost\",\n                  \"providerOrderId\": \"116\",\n                  \"serviceName\": \"TikTok Likes\",\n                  \"quantity\": 1000,\n                  \"sellingPrice\": 1640,\n                  \"status\": \"processing\"\n                },\n                \"wallet\": {\n                  \"mainBalance\": 5000\n                },\n                \"transaction\": {\n                  \"type\": \"service_payment\",\n                  \"direction\": \"debit\",\n                  \"amount\": 1640,\n                  \"status\": \"successful\"\n                }\n              }\n              ```\n          - info:\n              name: 4. List Social Growth Orders\n              type: http\n              seq: 4\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/social-growth/orders'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              params:\n                - name: limit\n                  value: '50'\n                  type: query\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # List Social Growth Orders\n\n              Shows the logged-in user's social growth order history.\n\n              ## Endpoint\n\n              `GET /api/v1/services/social-growth/orders`\n\n              ## Query\n\n              `limit`\n              Optional. Default is `50`, max is `100`.\n          - info:\n              name: 5. Get Social Growth Order\n              type: http\n              seq: 5\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/social-growth/orders/{{socialGrowthOrderId}}'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Get Social Growth Order\n\n              Fetches one order and syncs its latest status from VheeBoost.\n\n              ## Endpoint\n\n              `GET /api/v1/services/social-growth/orders/:orderId`\n\n              ## Bruno Variable\n\n              Set `socialGrowthOrderId` to the `order.id` returned when placing an order.\n\n              ## Status Values\n\n              Possible backend statuses:\n\n              - `processing`\n              - `in_progress`\n              - `completed`\n              - `partial`\n              - `canceled`\n              - `failed`\n              - `refunded`\n          - info:\n              name: 6. Admin Get Social Growth Settings\n              type: http\n              seq: 6\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/admin/services/social-growth/settings'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Get Social Growth Settings\n\n              Admin uses this to see the active social growth provider and pricing tiers.\n\n              ## Endpoint\n\n              `GET /api/v1/admin/services/social-growth/settings`\n          - info:\n              name: 7. Admin Update Social Growth Settings\n              type: http\n              seq: 7\n            http:\n              method: PATCH\n              url: '{{baseUrl}}/api/v1/admin/services/social-growth/settings'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"isEnabled\": true,\n                    \"activeProvider\": \"vheeboost\",\n                    \"userMarkupPercent\": 15,\n                    \"vendorMarkupPercent\": 10,\n                    \"roundingMode\": \"ceil\",\n                    \"userPricingTiers\": [\n                      { \"minCost\": 0, \"maxCost\": 1000, \"markupPercent\": 15 },\n                      { \"minCost\": 1001, \"maxCost\": 5000, \"markupPercent\": 10 },\n                      { \"minCost\": 5001, \"maxCost\": 15000, \"markupPercent\": 7 },\n                      { \"minCost\": 15001, \"maxCost\": 50000, \"markupPercent\": 5 },\n                      { \"minCost\": 50001, \"maxCost\": null, \"markupPercent\": 3 }\n                    ],\n                    \"vendorPricingTiers\": [\n                      { \"minCost\": 0, \"maxCost\": 1000, \"markupPercent\": 10 },\n                      { \"minCost\": 1001, \"maxCost\": 5000, \"markupPercent\": 7 },\n                      { \"minCost\": 5001, \"maxCost\": 15000, \"markupPercent\": 5 },\n                      { \"minCost\": 15001, \"maxCost\": 50000, \"markupPercent\": 3 },\n                      { \"minCost\": 50001, \"maxCost\": null, \"markupPercent\": 2 }\n                    ]\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Update Social Growth Settings\n\n              Admin uses this endpoint to update social growth pricing.\n\n              ## Endpoint\n\n              `PATCH /api/v1/admin/services/social-growth/settings`\n\n              ## Body Fields\n\n              `isEnabled`\n              Use `true` to allow purchases or `false` to disable social growth.\n\n              `activeProvider`\n              Currently only `vheeboost`.\n\n              `userPricingTiers`\n              Percentage rules for normal users based on provider cost.\n\n              `vendorPricingTiers`\n              Percentage rules for vendors based on provider cost.\n\n              `roundingMode`\n              Use `ceil` to round up to the next naira.\n\n              ## Recommended MVP Tier Structure\n\n              Normal users:\n\n              ```txt\n              cost 0 - 1000        => 15%\n              cost 1001 - 5000     => 10%\n              cost 5001 - 15000    => 7%\n              cost 15001 - 50000   => 5%\n              cost 50001 and above => 3%\n              ```\n\n              Vendors:\n\n              ```txt\n              cost 0 - 1000        => 10%\n              cost 1001 - 5000     => 7%\n              cost 5001 - 15000    => 5%\n              cost 15001 - 50000   => 3%\n              cost 50001 and above => 2%\n              ```\n\n              The frontend user app should not call this endpoint. Only admin dashboard should call it.\n      - info:\n          name: Data\n          type: folder\n          seq: 1\n        docs:\n          content: |-\n            # Data Service\n\n            Data endpoints are separated here so frontend can easily find data plan and data purchase requests.\n\n            Public frontend endpoints:\n\n            ```txt\n            GET  /api/v1/services/data/plans\n            POST /api/v1/services/data/purchase\n            ```\n\n            Admin settings endpoints:\n\n            ```txt\n            GET   /api/v1/admin/services/data/settings\n            PATCH /api/v1/admin/services/data/settings\n            ```\n\n            SME Plug catalogue endpoints:\n\n            ```txt\n            POST  /api/v1/admin/services/data/plans/sync\n            GET   /api/v1/admin/services/data/plans\n            PATCH /api/v1/admin/services/data/plans/:planId\n            ```\n\n            SME Plug plans are synchronized into BillXpress. New plans are disabled by\n            default. Admin sets `ourPrice` and enables only the plans that the hosted SIM\n            can vend. Customer requests return enabled plans only.\n          type: text/markdown\n        items:\n          - info:\n              name: 1. Data Plans\n              type: http\n              seq: 1\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/data/plans'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjgyNDE5NSwiZXhwIjoxNzgzNDI4OTk1fQ.1cVLyOmQtwzpu6WpbQcGA5JqfpgGqBg8eP2srPnr7x8\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Data Plans\n\n              Fetches live data plans from the active backend provider and returns BillXpress selling prices.\n\n              ## Endpoint\n\n              `GET /api/v1/services/data/plans`\n\n              ## Authentication\n\n              Required.\n\n              ```txt\n              Authorization: Bearer {{authToken}}\n              ```\n\n              ## Important For Frontend\n\n              Display `sellingPrice` to the user.\n\n              Do not display `costPrice` as the amount to pay. `costPrice` is included only so admins/testers can understand pricing.\n\n              Do not calculate price on the frontend. The backend already:\n\n              - fetches provider cost price\n              - checks whether the logged-in user is normal user or active vendor\n              - applies the correct tier or fallback markup\n              - rounds the final amount\n              - returns `sellingPrice`\n\n              The backend fetches the live provider price on every request, then applies markup:\n\n              - normal user uses `userPricingTiers` when a matching tier exists\n              - active vendor uses `vendorPricingTiers` when a matching tier exists\n              - if no tier matches, backend falls back to `userMarkupPercent` or `vendorMarkupPercent`\n\n              Each plan returns the exact `markupPercent`, `pricingModel`, `sellingPrice`, and `profit` used for that user.\n\n              ## Fields Frontend Should Use\n\n              `id`\n              Send this value as `planId` when buying data.\n\n              `network`\n              Use this to group plans under MTN, GLO, AIRTEL, or 9MOBILE.\n\n              `name`\n              Display as the bundle size, for example `500MB` or `10GB`.\n\n              `type`\n              Display as plan type, for example `SME`, `Gifting`, or `Corporate`.\n\n              `validity`\n              Display as the plan duration, for example `30 days`.\n\n              `sellingPrice`\n              This is the amount the user will pay from their BillXpress wallet.\n\n              ## Fields Frontend Should Not Use For Payment\n\n              `costPrice`\n              Provider cost price. Do not charge the user this amount.\n\n              `profit`\n              BillXpress earning on this plan. This is useful for admin/testing, but should not be shown to normal users.\n\n              `pricingTier`\n              Shows which admin tier was used. Useful for admin/testing.\n\n              ## Pricing Model Meaning\n\n              `pricingModel: \"tiered\"`\n              A matching admin pricing tier was used.\n\n              `pricingModel: \"flat\"`\n              No tier matched, so backend used `userMarkupPercent` or `vendorMarkupPercent`.\n\n              ## Expected Response\n\n              ```json\n              {\n                \"provider\": \"smeapi\",\n                \"pricing\": {\n                  \"userMarkupPercent\": 15,\n                  \"vendorMarkupPercent\": 10,\n                  \"userPricingTiers\": [\n                    {\n                      \"minCost\": 0,\n                      \"maxCost\": 500,\n                      \"markupPercent\": 15\n                    }\n                  ],\n                  \"vendorPricingTiers\": [\n                    {\n                      \"minCost\": 0,\n                      \"maxCost\": 500,\n                      \"markupPercent\": 10\n                    }\n                  ],\n                  \"appliedPricingModel\": \"tiered\",\n                  \"roundingMode\": \"ceil\"\n                },\n                \"plans\": [\n                  {\n                    \"id\": \"136\",\n                    \"provider\": \"smeapi\",\n                    \"providerPlanId\": \"136\",\n                    \"providerPlanCode\": \"421\",\n                    \"network\": \"GLO\",\n                    \"networkCode\": \"2\",\n                    \"name\": \"500MB\",\n                    \"type\": \"Corporate\",\n                    \"validity\": \"30 days\",\n                    \"validityDays\": 30,\n                    \"costPrice\": 199,\n                    \"sellingPrice\": 229,\n                    \"profit\": 30,\n                    \"markupPercent\": 15,\n                    \"pricingModel\": \"tiered\",\n                    \"pricingTier\": {\n                      \"minCost\": 0,\n                      \"maxCost\": 500,\n                      \"markupPercent\": 15\n                    },\n                    \"available\": true\n                  }\n                ],\n                \"count\": 1\n              }\n              ```\n          - info:\n              name: 2. Purchase Data\n              type: http\n              seq: 2\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/data/purchase'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"planId\": \"409\",\n                    \"phone\": \"08125128766\",\n                    \"transactionPin\": \"1234\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4Mjg0MTQxOCwiZXhwIjoxNzgzNDQ2MjE4fQ.FQBeezvMHRnykuCs6GuLBNOAO1Nxrm7mTFWc62yTp0w\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Purchase Data\n\n              Buys data for a user using their BillXpress wallet balance.\n\n              ## Endpoint\n\n              `POST /api/v1/services/data/purchase`\n\n              ## Authentication\n\n              Required.\n\n              ## Body Fields\n\n              `planId`\n              Required. Use the `id` returned from `Data Plans`.\n\n              `phone`\n              Required. Customer phone number. Must be 11 digits and start with `0`.\n\n              `transactionPin`\n              Required. User's 4-digit transaction PIN.\n\n              ## What Backend Does\n\n              1. Fetches the selected plan live from active provider.\n              2. Calculates the current BillXpress selling price.\n              3. Verifies transaction PIN.\n              4. Debits wallet.\n              5. Calls provider.\n              6. If provider fails, wallet is refunded automatically.\n              7. Sends notification/email.\n\n              ## Success Response\n\n              Status: `201 Created`\n\n              ```json\n              {\n                \"status\": \"successful\",\n                \"message\": \"Data purchase successful\",\n                \"plan\": {\n                  \"id\": \"136\",\n                  \"network\": \"GLO\",\n                  \"name\": \"500MB\",\n                  \"sellingPrice\": 229\n                },\n                \"wallet\": {\n                  \"mainBalance\": 1771\n                },\n                \"transaction\": {\n                  \"type\": \"service_payment\",\n                  \"direction\": \"debit\",\n                  \"amount\": 229,\n                  \"status\": \"successful\",\n                  \"reference\": \"DATA_...\"\n                }\n              }\n              ```\n\n              ## If User Wallet Balance Is Too Low\n\n              This means the user does not have enough money in their BillXpress wallet.\n\n              ```json\n              {\n                \"message\": \"Insufficient wallet balance\"\n              }\n              ```\n\n              Show the user a message like: `Your wallet balance is not enough for this purchase.`\n\n              ## If Provider Is Out Of Funds Or Temporarily Down\n\n              If provider fails after wallet debit, backend refunds the wallet and returns the failed transaction plus refund transaction.\n\n              ```json\n              {\n                \"message\": \"Data purchase is temporarily unavailable. Please try again later. Your wallet has been refunded.\",\n                \"code\": \"provider_insufficient_funds\",\n                \"wallet\": {\n                  \"mainBalance\": 2000\n                },\n                \"transaction\": {\n                  \"status\": \"reversed\"\n                },\n                \"refundTransaction\": {\n                  \"type\": \"reversal\",\n                  \"direction\": \"credit\"\n                }\n              }\n              ```\n\n              Important: `provider_insufficient_funds` is not the user's wallet problem. It means the upstream data provider account or service cannot complete the purchase at that moment.\n\n              The frontend should not tell the user to fund their BillXpress wallet for this error. Show a service-unavailable message and let them try again later.\n          - info:\n              name: 3. Admin Get Data Settings\n              type: http\n              seq: 3\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/admin/services/data/settings'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjgyNDE5NSwiZXhwIjoxNzgzNDI4OTk1fQ.1cVLyOmQtwzpu6WpbQcGA5JqfpgGqBg8eP2srPnr7x8\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Get Data Settings\n\n              Admin checks the active data provider and markup settings.\n\n              Use this request after updating data settings to confirm what is active.\n\n              If `userPricingTiers` or `vendorPricingTiers` is not empty, tiered pricing is enabled.\n\n              If a plan does not match any tier, backend falls back to `userMarkupPercent` or `vendorMarkupPercent`.\n\n              ## Endpoint\n\n              `GET /api/v1/admin/services/data/settings`\n\n              ## Authentication\n\n              Admin JWT required.\n\n              ## Expected Response\n\n              ```json\n              {\n                \"settings\": {\n                  \"service\": \"data\",\n                  \"isEnabled\": true,\n                  \"activeProvider\": \"smeapi\",\n                  \"availableProviders\": [\n                    {\n                      \"name\": \"smeapi\",\n                      \"available\": true\n                    },\n                    {\n                      \"name\": \"ujaydata\",\n                      \"available\": true\n                    }\n                  ],\n                  \"userMarkupPercent\": 15,\n                  \"vendorMarkupPercent\": 10,\n                  \"userPricingTiers\": [\n                    {\n                      \"minCost\": 0,\n                      \"maxCost\": 500,\n                      \"markupPercent\": 15\n                    },\n                    {\n                      \"minCost\": 6001,\n                      \"maxCost\": null,\n                      \"markupPercent\": 3\n                    }\n                  ],\n                  \"vendorPricingTiers\": [\n                    {\n                      \"minCost\": 0,\n                      \"maxCost\": 500,\n                      \"markupPercent\": 10\n                    },\n                    {\n                      \"minCost\": 6001,\n                      \"maxCost\": null,\n                      \"markupPercent\": 2\n                    }\n                  ],\n                  \"roundingMode\": \"ceil\"\n                }\n              }\n              ```\n          - info:\n              name: 4. Admin Update Data Settings\n              type: http\n              seq: 4\n            http:\n              method: PATCH\n              url: '{{baseUrl}}/api/v1/admin/services/data/settings'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"isEnabled\": true,\n                    \"activeProvider\": \"smeapi\",\n                    \"userMarkupPercent\": 15,\n                    \"vendorMarkupPercent\": 10,\n                    \"roundingMode\": \"ceil\",\n                    \"userPricingTiers\": [\n                      { \"minCost\": 0, \"maxCost\": 500, \"markupPercent\": 15 },\n                      { \"minCost\": 501, \"maxCost\": 1500, \"markupPercent\": 10 },\n                      { \"minCost\": 1501, \"maxCost\": 3000, \"markupPercent\": 7 },\n                      { \"minCost\": 3001, \"maxCost\": 6000, \"markupPercent\": 5 },\n                      { \"minCost\": 6001, \"maxCost\": null, \"markupPercent\": 3 }\n                    ],\n                    \"vendorPricingTiers\": [\n                      { \"minCost\": 0, \"maxCost\": 500, \"markupPercent\": 10 },\n                      { \"minCost\": 501, \"maxCost\": 1500, \"markupPercent\": 7 },\n                      { \"minCost\": 1501, \"maxCost\": 3000, \"markupPercent\": 5 },\n                      { \"minCost\": 3001, \"maxCost\": 6000, \"markupPercent\": 3 },\n                      { \"minCost\": 6001, \"maxCost\": null, \"markupPercent\": 2 }\n                    ]\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4Mjc1NjI0OCwiZXhwIjoxNzgzMzYxMDQ4fQ.xw8ljR06PTwyfrEmAvLydSZ7fW1NTTBAAHUd0lEnLqg\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Update Data Settings\n\n              Admin updates data service provider and markup settings.\n\n              Use this request when admin wants to:\n\n              - switch between `smeapi` and `ujaydata`\n              - change normal user fallback percentage\n              - change vendor fallback percentage\n              - configure tiered margins so small plans stay profitable and big plans stay affordable\n\n              This request must be sent as raw JSON with:\n\n              ```txt\n              Content-Type: application/json\n              ```\n\n              If the body is not sent as JSON, the backend will not receive the fields correctly.\n\n              ## Endpoint\n\n              `PATCH /api/v1/admin/services/data/settings`\n\n              ## Authentication\n\n              Admin JWT required.\n\n              ## Body Fields\n\n              `isEnabled`\n              Use `true` to allow data purchases or `false` to temporarily disable data service.\n\n              `activeProvider`\n              Supported values are `smeapi` and `ujaydata`.\n\n              `smeapi` is the primary data provider. `ujaydata` is the backup provider. Admin can switch this value anytime and the frontend endpoints will stay the same.\n\n              `userMarkupPercent`\n              Fallback percentage for normal users. Backend uses this only when no `userPricingTiers` range matches the provider `costPrice`.\n\n              `vendorMarkupPercent`\n              Fallback percentage for active vendors. Backend uses this only when no `vendorPricingTiers` range matches the provider `costPrice`.\n\n              `userPricingTiers`\n              Optional tiered percentage rules for normal users.\n\n              `vendorPricingTiers`\n              Optional tiered percentage rules for vendors.\n\n              Each tier has:\n\n              - `minCost`: provider cost price must be at least this amount\n              - `maxCost`: provider cost price must be at most this amount\n              - `markupPercent`: percentage to add when this tier matches\n\n              Use `maxCost: null` for the last tier when there is no upper limit.\n\n              `roundingMode`\n              Use `ceil` to round up to the next naira, or `round` to round normally.\n\n              ## Recommended MVP Tier Structure\n\n              Normal users:\n\n              ```txt\n              cost 0 - 500        => 15%\n              cost 501 - 1500     => 10%\n              cost 1501 - 3000    => 7%\n              cost 3001 - 6000    => 5%\n              cost 6001 and above => 3%\n              ```\n\n              Vendors:\n\n              ```txt\n              cost 0 - 500        => 10%\n              cost 501 - 1500     => 7%\n              cost 1501 - 3000    => 5%\n              cost 3001 - 6000    => 3%\n              cost 6001 and above => 2%\n              ```\n\n              This keeps small bundles profitable but stops big bundles from becoming too expensive.\n\n              ## Example\n\n              To switch to UjayData with tiered pricing:\n\n              ```json\n              {\n                \"isEnabled\": true,\n                \"activeProvider\": \"ujaydata\",\n                \"userMarkupPercent\": 15,\n                \"vendorMarkupPercent\": 10,\n                \"roundingMode\": \"ceil\",\n                \"userPricingTiers\": [\n                  { \"minCost\": 0, \"maxCost\": 500, \"markupPercent\": 15 },\n                  { \"minCost\": 501, \"maxCost\": 1500, \"markupPercent\": 10 },\n                  { \"minCost\": 1501, \"maxCost\": 3000, \"markupPercent\": 7 },\n                  { \"minCost\": 3001, \"maxCost\": 6000, \"markupPercent\": 5 },\n                  { \"minCost\": 6001, \"maxCost\": null, \"markupPercent\": 3 }\n                ],\n                \"vendorPricingTiers\": [\n                  { \"minCost\": 0, \"maxCost\": 500, \"markupPercent\": 10 },\n                  { \"minCost\": 501, \"maxCost\": 1500, \"markupPercent\": 7 },\n                  { \"minCost\": 1501, \"maxCost\": 3000, \"markupPercent\": 5 },\n                  { \"minCost\": 3001, \"maxCost\": 6000, \"markupPercent\": 3 },\n                  { \"minCost\": 6001, \"maxCost\": null, \"markupPercent\": 2 }\n                ]\n              }\n              ```\n\n              To remove tiered pricing and use flat percentages only:\n\n              ```json\n              {\n                \"isEnabled\": true,\n                \"activeProvider\": \"smeapi\",\n                \"userMarkupPercent\": 15,\n                \"vendorMarkupPercent\": 10,\n                \"roundingMode\": \"ceil\",\n                \"userPricingTiers\": [],\n                \"vendorPricingTiers\": []\n              }\n              ```\n\n              ## Price Calculation\n\n              If provider cost is `199` and the matched markup is `15%`:\n\n              ```txt\n              199 + 15% = 228.85\n              ceil = 229\n              sellingPrice = 229\n              profit = 30\n              ```\n\n              If provider cost is `10700` and the matched markup is `3%`:\n\n              ```txt\n              10700 + 3% = 11021\n              sellingPrice = 11021\n              profit = 321\n              ```\n\n              Without tiered pricing, 15% on `10700` would produce `12305`, which is too expensive for large packages.\n\n              ## Frontend Notes\n\n              The normal user app should not call this endpoint.\n\n              The admin dashboard can call this endpoint to update pricing rules.\n\n              The user app should only fetch final data prices from:\n\n              ```txt\n              GET /api/v1/services/data/plans\n              ```\n\n              The frontend should display `sellingPrice` only. Backend already calculates markup, profit, and tier matching.\n\n              ## Expected Response\n\n              ```json\n              {\n                \"message\": \"Data service settings updated successfully\",\n                \"settings\": {\n                  \"service\": \"data\",\n                  \"isEnabled\": true,\n                  \"activeProvider\": \"ujaydata\",\n                  \"userMarkupPercent\": 15,\n                  \"vendorMarkupPercent\": 10,\n                  \"roundingMode\": \"ceil\",\n                  \"userPricingTiers\": [\n                    {\n                      \"minCost\": 0,\n                      \"maxCost\": 500,\n                      \"markupPercent\": 15\n                    }\n                  ],\n                  \"vendorPricingTiers\": [\n                    {\n                      \"minCost\": 0,\n                      \"maxCost\": 500,\n                      \"markupPercent\": 10\n                    }\n                  ]\n                }\n              }\n              ```\n          - info:\n              name: 5. Admin Sync SME Plug Plans\n              type: http\n              seq: 5\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/admin/services/data/plans/sync'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"provider\": \"smeplug\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjgyNDE5NSwiZXhwIjoxNzgzNDI4OTk1fQ.1cVLyOmQtwzpu6WpbQcGA5JqfpgGqBg8eP2srPnr7x8\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Synchronize SME Plug Plans\n\n              Fetches the current plan catalogue from SME Plug and saves it in BillXpress.\n\n              New plans are created with `isEnabled: false` and `ourPrice: null`. A later\n              synchronization updates provider/network prices but preserves our price,\n              datatype, enabled status, and delivery controls.\n\n              Run this request after configuring `SMEPLUG_API_TOKEN`, and whenever SME Plug\n              changes its plans.\n          - info:\n              name: 6. Admin List Data Plans\n              type: http\n              seq: 6\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/admin/services/data/plans?provider=smeplug'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjgyNDE5NSwiZXhwIjoxNzgzNDI4OTk1fQ.1cVLyOmQtwzpu6WpbQcGA5JqfpgGqBg8eP2srPnr7x8\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin List All SME Plug Plans\n\n              Returns enabled and disabled plans. Copy a plan's `id` into the `dataPlanId`\n              Bruno environment variable before running the update request.\n\n              Optional query filters:\n\n              ```txt\n              network=MTN|AIRTEL|GLO|9MOBILE\n              type=AWOOF|GIFTING|SME|CORPORATE GIFTING|SOCIAL|OTHER\n              isEnabled=true|false\n              providerAvailable=true|false\n              ```\n\n              Example:\n\n              ```txt\n              /api/v1/admin/services/data/plans?provider=smeplug&network=AIRTEL&type=AWOOF\n              ```\n          - info:\n              name: 7. Admin List Airtel Awoof Plans\n              type: http\n              seq: 7\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/admin/services/data/plans?provider=smeplug&network=AIRTEL&type=AWOOF'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjgyNDE5NSwiZXhwIjoxNzgzNDI4OTk1fQ.1cVLyOmQtwzpu6WpbQcGA5JqfpgGqBg8eP2srPnr7x8\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin List Airtel Awoof Plans\n\n              A ready-made filtered request showing all Airtel Awoof plans, including\n              disabled plans. Use the returned database `id`, not `providerPlanId`, when\n              updating a plan.\n          - info:\n              name: 8. Admin Price and Enable Plan\n              type: http\n              seq: 8\n            http:\n              method: PATCH\n              url: '{{baseUrl}}/api/v1/admin/services/data/plans/{{dataPlanId}}'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"ourPrice\": 409,\n                    \"isEnabled\": true,\n                    \"dataType\": \"Awoof\",\n                    \"allowHostedSim\": true,\n                    \"allowWalletFallback\": false\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: dataPlanId\n                  value: 6a43c2270d5823153b9ca3be\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4Mjg0MDYxMiwiZXhwIjoxNzgzNDQ1NDEyfQ.xwe10Ldp1MxxdGrW0mHPQ5gey9N2KfYYgD-ePqAarYc\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Set Our Price and Enable a Plan\n\n              Set `dataPlanId` in the active Bruno environment to the plan's database `id`\n              returned by the admin list request.\n\n              `networkPrice` and `providerPrice` come from SME Plug and cannot be changed\n              here. `ourPrice`, `dataType`, availability, and delivery controls belong to\n              BillXpress and are preserved during synchronization.\n\n              To hide a plan:\n\n              ```json\n              {\n                \"isEnabled\": false\n              }\n              ```\n          - info:\n              name: 9. Customer Airtel Awoof Plans\n              type: http\n              seq: 9\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/data/plans?network=AIRTEL&type=AWOOF'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Customer Airtel Awoof Plans\n\n              Returns only enabled and provider-available Airtel Awoof plans.\n\n              If this returns an empty array, check the admin list and confirm that at least\n              one matching plan has both `ourPrice` set and `isEnabled: true`.\n      - info:\n          name: Airtime\n          type: folder\n          seq: 2\n        docs:\n          content: |-\n            # Airtime Service\n\n            Airtime endpoints are separated here so frontend can easily find airtime network, quote, and purchase requests.\n\n            Public frontend endpoints:\n\n            ```txt\n            GET  /api/v1/services/airtime/networks\n            POST /api/v1/services/airtime/quote\n            POST /api/v1/services/airtime/purchase\n            ```\n\n            Admin settings endpoints:\n\n            ```txt\n            GET   /api/v1/admin/services/airtime/settings\n            PATCH /api/v1/admin/services/airtime/settings\n            ```\n\n            The user chooses a network and enters an airtime amount. The backend calculates BillXpress markup, debits wallet on purchase, and refunds automatically if provider purchase fails.\n          type: text/markdown\n        items:\n          - info:\n              name: 1. Airtime Networks\n              type: http\n              seq: 1\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/airtime/networks'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Airtime Networks\n\n              Returns the supported airtime networks and current pricing settings for the logged-in user.\n\n              ## Endpoint\n\n              `GET /api/v1/services/airtime/networks`\n\n              ## Authentication\n\n              Required.\n\n              ## Expected Response\n\n              ```json\n              {\n                \"provider\": \"ujaydata\",\n                \"pricing\": {\n                  \"userMarkupPercent\": 0,\n                  \"vendorMarkupPercent\": 0,\n                  \"appliedMarkupPercent\": 0,\n                  \"roundingMode\": \"ceil\",\n                  \"minimumAmount\": 50,\n                  \"maximumAmount\": 50000\n                },\n                \"networks\": [\n                  {\n                    \"code\": \"MTN\",\n                    \"name\": \"MTN\",\n                    \"available\": true\n                  },\n                  {\n                    \"code\": \"AIRTEL\",\n                    \"name\": \"Airtel\",\n                    \"available\": true\n                  }\n                ]\n              }\n              ```\n          - info:\n              name: 2. Airtime Quote\n              type: http\n              seq: 2\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/airtime/quote'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"amount\": 100\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQwMTI5MywiZXhwIjoxNzgzMDA2MDkzfQ.jVKiEFVi2G_JwpxZE2dKG7w90FtkZ1Gbzew_zM8XmnI\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Airtime Quote\n\n              Calculates how much the user will pay for an airtime amount.\n\n              ## Endpoint\n\n              `POST /api/v1/services/airtime/quote`\n\n              ## Body Fields\n\n              `amount`\n              Required. Airtime value the user wants to buy.\n\n              ## Expected Response\n\n              If airtime markup is `0%`:\n\n              ```json\n              {\n                \"quote\": {\n                  \"amount\": 100,\n                  \"sellingPrice\": 100,\n                  \"profit\": 0,\n                  \"markupPercent\": 0,\n                  \"roundingMode\": \"ceil\"\n                }\n              }\n              ```\n\n              If airtime markup is `5%`, `sellingPrice` becomes `105`.\n\n              Frontend should display `sellingPrice` as the wallet amount to be deducted.\n          - info:\n              name: 3. Purchase Airtime\n              type: http\n              seq: 3\n            http:\n              method: POST\n              url: '{{baseUrl}}/api/v1/services/airtime/purchase'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"network\": \"MTN\",\n                    \"phone\": \"07047747900\",\n                    \"amount\": 100,\n                    \"transactionPin\": \"1234\"\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQwMTI5MywiZXhwIjoxNzgzMDA2MDkzfQ.jVKiEFVi2G_JwpxZE2dKG7w90FtkZ1Gbzew_zM8XmnI\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Purchase Airtime\n\n              Buys airtime using the user's BillXpress wallet.\n\n              ## Endpoint\n\n              `POST /api/v1/services/airtime/purchase`\n\n              ## Body Fields\n\n              `network`\n              Required. Use one of the network codes from `Airtime Networks`: `MTN`, `AIRTEL`, `GLO`, `9MOBILE`.\n\n              `phone`\n              Required. Customer phone number. Must be 11 digits and start with `0`.\n\n              `amount`\n              Required. Airtime value to buy.\n\n              `transactionPin`\n              Required. User's 4-digit transaction PIN.\n\n              ## What Backend Does\n\n              1. Calculates current selling price.\n              2. Verifies transaction PIN.\n              3. Debits wallet.\n              4. Calls active airtime provider.\n              5. Refunds wallet automatically if provider fails.\n              6. Sends notification/email.\n\n              ## Success Response\n\n              ```json\n              {\n                \"status\": \"successful\",\n                \"message\": \"Airtime purchase successful\",\n                \"network\": {\n                  \"code\": \"MTN\",\n                  \"name\": \"MTN\",\n                  \"available\": true\n                },\n                \"quote\": {\n                  \"amount\": 100,\n                  \"sellingPrice\": 100,\n                  \"profit\": 0,\n                  \"markupPercent\": 0\n                },\n                \"wallet\": {\n                  \"mainBalance\": 900\n                },\n                \"transaction\": {\n                  \"type\": \"service_payment\",\n                  \"direction\": \"debit\",\n                  \"amount\": 100,\n                  \"status\": \"successful\",\n                  \"reference\": \"AIRTIME_...\"\n                }\n              }\n              ```\n\n              ## If User Wallet Balance Is Too Low\n\n              This means the user does not have enough money in their BillXpress wallet.\n\n              ```json\n              {\n                \"message\": \"Insufficient wallet balance\"\n              }\n              ```\n\n              Show the user a message like: `Your wallet balance is not enough for this purchase.`\n\n              ## If Provider Is Out Of Funds Or Temporarily Down\n\n              If provider fails after wallet debit, backend refunds the wallet and returns the failed transaction plus refund transaction.\n\n              ```json\n              {\n                \"message\": \"Airtime purchase is temporarily unavailable. Please try again later. Your wallet has been refunded.\",\n                \"code\": \"provider_insufficient_funds\",\n                \"wallet\": {\n                  \"mainBalance\": 1000\n                },\n                \"transaction\": {\n                  \"status\": \"reversed\"\n                },\n                \"refundTransaction\": {\n                  \"type\": \"reversal\",\n                  \"direction\": \"credit\"\n                }\n              }\n              ```\n\n              Important: `provider_insufficient_funds` is not the user's wallet problem. It means the upstream airtime provider account or service cannot complete the purchase at that moment.\n\n              The frontend should not tell the user to fund their BillXpress wallet for this error. Show a service-unavailable message and let them try again later.\n          - info:\n              name: 4. Admin Get Airtime Settings\n              type: http\n              seq: 4\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/admin/services/airtime/settings'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQ4NzQ0MiwiZXhwIjoxNzgzMDkyMjQyfQ.21Oa5l_l5wnavcl28TBpxdzlrGI9hp9JKtXKGHXC_zY\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Get Airtime Settings\n\n              Admin checks airtime provider and markup settings.\n\n              ## Endpoint\n\n              `GET /api/v1/admin/services/airtime/settings`\n\n              ## Authentication\n\n              Admin JWT required.\n\n              ## Expected Response\n\n              ```json\n              {\n                \"settings\": {\n                  \"service\": \"airtime\",\n                  \"isEnabled\": true,\n                  \"activeProvider\": \"ujaydata\",\n                  \"availableProviders\": [\n                    {\n                      \"name\": \"ujaydata\",\n                      \"available\": true\n                    },\n                    {\n                      \"name\": \"vtpass\",\n                      \"available\": true\n                    }\n                  ],\n                  \"userMarkupPercent\": 0,\n                  \"vendorMarkupPercent\": 0,\n                  \"roundingMode\": \"ceil\",\n                  \"minimumAmount\": 50,\n                  \"maximumAmount\": 50000\n                }\n              }\n              ```\n\n              ## VTpass Env\n\n              To switch airtime to VTpass, configure:\n\n              ```txt\n              VTPASS_BASE_URL=https://vtpass.com/api\n              VTPASS_API_KEY=...\n              VTPASS_SECRET_KEY=...\n              ```\n          - info:\n              name: 5. Admin Update Airtime Settings\n              type: http\n              seq: 5\n            http:\n              method: PATCH\n              url: '{{baseUrl}}/api/v1/admin/services/airtime/settings'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"isEnabled\": true,\n                    \"activeProvider\": \"vtpass\",\n                    \"userMarkupPercent\": 0,\n                    \"vendorMarkupPercent\": 0,\n                    \"roundingMode\": \"ceil\",\n                    \"minimumAmount\": 50,\n                    \"maximumAmount\": 50000\n                  }\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQwMTI5MywiZXhwIjoxNzgzMDA2MDkzfQ.jVKiEFVi2G_JwpxZE2dKG7w90FtkZ1Gbzew_zM8XmnI\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Admin Update Airtime Settings\n\n              Admin updates airtime provider and pricing settings.\n\n              ## Endpoint\n\n              `PATCH /api/v1/admin/services/airtime/settings`\n\n              ## Body Fields\n\n              `isEnabled`\n              Use `true` to allow airtime purchases or `false` to temporarily disable airtime.\n\n              `activeProvider`\n              Supported values are `ujaydata` and `vtpass`.\n\n              Use `vtpass` to route airtime purchases through VTpass. Use `ujaydata` to switch back to the previous airtime provider.\n\n              `userMarkupPercent`\n              Percentage added on top of airtime value for normal users.\n\n              `vendorMarkupPercent`\n              Percentage added on top of airtime value for active vendors.\n\n              `minimumAmount`\n              Minimum airtime value allowed.\n\n              `maximumAmount`\n              Maximum airtime value allowed.\n\n              ## Example\n\n              If user buys `N100` airtime and markup is `5%`:\n\n              ```txt\n              Airtime value: N100\n              Wallet debit: N105\n              BillXpress profit: N5\n              ```\n  - info:\n      name: Users\n      type: folder\n      seq: 4\n    docs:\n      content: |-\n        # User Management APIs\n\n        This folder contains user-side profile management and admin-side user management.\n\n        ## User-Side Endpoints\n\n        These endpoints use the logged-in user's token:\n\n        ```txt\n        GET    /api/v1/users/me\n        PATCH  /api/v1/users/me\n        PATCH  /api/v1/users/me/password\n        POST   /api/v1/users/me/transaction-pin/reset-code\n        PATCH  /api/v1/users/me/transactio
