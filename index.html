ew seconds.\n\n          ## If Payment Is Successful\n\n          ```json\n          {\n            \"message\": \"Payment confirmed and wallet credited\",\n            \"status\": \"paid\",\n            \"alreadyProcessed\": false,\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"status\": \"paid\",\n              \"amount\": 2000,\n              \"fee\": 20,\n              \"amountToReceive\": 2000\n            },\n            \"wallet\": {\n              \"mainBalance\": 2000,\n              \"referralBalance\": 0\n            },\n            \"transaction\": {\n              \"type\": \"funding\",\n              \"direction\": \"credit\",\n              \"amount\": 2000,\n              \"status\": \"successful\"\n            }\n          }\n          ```\n\n          Show success, update the wallet balance, and display the transaction.\n\n          ## If The Account Expired\n\n          ```json\n          {\n            \"message\": \"This funding account has expired. Please create a new funding account.\",\n            \"status\": \"expired\",\n            \"alreadyProcessed\": false,\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"status\": \"expired\"\n            }\n          }\n          ```\n\n          Ask the user to create a fresh funding account.\n      - info:\n          name: 5. Admin Get Maplerad Bank Codes\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/funding/maplerad/institutions?type=DYNAMIC&country=NG'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Get Maplerad Bank Codes\n\n          Admin uses this endpoint to fetch Maplerad institution codes without exposing the Maplerad secret key to the frontend.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/funding/maplerad/institutions?type=DYNAMIC&country=NG`\n\n          ## Authentication\n\n          Admin JWT required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Query Fields\n\n          `type`\n          Use `DYNAMIC` for one-time funding accounts.\n\n          Other useful values:\n\n          - `VIRTUAL` for permanent virtual-account preferred banks\n          - `NUBAN` for Nigerian bank transfer institutions\n\n          `country`\n          Defaults to `NG`.\n\n          ## Expected Response\n\n          ```json\n          {\n            \"country\": \"NG\",\n            \"type\": \"DYNAMIC\",\n            \"institutions\": [\n              {\n                \"name\": \"VFD Bank\",\n                \"code\": \"1241\"\n              }\n            ],\n            \"page\": 1,\n            \"pageSize\": 100,\n            \"total\": 1\n          }\n          ```\n\n          Use one of the returned `code` values as:\n\n          ```txt\n          MAPLERAD_DYNAMIC_ACCOUNT_BANK_CODE=1241\n          ```\n      - info:\n          name: 6. Get Transfer Banks\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/wallet/transfers/banks'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Transfer Banks\n\n          Use this endpoint to show the bank picker for sending money.\n\n          ## Endpoint\n\n          `GET /api/v1/wallet/transfers/banks`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Success Response\n\n          ```json\n          {\n            \"banks\": [\n              {\n                \"name\": \"OPay\",\n                \"slug\": \"opay\",\n                \"bankCode\": \"760\",\n                \"mapleradBankCode\": \"760\",\n                \"availableForTransfer\": true,\n                \"resolverProvider\": \"maplerad\",\n                \"transferProvider\": \"maplerad\"\n              }\n            ],\n            \"meta\": {\n              \"mapleradCount\": 637,\n              \"availableCount\": 637,\n              \"cacheTtlMs\": 3600000,\n              \"resolverProvider\": \"maplerad\",\n              \"transferProvider\": \"maplerad\"\n            },\n            \"cached\": false\n          }\n          ```\n\n          ## Frontend Flow\n\n          - call this endpoint when opening the send money screen\n          - user selects a bank from `banks`\n          - call resolve account with `bank.mapleradBankCode` or `bank.bankCode`\n          - show returned account name\n          - call send transfer with `mapleradBankCode`\n\n          The list is powered by Maplerad NUBAN institutions.\n      - info:\n          name: 7. Suggest Transfer Banks\n          type: http\n          seq: 7\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/transfers/suggest-banks'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"accountNumber\": \"0123456789\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Suggest Transfer Banks\n\n          Use this endpoint while the user is typing a 10 digit account number.\n\n          This endpoint does not resolve account name and does not call Maplerad account resolve. It only suggests likely banks from popular Nigerian banks using checksum validation.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/transfers/suggest-banks`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Request Body\n\n          ```json\n          {\n            \"accountNumber\": \"0123456789\"\n          }\n          ```\n\n          ## Success Response\n\n          ```json\n          {\n            \"accountNumber\": \"0123456789\",\n            \"suggestions\": [\n              {\n                \"name\": \"Guaranty Trust Bank\",\n                \"slug\": \"gtbank\",\n                \"bankCode\": \"280\",\n                \"mapleradBankCode\": \"280\",\n                \"availableForTransfer\": true,\n                \"resolverProvider\": \"maplerad\",\n                \"transferProvider\": \"maplerad\",\n                \"confidence\": \"checksum\"\n              }\n            ],\n            \"meta\": {\n              \"method\": \"nuban_checksum\",\n              \"accountNameResolved\": false,\n              \"checkedBanks\": 19\n            }\n          }\n          ```\n\n          ## Frontend Behavior\n\n          - call this only after the user has typed 10 digits\n          - if `suggestions` has items, show them as bank suggestions\n          - if `suggestions` is empty, show nothing and let user select bank manually\n          - after user selects a bank, call `Resolve Transfer Account` to fetch account name\n\n          ## Important\n\n          This endpoint is best-effort. Some wallets and microfinance banks may not be detectable from account number alone, so an empty suggestion list is normal.\n      - info:\n          name: 8. Resolve Transfer Account\n          type: http\n          seq: 8\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/transfers/resolve-account'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"bankCode\": \"280\",\n                \"accountNumber\": \"0123456789\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Resolve Transfer Account\n\n          Use this endpoint before sending money to a Nigerian bank account.\n\n          The frontend sends the selected Maplerad bank code and account number. The backend uses Maplerad to fetch the account name.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/transfers/resolve-account`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Request Body\n\n          ```json\n          {\n            \"bankCode\": \"280\",\n            \"accountNumber\": \"0123456789\"\n          }\n          ```\n\n          ## Important\n\n          `bankCode` must be the Maplerad bank code returned from `GET /api/v1/wallet/transfers/banks`.\n\n          ## Success Response\n\n          ```json\n          {\n            \"message\": \"Account resolved successfully\",\n            \"account\": {\n              \"accountNumber\": \"0123456789\",\n              \"accountName\": \"JOHN DOE\",\n              \"bankCode\": \"280\",\n              \"provider\": \"maplerad\"\n            }\n          }\n          ```\n\n          ## Frontend Flow\n\n          - user selects bank\n          - user enters 10 digit account number\n          - call this endpoint with `bank.mapleradBankCode` or `bank.bankCode`\n          - show `account.accountName`\n          - user confirms and enters PIN\n          - backend sends the final transfer through Maplerad later\n      - info:\n          name: 9. Send Bank Transfer\n          type: http\n          seq: 9\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/transfers'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"amount\": 100,\n                \"accountNumber\": \"8125128766\",\n                \"accountName\": \"imo boniface ben\",\n                \"mapleradBankCode\": \"710\",\n                \"narration\": \"BillXpress transfer\",\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Send Bank Transfer\n\n          Use this endpoint after resolving the account name and after the user enters transaction PIN.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/transfers`\n\n          ## Authentication\n\n          Required. The user must have a verified email and BillXpress `tier_3`.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Request Body\n\n          ```json\n          {\n            \"amount\": 100,\n            \"accountNumber\": \"0123456789\",\n            \"accountName\": \"JOHN DOE\",\n            \"mapleradBankCode\": \"280\",\n            \"narration\": \"BillXpress transfer\",\n            \"transactionPin\": \"1234\"\n          }\n          ```\n\n          ## Important\n\n          `mapleradBankCode` is used by the backend to verify the account name again and send the transfer through Maplerad.\n\n          ## Backend Flow\n\n          - verifies transaction PIN\n          - resolves the account name again with Maplerad\n          - rejects the request if the account name changed\n          - debits the user's main wallet\n          - calls Maplerad transfer\n          - returns successful or processing\n          - refunds automatically if Maplerad rejects immediately\n          - later Maplerad transfer webhook can mark pending transfers successful or refunded\n\n          ## Success Response\n\n          ```json\n          {\n            \"status\": \"pending\",\n            \"message\": \"Transfer is processing\",\n            \"account\": {\n              \"accountNumber\": \"0123456789\",\n              \"accountName\": \"JOHN DOE\"\n            },\n            \"wallet\": {},\n            \"transaction\": {}\n          }\n          ```\n      - info:\n          name: Internal - PocketFi Webhook\n          type: http\n          seq: 90\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/webhooks/pocketfi'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: HTTP_POCKETFI_SIGNATURE\n              value: '{{pocketfiSignature}}'\n          body:\n            type: json\n            data: |-\n              {\n                \"reference\": \"provider-reference\",\n                \"amount\": 1000,\n                \"accountNumber\": \"0742053373\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Internal - PocketFi Webhook\n\n          PocketFi calls this endpoint after a user transfers money into their virtual account.\n\n          This is internal backend/provider traffic. The frontend should not call this endpoint.\n      - info:\n          name: Internal - Monnify Webhook\n          type: http\n          seq: 91\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/webhooks/monnify'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: monnify-signature\n              value: '{{monnifySignature}}'\n          body:\n            type: json\n            data: |-\n              {\n                \"eventType\": \"SUCCESSFUL_TRANSACTION\",\n                \"eventData\": {\n                  \"paymentReference\": \"MNFUND_...\",\n                  \"transactionReference\": \"MNF...\",\n                  \"amountPaid\": 2000,\n                  \"paymentStatus\": \"PAID\"\n                }\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Internal - Monnify Webhook\n\n          Monnify calls this endpoint when a one-time funding transfer is paid.\n\n          This is internal backend/provider traffic. The frontend should not call this endpoint.\n      - info:\n          name: 92. Maplerad Webhook\n          type: http\n          seq: 92\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/webhooks/maplerad'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: svix-id\n              value: '{{mapleradSvixId}}'\n            - name: svix-timestamp\n              value: '{{mapleradSvixTimestamp}}'\n            - name: svix-signature\n              value: '{{mapleradSvixSignature}}'\n          body:\n            type: json\n            data: |-\n              {\n                \"event\": \"account.transaction\",\n                \"id\": \"provider-transaction-id\",\n                \"amount\": 200000,\n                \"account_id\": \"maplerad-account-id\",\n                \"account_number\": \"9003001001\",\n                \"status\": \"SUCCESS\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Internal - Maplerad Webhook\n\n          Maplerad calls this endpoint for one-time funding, dedicated account funding, transfer status, and future card/account events.\n\n          This is internal backend/provider traffic. The frontend should not call this endpoint.\n\n          ## Endpoint\n\n          `POST /api/v1/webhooks/maplerad`\n\n          ## Dedicated Account Funding\n\n          When Maplerad sends `account.transaction`, the backend now:\n\n          - verifies the Svix signature\n          - matches the Maplerad account ID or account number to a saved virtual account\n          - checks duplicate provider reference\n          - credits the user's main wallet\n          - creates transaction history\n          - sends a wallet funding notification\n\n          ## Bank Transfer Status\n\n          For `transfer.successful`, the backend marks the matching pending transfer as successful.\n\n          For `transfer.failed`, the backend marks the matching pending transfer as reversed and refunds the user's wallet.\n\n          ## Required Headers\n\n          Maplerad/Svix sends:\n\n          ```txt\n          svix-id\n          svix-timestamp\n          svix-signature\n          ```\n\n          The backend verifies these using:\n\n          ```txt\n          MAPLERAD_WEBHOOK_SECRET\n          ```\n  - info:\n      name: Earnings\n      type: folder\n      seq: 8\n    docs:\n      content: |-\n        # Earnings\n\n        Admin dashboard finance and service performance endpoints.\n\n        This folder covers platform earnings, cost price, selling price, profit, failed/reversed purchase losses, chart series, and per-service breakdowns.\n\n        ## Current Endpoint\n\n        ```txt\n        GET /api/v1/admin/dashboard/earnings\n        ```\n\n        ## Authentication\n\n        Admin JWT required:\n\n        ```txt\n        Authorization: Bearer {{authToken}}\n        ```\n\n        ## Dashboard Coverage\n\n        The endpoint returns:\n\n        - all-time totals\n        - today totals\n        - this week totals\n        - this month totals\n        - per-service totals for data, airtime, social growth, and future services\n        - daily chart series\n        - weekly chart series\n        - monthly chart series\n\n        ## Recommended Admin Dashboard Layout\n\n        Main cards:\n\n        - Today earned\n        - Today profit\n        - This week earned\n        - This week profit\n        - This month earned\n        - This month profit\n        - Loss amount\n        - Loss percentage\n\n        Service performance table:\n\n        - Service name\n        - Earned\n        - Cost price\n        - Selling price\n        - Profit\n        - Profit margin percentage\n        - Successful count\n        - Failed/reversed count\n\n        ## Services Included\n\n        Current services:\n\n        - `data`\n        - `airtime`\n        - `social_growth`\n\n        Future services are included automatically if the purchase transaction is saved as `type: \"service_payment\"` and includes:\n\n        ```json\n        {\n          \"metadata\": {\n            \"service\": \"electricity\",\n            \"costPrice\": 1000,\n            \"sellingPrice\": 1100,\n            \"profit\": 100\n          }\n        }\n        ```\n\n        No new dashboard endpoint is needed for future services. They will appear inside the `services` array using their `metadata.service` value.\n\n        ## Future Service Keys\n\n        Use stable snake_case service keys so the admin dashboard can label and filter services properly:\n\n        - `electricity`\n        - `cable_tv`\n        - `betting`\n        - `esim`\n        - `bulk_sms`\n        - `virtual_card`\n        - `education`\n\n        Each future service should save `costPrice`, `sellingPrice`, and `profit` at purchase time. Do not calculate historical profit from current admin settings.\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Admin Dashboard Earnings\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/dashboard/earnings'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Dashboard Earnings\n\n          Admin dashboard endpoint for revenue, cost price, selling price, profit, loss, service breakdown, provider balances, and chart series.\n\n          This endpoint is designed for the admin dashboard earnings/profit cards and charts.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/dashboard/earnings`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## What This Endpoint Counts\n\n          The backend reads successful, failed, and reversed `service_payment` wallet debit transactions.\n\n          It uses the pricing values saved at purchase time inside transaction metadata:\n\n          ```json\n          {\n            \"service\": \"data\",\n            \"costPrice\": 120,\n            \"sellingPrice\": 132,\n            \"profit\": 12,\n            \"customerReference\": \"vendor-data-001\"\n          }\n          ```\n\n          This means historical dashboard numbers are based on the exact cost and selling price used when the customer bought the service, not the current admin settings.\n\n          ## Services Covered\n\n          Current services:\n\n          - `data`\n          - `airtime`\n          - `social_growth`\n\n          Future services are automatically covered when their purchase transactions are saved as:\n\n          ```json\n          {\n            \"type\": \"service_payment\",\n            \"direction\": \"debit\",\n            \"metadata\": {\n              \"service\": \"electricity\",\n              \"costPrice\": 1000,\n              \"sellingPrice\": 1100,\n              \"profit\": 100\n            }\n          }\n          ```\n\n          The new service will appear in the `services` breakdown without creating a new dashboard endpoint.\n\n          ## Provider Balances\n\n          `providerBalances`\n          Current external provider wallet balances for admin visibility.\n\n          The dashboard currently includes SMEAPI:\n\n          ```json\n          {\n            \"providerBalances\": {\n              \"smeapi\": {\n                \"provider\": \"smeapi\",\n                \"accountName\": \"Concept Richie\",\n                \"balance\": 12860.5,\n                \"currency\": \"NGN\",\n                \"status\": \"success\",\n                \"available\": true,\n                \"checkedAt\": \"2026-06-15T04:58:00.000Z\"\n              }\n            }\n          }\n          ```\n\n          If SMEAPI balance check fails, the dashboard endpoint still succeeds and returns:\n\n          ```json\n          {\n            \"providerBalances\": {\n              \"smeapi\": {\n                \"provider\": \"smeapi\",\n                \"available\": false,\n                \"error\": \"SMEAPI request failed\",\n                \"checkedAt\": \"2026-06-15T04:58:00.000Z\"\n              }\n            }\n          }\n          ```\n\n          Frontend should display `providerBalances.smeapi.balance` as the SMEAPI wallet balance when `available` is `true`. If `available` is `false`, show a small unavailable/error state instead of hiding the whole dashboard.\n\n          ## Summary Fields\n\n          `earned`\n          Total successful service sales amount.\n\n          `revenue`\n          Same value as `earned`. Included for dashboard naming flexibility.\n\n          `costPrice`\n          Total provider/base cost for successful service purchases.\n\n          `sellingPrice`\n          Total customer/vendor selling price for successful service purchases.\n\n          `profit`\n          Total profit from successful purchases.\n\n          `lossAmount`\n          Selling value of failed/reversed service purchases.\n\n          `lostProfit`\n          Profit that would have been earned if failed/reversed purchases succeeded.\n\n          `lossPercentage`\n          Percentage of failed/reversed value compared with total attempted value.\n\n          `profitMarginPercentage`\n          Profit as a percentage of earned revenue.\n\n          `successfulCount`, `failedCount`, `reversedCount`, `totalCount`\n          Transaction counts used for dashboard status cards.\n\n          `averageSellingPrice`\n          Average successful sale value.\n\n          ## Response Shape\n\n          `summary.allTime`\n          All service earnings from all time.\n\n          `summary.today`\n          All service earnings from today.\n\n          `summary.thisWeek`\n          All service earnings for the current week.\n\n          `summary.thisMonth`\n          All service earnings for the current month.\n\n          `services`\n          Per-service breakdown. This is where the admin dashboard can show data, airtime, social growth, and future services separately.\n\n          Each item in `services` has the same finance fields as a summary bucket:\n\n          - `earned`\n          - `costPrice`\n          - `sellingPrice`\n          - `profit`\n          - `lossAmount`\n          - `lostProfit`\n          - `lossPercentage`\n          - `profitMarginPercentage`\n          - `successfulCount`\n          - `failedCount`\n          - `reversedCount`\n          - `totalCount`\n          - `averageSellingPrice`\n\n          Use this array for a service performance table or individual service cards.\n\n          `series.daily`\n          Last 7 daily buckets for charts.\n\n          `series.weekly`\n          Last 8 weekly buckets for charts.\n\n          `series.monthly`\n          Last 12 monthly buckets for charts.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"currency\": \"NGN\",\n            \"generatedAt\": \"2026-06-09T14:00:00.000Z\",\n            \"providerBalances\": {\n              \"smeapi\": {\n                \"provider\": \"smeapi\",\n                \"accountName\": \"Concept Richie\",\n                \"balance\": 12860.5,\n                \"currency\": \"NGN\",\n                \"status\": \"success\",\n                \"available\": true,\n                \"checkedAt\": \"2026-06-15T04:58:00.000Z\"\n              }\n            },\n            \"summary\": {\n              \"allTime\": {\n                \"earned\": 15000,\n                \"revenue\": 15000,\n                \"costPrice\": 12000,\n                \"sellingPrice\": 15000,\n                \"profit\": 3000,\n                \"lossAmount\": 0,\n                \"lostProfit\": 0,\n                \"lossPercentage\": 0,\n                \"profitMarginPercentage\": 20,\n                \"successfulCount\": 10,\n                \"failedCount\": 0,\n                \"reversedCount\": 0,\n                \"totalCount\": 10,\n                \"averageSellingPrice\": 1500\n              }\n            },\n            \"services\": [\n              {\n                \"service\": \"data\",\n                \"earned\": 8000,\n                \"revenue\": 8000,\n                \"costPrice\": 7000,\n                \"sellingPrice\": 8000,\n                \"profit\": 1000,\n                \"lossAmount\": 132,\n                \"lostProfit\": 12,\n                \"lossPercentage\": 1.62,\n                \"profitMarginPercentage\": 12.5,\n                \"successfulCount\": 6,\n                \"failedCount\": 0,\n                \"reversedCount\": 1,\n                \"totalCount\": 7,\n                \"averageSellingPrice\": 1333.33\n              },\n              {\n                \"service\": \"airtime\",\n                \"earned\": 3000,\n                \"revenue\": 3000,\n                \"costPrice\": 2800,\n                \"sellingPrice\": 3000,\n                \"profit\": 200,\n                \"lossAmount\": 0,\n                \"lostProfit\": 0,\n                \"lossPercentage\": 0,\n                \"profitMarginPercentage\": 6.67,\n                \"successfulCount\": 4,\n                \"failedCount\": 0,\n                \"reversedCount\": 0,\n                \"totalCount\": 4,\n                \"averageSellingPrice\": 750\n              },\n              {\n                \"service\": \"social_growth\",\n                \"earned\": 4000,\n                \"revenue\": 4000,\n                \"costPrice\": 2200,\n                \"sellingPrice\": 4000,\n                \"profit\": 1800,\n                \"lossAmount\": 0,\n                \"lostProfit\": 0,\n                \"lossPercentage\": 0,\n                \"profitMarginPercentage\": 45,\n                \"successfulCount\": 2,\n                \"failedCount\": 0,\n                \"reversedCount\": 0,\n                \"totalCount\": 2,\n                \"averageSellingPrice\": 2000\n              }\n            ],\n            \"series\": {\n              \"daily\": [\n                {\n                  \"period\": \"2026-06-09\",\n                  \"startDate\": \"2026-06-09T00:00:00.000Z\",\n                  \"earned\": 15000,\n                  \"revenue\": 15000,\n                  \"costPrice\": 12000,\n                  \"sellingPrice\": 15000,\n                  \"profit\": 3000,\n                  \"lossAmount\": 0,\n                  \"lostProfit\": 0,\n                  \"lossPercentage\": 0,\n                  \"profitMarginPercentage\": 20,\n                  \"successfulCount\": 10,\n                  \"failedCount\": 0,\n                  \"reversedCount\": 0,\n                  \"totalCount\": 10,\n                  \"averageSellingPrice\": 1500\n                }\n              ],\n              \"weekly\": [],\n              \"monthly\": []\n            }\n          }\n          ```\n\n          ## Frontend Usage Notes\n\n          Use `summary.today`, `summary.thisWeek`, and `summary.thisMonth` for the main dashboard cards.\n\n          Use `providerBalances.smeapi` for the admin card that shows our SMEAPI wallet balance:\n\n          - Show `balance` formatted as NGN when `available` is `true`.\n          - Show `accountName` as the provider account label if needed.\n          - Show `checkedAt` as the last refresh time.\n          - If `available` is `false`, show the balance as unavailable and optionally show `error` to admins only.\n\n          Use `services` for per-service cards or tables:\n\n          - Data earnings/profit\n          - Airtime earnings/profit\n          - Social growth earnings/profit\n          - Future services such as electricity, cable TV, betting, eSIM, cards, or bulk SMS\n\n          Use `series.daily`, `series.weekly`, and `series.monthly` for charts.\n\n          ## Service Labels\n\n          The backend returns stable service keys. The frontend can display them with friendly labels:\n\n          ```json\n          {\n            \"data\": \"Data\",\n            \"airtime\": \"Airtime\",\n            \"social_growth\": \"Social Growth\",\n            \"electricity\": \"Electricity\",\n            \"cable_tv\": \"Cable TV\",\n            \"betting\": \"Betting\",\n            \"esim\": \"eSIM\",\n            \"bulk_sms\": \"Bulk SMS\",\n            \"virtual_card\": \"Virtual Card\",\n            \"education\": \"Education\"\n          }\n          ```\n\n          ## Future Integration Rule\n\n          When adding a new service, save the exact purchase pricing on the service payment transaction:\n\n          ```json\n          {\n            \"type\": \"service_payment\",\n            \"direction\": \"debit\",\n            \"status\": \"successful\",\n            \"metadata\": {\n              \"service\": \"electricity\",\n              \"costPrice\": 1000,\n              \"sellingPrice\": 1100,\n              \"profit\": 100,\n              \"customerReference\": \"optional-vendor-reference\"\n            }\n          }\n          ```\n\n          If the provider fails and the wallet is refunded, keep the original transaction as `status: \"reversed\"`. The dashboard uses reversed/failed service payments to calculate loss amount and lost profit.\n  - info:\n      name: Referrals\n      type: folder\n      seq: 5\n    docs:\n      content: |-\n        # Referral APIs\n\n        Use this folder for everything related to referrals:\n\n        - showing the user's referral code\n        - showing referral earning stats\n        - showing users they referred\n        - showing referral reward history\n        - admin auditing referral rewards\n\n        ## Simple Explanation\n\n        User A invites User B with User A's referral code.\n\n        User A does **not** earn when User B only registers.\n\n        User A earns only when User B makes their **first successful wallet funding**.\n\n        ## Reward Rule\n\n        If User A refers User B, User A earns a percentage of User B's first successful deposit only once.\n\n        Current default:\n\n        ```txt\n        REFERRAL_FIRST_DEPOSIT_REWARD_PERCENT=3\n        ```\n\n        Example:\n\n        ```txt\n        User B first deposit: NGN 1,000\n        User A reward: 3% = NGN 30\n        ```\n\n        The reward is credited to User A's `referralBalance`.\n\n        ## Where Referral Code Comes From\n\n        The user's referral code is returned in login/register/current-user responses:\n\n        ```json\n        {\n          \"user\": {\n            \"referralCode\": \"IMO5751\"\n          }\n        }\n        ```\n\n        The frontend can also call:\n\n        ```txt\n        GET /api/v1/referrals/summary\n        ```\n\n        and use `referral.referralCode`.\n\n        ## How A New User Uses A Referral Code\n\n        During registration, send the inviter's code as `referredBy`:\n\n        ```json\n        {\n          \"firstName\": \"Ben\",\n          \"lastName\": \"User\",\n          \"username\": \"benuser\",\n          \"email\": \"ben@example.com\",\n          \"phone\": \"08012345678\",\n          \"password\": \"Password123\",\n          \"confirmPassword\": \"Password123\",\n          \"transactionPin\": \"1234\",\n          \"referredBy\": \"IMO5751\"\n        }\n        ```\n\n        If there is no referral code, send an empty string or do not send `referredBy`.\n\n        ## When Reward Is Created\n\n        Reward is created automatically by the backend after first successful funding through:\n\n        - PocketFi virtual account webhook\n        - Monnify webhook\n        - Monnify confirm payment endpoint\n\n        The frontend must not calculate or credit referral reward itself.\n\n        ## Frontend Suggested Screens\n\n        Referral dashboard:\n\n        - call `Referral Summary`\n        - show referral code\n        - show referral balance\n        - show total earned\n        - show pending referrals\n        - show qualified rewards\n\n        Referral history:\n\n        - call `Referral Rewards`\n        - show each reward and amount earned\n\n        Referred users:\n\n        - call `Referred Users`\n        - show who signed up and whether they qualified\n\n        ## Redeem Rule\n\n        Referral balance is not withdrawn outside the platform. Users redeem referral balance into their main spending wallet.\n\n        There is no minimum redeem threshold. Users can redeem any positive referral balance they have earned.\n\n        To redeem referral balance, use the wallet endpoint:\n\n        ```txt\n        POST /api/v1/wallet/referral/redeem\n        ```\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Referral Summary\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/referrals/summary'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Referral Summary\n\n          Use this endpoint for the referral dashboard screen.\n\n          It returns the logged-in user's referral code, reward settings, referral balance, and referral stats.\n\n          ## Endpoint\n\n          `GET /api/v1/referrals/summary`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Request Body\n\n          No body is required.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"referral\": {\n              \"referralCode\": \"IMO5751\",\n              \"settings\": {\n                \"firstDepositRewardPercent\": 3,\n                \"minimumRedeemAmount\": 0\n              },\n              \"referredUsersCount\": 5,\n              \"qualifiedRewardsCount\": 2,\n              \"pendingReferralsCount\": 3,\n              \"totalReferralEarned\": 60,\n              \"referralBalance\": 60\n            }\n          }\n          ```\n\n          ## Response Field Meaning\n\n          `referralCode`\n          The code this user shares with friends.\n\n          `settings.firstDepositRewardPercent`\n          The percentage reward the referrer earns from the referred user's first successful deposit.\n\n          `settings.minimumRedeemAmount`\n          Minimum referral balance that can be moved into the user's main wallet. This is currently `0`, so users can redeem any positive earned referral balance.\n\n          `referredUsersCount`\n          Total users who registered with this user's referral code.\n\n          `qualifiedRewardsCount`\n          How many referred users have made their first successful deposit and generated a reward.\n\n          `pendingReferralsCount`\n          Referred users who registered but have not yet made their first successful deposit.\n\n          `totalReferralEarned`\n          Total referral reward ever earned by this user.\n\n          `referralBalance`\n          Current referral balance available to redeem into main wallet.\n\n          ## Frontend Notes\n\n          Show this endpoint on the referral dashboard.\n\n          Suggested display:\n\n          - referral code with copy/share button\n          - referral balance\n          - total earned\n          - pending referrals\n          - successful referrals\n          - reward rule: `Earn 3% from your friend's first deposit`\n\n          To redeem referral balance, call:\n\n          `POST /api/v1/wallet/referral/redeem`\n      - info:\n          name: 2. Referral Rewards\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/referrals/rewards?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Referral Rewards\n\n          Use this endpoint for the referral earning history screen.\n\n          It lists rewards the logged-in user has earned from referred users' first deposits.\n\n          ## Endpoint\n\n          `GET /api/v1/referrals/rewards`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Query Params\n\n          `page`\n          Optional. Defaults to `1`.\n\n          `limit`\n          Optional. Defaults to `20`. Maximum is `100`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"rewards\": [\n              {\n                \"id\": \"...\",\n                \"trigger\": \"first_deposit\",\n                \"qualifyingAmount\": 1000,\n                \"rewardPercent\": 3,\n                \"rewardAmount\": 30,\n                \"status\": \"successful\",\n                \"referredUser\": {\n                  \"_id\": \"...\",\n                  \"firstName\": \"Ben\",\n                  \"lastName\": \"User\",\n                  \"username\": \"benuser\",\n                  \"email\": \"ben@example.com\"\n                },\n                \"createdAt\": \"...\"\n              }\n            ],\n            \"pagination\": {\n              \"page\": 1,\n              \"limit\": 20,\n              \"total\": 1,\n              \"pages\": 1\n            }\n          }\n          ```\n\n          ## Response Field Meaning\n\n          `qualifyingAmount`\n          Amount the referred user funded on their first successful deposit.\n\n          `rewardPercent`\n          Percentage used to calculate the reward.\n\n          `rewardAmount`\n          Amount credited to the logged-in user's referral wallet.\n\n          `status`\n          `successful` means the referral reward was credited. `failed` means the backend tried but could not complete reward crediting.\n\n          ## Frontend Notes\n\n          Show this as a list of referral earnings.\n\n          Example row:\n\n          ```txt\n          Ben User funded NGN 1,000\n          You earned NGN 30\n          Status: successful\n          ```\n      - info:\n          name: 3. Referred Users\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/referrals/referred-users?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Referred Users\n\n          Use this endpoint to show people the logged-in user has invited.\n\n          It lists users who registered with the logged-in user's referral code and shows whether each user has qualified for reward.\n\n          ## Endpoint\n\n          `GET /api/v1/referrals/referred-users`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Query Params\n\n          `page`\n          Optional. Defaults to `1`.\n\n          `limit`\n          Optional. Defaults to `20`. Maximum is `100`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"referredUsers\": [\n              {\n                \"user\": {\n                  \"id\": \"...\",\n                  \"firstName\": \"Ben\",\n                  \"lastName\": \"User\",\n                  \"username\": \"benuser\",\n                  \"email\": \"ben@example.com\",\n                  \"phone\": \"08012345678\",\n                  \"createdAt\": \"...\"\n                },\n                \"qualified\": true,\n                \"reward\": {\n                  \"id\": \"...\",\n                  \"qualifyingAmount\": 1000,\n                  \"rewardPercent\": 3,\n                  \"rewardAmount\": 30,\n                  \"status\": \"successful\"\n                }\n              }\n            ],\n            \"pagination\": {\n              \"page\": 1,\n              \"limit\": 20,\n              \"total\": 1,\n              \"pages\": 1\n            }\n          }\n          ```\n\n          ## Response Field Meaning\n\n          `qualified`\n          `true` means this referred user has made their first successful deposit and reward has been created.\n\n          `reward`\n          Referral reward record. It is `null` if the referred user has not qualified yet.\n\n          ## Frontend Notes\n\n          Show this as the \"people you invited\" list.\n\n          Suggested status labels:\n\n          - `qualified: true` -> `Reward earned`\n          - `qualified: false` -> `Waiting for first deposit`\n      - info:\n          name: 4. Admin Referral Rewards\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/referrals/rewards?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Referral Rewards\n\n          Admin audit endpoint for referral rewards.\n\n          Use this when admin wants to inspect referral payouts and confirm who earned from whose first deposit.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/referrals/rewards`\n\n          ## Authentication\n\n          Admin JWT required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Query Params\n\n          `status`\n          Optional: `processing`, `successful`, or `failed`.\n\n          `referrerId`\n          Optional. Filter rewards earned by one referrer.\n\n          `referredUserId`\n          Optional. Filter rewards triggered by one referred user.\n\n          `page`\n          Optional. Defaults to `1`.\n\n          `limit`\n          Optional. Defaults to `20`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"rewards\": [\n              {\n                \"id\": \"...\",\n                \"trigger\": \"first_deposit\",\n                \"qualifyingAmount\": 1000,\n                \"rewardPercent\": 3,\n                \"rewardAmount\": 30,\n                \"status\": \"successful\",\n                \"referrer\": {\n                  \"_id\": \"...\",\n                  \"firstName\": \"Imo\",\n                  \"lastName\": \"Ben\",\n                  \"username\": \"imoben\"\n                },\n                \"referredUser\": {\n                  \"_id\": \"...\",\n                  \"firstName\": \"Ben\",\n                  \"lastName\": \"User\",\n                  \"username\": \"benuser\"\n                },\n                \"createdAt\": \"...\"\n              }\n            ],\n            \"pagination\": {\n              \"page\": 1,\n              \"limit\": 20,\n              \"total\": 1,\n              \"pages\": 1\n            },\n            \"settings\": {\n              \"firstDepositRewardPercent\": 3,\n              \"minimumRedeemAmount\": 0\n            }\n          }\n          ```\n\n          ## Admin Notes\n\n          Rewards are created automatically. Admin should not manually create first-deposit rewards.\n\n          A referred user can trigger only one `first_deposit` referral reward.\n  - info:\n      name: Notifications\n      type: folder\n      seq: 3\n    docs:\n      content: |-\n        # Notification APIs\n\n        These endpoints let the app show in-app notifications, popup notifications after login, unread badges, and mobile push notifications.\n\n        This folder also includes admin notification endpoints because they belong to the notification system:\n\n        ```txt\n        POST /api/v1/admin/notifications\n        GET /api/v1/admin/notifications\n        ```\n\n        ## How Push Notifications Work\n\n        The React Native app must first get a push token from its push provider, then register it with the backend:\n\n        ```txt\n        POST /api/v1/notifications/devices\n        ```\n\n        After that, the backend can send push notifications when:\n\n        - user logs in\n        - admin creates an announcement\n        - wallet funding succeeds\n        - referral reward is credited\n        - future service purchase succeeds or fails\n\n        For v1, backend supports Expo push tokens with:\n\n        ```json\n        {\n          \"provider\": \"expo\"\n        }\n        ```\n\n        If the app uses bare React Native Firebase later, we can add FCM server delivery while keeping the same device-token endpoint.\n\n        ## Email Notifications\n\n        Email notifications use Brevo.\n\n        Login security notification is enabled by default:\n\n        ```txt\n        AUTH_LOGIN_NOTIFICATION_ENABLED=true\n        AUTH_LOGIN_NOTIFICATION_CHANNEL=both\n        ```\n\n        `both` means in-app + push + email attempt. If Brevo is not configured on the deployed server, in-app notification still works but email delivery will fail silently and be stored on the notification delivery status.\n\n        ## Email Design\n\n        Backend email notifications now use one shared BillXpress template for all emails.\n\n        The design is a centered email card with:\n\n        - orange top border\n        - very light orange header\n        - BillXpress logo on the left\n        - `Need Help? Click here for support` on the right\n        - message content\n        - support email/phone\n        - app store buttons when links are configured\n        - social media buttons\n\n        To show the exact logo in the email header, upload the logo somewhere public and set:\n\n        ```txt\n        BILLXPRESS_LOGO_URL=https://yourdomain.com/billxpress-logo.png\n        ```\n\n        If `BILLXPRESS_LOGO_URL` is empty, the email still works but shows a text fallback logo.\n\n        By default, the links point to `billxpress` handles:\n\n        ```txt\n        BILLXPRESS_SUPPORT_EMAIL=support@billxpress.com\n        BILLXPRESS_SUPPORT_PHONE=\n        BILLXPRESS_SUPPORT_URL=\n        BILLXPRESS_APP_STORE_URL=\n        BILLXPRESS_PLAY_STORE_URL=\n        BILLXPRESS_X_URL=https://x.com/billxpress\n        BILLXPRESS_INSTAGRAM_URL=https://instagram.com/billxpress\n        BILLXPRESS_FACEBOOK_URL=https://facebook.com/billxpress\n        BILLXPRESS_LINKEDIN_URL=https://linkedin.com/company/billxpress\n        ```\n\n        If the sender name still shows with the old lowercase brand spelling in a live email, update this Railway/Brevo environment value:\n\n        ```txt\n        BREVO_SENDER_NAME=BillXpress\n        ```\n\n        ## Popup Notifications After Login\n\n        After login or app unlock, frontend can call:\n\n        ```txt\n        GET /api/v1/notifications/popup\n        ```\n\n        Show returned notifications as popup cards/modals. After displaying a popup, call:\n\n        ```txt\n        PATCH /api/v1/notifications/:notificationId/seen\n        ```\n\n        This prevents the same popup from showing repeatedly.\n\n        ## Read vs Seen\n\n        `seenAt` means the frontend has displayed the notification popup.\n\n        `readAt` means the user opened/read the notification in the notification center.\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Register Device Token\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/notifications/devices'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"token\": \"ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]\",\n                \"provider\": \"expo\",\n                \"platform\": \"android\",\n                \"deviceName\": \"Samsung A15\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Register Device Token\n\n          The mobile app calls this after login when it gets a push notification token.\n\n          ## Endpoint\n\n          `POST /api/v1/notifications/devices`\n\n          ## Body Fields\n\n          `token`\n          Required. Push token from the mobile app.\n\n          `provider`\n          Use `expo` for Expo push tokens. Future options are `fcm` and `apns`.\n\n          `platform`\n          `android`, `ios`, `web`, or `unknown`.\n\n          `deviceName`\n          Optional. Friendly device name.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Device token registered successfully\",\n            \"device\": {\n              \"id\": \"...\",\n              \"provider\": \"expo\",\n              \"platform\": \"android\",\n              \"deviceName\": \"Samsung A15\",\n              \"isActive\": true\n            }\n          }\n          ```\n      - info:\n          name: 10. Admin List Notifications\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/notifications?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin List Notifications\n\n          Admin audit endpoint for notifications created or sent by the backend.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/notifications`\n\n          ## Authentication\n\n          Admin JWT required.\n\n          ## Query Params\n\n          `page`\n          Optional.\n\n          `limit`\n          Optional.\n\n          `type`\n          Optional. Filter by notification type.\n\n          `userId`\n          Optional. Filter notifications for one user.\n      - info:\n          name: 2. List Notifications\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/notifications?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # List Notifications\n\n          Use this for the notification center screen.\n\n          ## Endpoint\n\n          `GET /api/v1/notifications`\n\n          ## Query Params\n\n          `page`\n          Optional. Defaults to `1`.\n\n          `limit`\n          Optional. Defaults to `20`. Maximum is `100`.\n\n          `status`\n          Optional. Use `unread` or `read`.\n\n          `type`\n          Optional. Filter by notification type.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"notifications\": [\n              {\n                \"id\": \"...\",\n                \"title\": \"Wallet funded successfully\",\n                \"message\": \"Your wallet has been credited with NGN 990.\",\n                \"type\": \"wallet_funding_success\",\n                \"priority\": \"normal\",\n                \"readAt\": null,\n                \"seenAt\": null,\n                \"emailDelivery\": {\n                  \"attempted\": true,\n                  \"successful\": false,\n                  \"error\": \"Brevo email credentials are not configured\"\n                },\n                \"pushDelivery\": {\n                  \"attempted\": false,\n                  \"successful\": false,\n                  \"error\": \"No active device tokens\"\n                },\n                \"createdAt\": \"...\"\n              }\n            ],\n            \"pagination\": {\n              \"page\": 1,\n              \"limit\": 20,\n              \"total\": 1,\n              \"pages\": 1\n            },\n            \"unreadCount\": 1\n          }\n          ```\n\n          ## Delivery Status\n\n          `emailDelivery`\n          Shows whether backend attempted email delivery and whether it succeeded.\n\n          `pushDelivery`\n          Shows whether backend attempted push delivery and whether it succeeded.\n\n          If login email does not arrive, check the latest `type: \"security\"` notification and inspect `emailDelivery.error`.\n      - info:\n          name: 3. Popup Notifications\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/notifications/popup'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Popup Notifications\n\n          Call this after login or app unlock.\n\n          ## Endpoint\n\n          `GET /api/v1/notifications/popup`\n\n          ## Frontend Behavior\n\n          If this returns notifications, show them as popup messages.\n\n          After displaying each popup, call `Mark Notification Seen`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"notifications\": [\n              {\n                \"id\": \"...\",\n                \"title\": \"Scheduled maintenance\",\n                \"message\": \"BillXpress will be unavailable from 12am to 1am.\",\n                \"type\": \"admin_announcement\",\n                \"priority\": \"high\",\n                \"seenAt\": null\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 4. Unread Count\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/notifications/unread-count'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Unread Count\n\n          Use this for notification badges.\n\n          ## Endpoint\n\n          `GET /api/v1/notifications/unread-count`\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"unreadCount\": 3\n          }\n          ```\n      - info:\n          name: 5. Mark Notification Read\n          type: http\n          seq: 5\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/notifications/{{notificationId}}/read'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Mark Notification Read\n\n          Use this when the user opens a notification.\n\n          ## Endpoint\n\n          `PATCH /api/v1/notifications/:notificationId/read`\n      - info:\n          name: 6. Mark Notification Seen\n          type: http\n          seq: 6\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/notifications/{{notificationId}}/seen'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Mark Notification Seen\n\n          Use this after frontend displays a popup notification.\n\n          ## Endpoint\n\n          `PATCH /api/v1/notifications/:notificationId/seen`\n\n          This prevents the same popup from showing again after login.\n      - info:\n          name: 7. Mark All Notifications Read\n          type: http\n          seq: 7\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/notifications/read-all'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Mark All Notifications Read\n\n          Use this for a notification center \"mark all as read\" action.\n\n          ## Endpoint\n\n          `PATCH /api/v1/notifications/read-all`\n      - info:\n          name: 8. Remove Device Token\n          type: http\n          seq: 8\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/v1/notifications/devices'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"token\": \"ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Remove Device Token\n\n          Use this on logout or when the app disables push notifications.\n\n          ## Endpoint\n\n          `DELETE /api/v1/notifications/devices`\n      - info:\n          name: 9. Admin Create Notification\n          type: http\n          seq: 9\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/admin/notifications'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"target\": \"user\",\n                \"userId\": \"{{userId}}\",\n                \"title\": \"Welcome to BillXpress\",\n                \"message\": \"Your account is ready. You can now fund your wallet and start using services.\",\n                \"type\": \"admin_announcement\",\n                \"channel\": \"both\",\n                \"priority\": \"normal\",\n                \"data\": {\n                  \"screen\": \"wallet\"\n                }\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Create Notification\n\n          Admin creates an in-app notification and optional push/email notification.\n\n          If `channel` is `email`, `both`, or `all`, the user can receive a branded BillXpress email with the orange theme and social links in the footer.\n\n          ## Endpoint\n\n          `POST /api/v1/admin/notifications`\n\n          ## Authentication\n\n          Admin JWT required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `target`\n          Use `user` for one user or `all` for all active users.\n\n          `userId`\n          Required when `target` is `user`.\n\n          `title`\n          Required.\n\n          `message`\n          Required.\n\n          `channel`\n          Use `in_app`, `push`, `email`, `both`, or `all`.\n\n          `priority`\n          Use `low`, `normal`, or `high`.\n\n          ## Push Notification Note\n\n          Push works only after the mobile app registers a device token with:\n\n          `POST /api/v1/notifications/devices`\n\n          For v1, Expo push tokens are supported.\n  - info:\n      name: Wallet\n      type: folder\n      seq: 2\n    docs:\n      content: |-\n        # Wallet Endpoints For Frontend\n\n        These are the wallet balance and wallet history endpoints the app should use for a logged-in user.\n\n        ## What The User Sees\n\n        The user has two balances:\n\n        - `mainBalance`: money the user can spend on airtime, data, bills, cards, transfers, betting, and other services.\n        - `referralBalance`: referral rewards. This is not spendable directly.\n\n        To spend referral rewards, the user redeems them into `mainBalance`.\n\n        ## What Stays Here\n\n        ```txt\n        GET  /api/v1/wallet\n        GET  /api/v1/wallet/transactions\n        POST /api/v1/wallet/referral/redeem\n        ```\n\n        ## Banking Docs Moved\n\n        Account funding, virtual accounts, bank transfers, transfer bank lists, and banking webhooks now live in the `Banking` folder.\n\n        The frontend should still call the same backend endpoint URLs. Only the documentation folder changed.\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Get Wallet\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/wallet'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTQyNDMwMGI2YTQ3MmViMTVlOWFlNDQiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8zIiwiaWF0IjoxNzgyNzMxODE1LCJleHAiOjE3ODMzMzY2MTV9.xITqIdPid2Qz1g3SY6xygexXXkTRx8PnZKKUKUltYHQ\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Wallet\n\n          Use this endpoint to show the user's wallet balances.\n\n          ## Endpoint\n\n          `GET /api/v1/wallet`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## When Frontend Should Call This\n\n          - after login\n          - when the wallet screen opens\n          - after the user funds their account\n          - after redeeming referral balance\n          - after paying for any service\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"wallet\": {\n              \"id\": \"...\",\n              \"currency\": \"NGN\",\n              \"mainBalance\": 5000,\n              \"referralBalance\": 1000,\n              \"balances\": {\n                \"main\": 5000,\n                \"referral\": 1000\n              }\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          Show `mainBalance` as the user's spendable balance.\n\n          Show `referralBalance` separately as rewards/cashback balance.\n      - info:\n          name: 2. Get Transactions\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/wallet/transactions'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          params:\n            - name: limit\n              value: '50'\n              type: query\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Transactions\n\n          Use this endpoint to show the user's wallet history.\n\n          ## Endpoint\n\n          `GET /api/v1/wallet/transactions`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Query Parameters\n\n          `limit`  \n          Optional. Number of transactions to return. Default is `50`, maximum is `100`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"transactions\": [\n              {\n                \"id\": \"...\",\n                \"type\": \"funding\",\n                \"walletType\": \"main\",\n                \"direction\": \"credit\",\n                \"amount\": 2000,\n                \"balanceBefore\": 0,\n                \"balanceAfter\": 2000,\n                \"currency\": \"NGN\",\n                \"reference\": \"PFI_...\",\n                \"provider\": \"pocketfi\",\n                \"status\": \"successful\",\n                \"narration\": \"Wallet funding via PocketFi virtual account\",\n                \"createdAt\": \"...\"\n              }\n            ]\n          }\n          ```\n\n          ## Frontend Notes\n\n          Use `direction` to decide the display style:\n\n          - `credit`: money came in\n          - `debit`: money went out\n\n          Use `walletType` to show whether it affected the main wallet or referral wallet.\n\n          For funding transactions, `amount` is the exact amount credited to the wallet. Funding now credits the full transferred amount.\n\n          The app can ignore `provider`, `providerReference`, `metadata`, and raw IDs unless a screen specifically needs them.\n      - info:\n          name: 5. Redeem Referral Balance\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/referral/redeem'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"amount\": \"{{walletAmount}}\",\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTQyNDMwMGI2YTQ3MmViMTVlOWFlNDQiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8zIiwiaWF0IjoxNzgyNzMxODE1LCJleHAiOjE3ODMzMzY2MTV9.xITqIdPid2Qz1g3SY6xygexXXkTRx8PnZKKUKUltYHQ\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Redeem Referral Balance\n\n          Use this endpoint when the user wants to move referral rewards into their main wallet.\n\n          This is not a bank withdrawal. It is like cashback becoming spendable balance inside the app.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/referral/redeem`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `amount`  \n          Required. Amount to move from referral wallet to main wallet. Users can redeem any positive amount they have earned.\n\n          `transactionPin`  \n          Required. User's 4-digit transaction PIN.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Referral earnings redeemed successfully\",\n            \"wallet\": {\n              \"mainBalance\": 6000,\n              \"referralBalance\": 0\n            },\n            \"transactions\": [\n              {\n                \"type\": \"referral_redeem\",\n                \"walletType\": \"referral\",\n                \"direction\": \"debit\",\n                \"amount\": 1000\n              },\n              {\n                \"type\": \"referral_redeem\",\n                \"walletType\": \"main\",\n                \"direction\": \"credit\",\n                \"amount\": 1000\n              }\n            ]\n          }\n          ```\n\n          ## Common Errors\n\n          Wrong transaction PIN:\n\n          ```json\n          {\n            \"message\": \"Invalid transaction PIN\"\n          }\n          ```\n\n          Not enough referral balance:\n\n          ```json\n          {\n            \"message\": \"Insufficient wallet balance\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          Show the redeem button when `referralBalance` is greater than `0`.\n\n          Referral earnings are credited from first-deposit referral rewards. If User B funds `NGN 1,000` for the first time after registering with User A's referral code, User A earns `3%`, which is `NGN 30`.\n      - info:\n          name: Admin - Credit Referral Balance\n          type: http\n          seq: 92\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/admin/referral-credit'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"userId\": \"{{userId}}\",\n                \"amount\": \"{{walletAmount}}\",\n                \"narration\": \"Referral earning test credit\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjczMTcyMywiZXhwIjoxNzgzMzM2NTIzfQ.PX23SwfuyKxwQ5u5__uf3RgvZtW3e0cYe-izWKXiOMM\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin - Credit Referral Balance\n\n          This request is for admin/backend testing only.\n\n          This gives us a way to test `Redeem Referral Balance` before the full referral trigger is implemented.\n\n          The frontend user app should not call this endpoint.\n  - info:\n      name: Services\n      type: folder\n      seq: 6\n    docs:\n      content: |-\n        # Services APIs\n\n        This folder contains bill/service purchase endpoints for the mobile app.\n\n        The requests are separated into subfolders:\n\n        ```txt\n        Services / Data\n        Services / Airtime\n        Services / Electricity\n        Services / Cable TV\n        Services / Social Growth\n        ```\n\n        ## Frontend Rule\n\n        The frontend should only call BillXpress endpoints.\n\n        Do not call UjayData, SMEAPI, VheeBoost, or any other provider directly from the app.\n\n        ## Shared Wallet Rule\n\n        Service purchases follow this safe backend flow:\n\n        1. Backend calculates the current BillXpress selling price.\n        2. Backend verifies transaction PIN.\n        3. Backend debits wallet.\n        4. Backend calls the active provider.\n        5. Backend refunds wallet automatically if provider fails.\n        6. Backend sends notification/email.\n\n        Data, airtime, electricity, cable TV, and social growth have separate admin settings so admin can set markup and enable/disable each service independently.\n      type: text/markdown\n    items:\n      - info:\n          name: Cable TV\n          type: folder\n          seq: 5\n        docs:\n          content: |-\n            # Cable TV Service\n\n            Cable TV endpoints are powered by the active cable TV provider. Current provider:\n\n            ```txt\n            vtpass\n            ```\n\n            ## User Flow\n\n            1. Call `Get Cable TV Providers`.\n            2. User selects provider, for example `DSTV`.\n            3. Call `Get Cable TV Packages`.\n            4. User enters smartcard/IUC number.\n            5. Call `Verify Smartcard`.\n            6. Display customer name and selected package price.\n            7. Call `Quote Cable TV`.\n            8. User enters transaction PIN.\n            9. Call `Purchase Cable TV`.\n\n            The backend gets the package amount from VTpass, debits wallet during purchase, and refunds automatically if VTpass fails.\n\n            ## Endpoints\n\n            ```txt\n            GET  /api/v1/services/cable-tv/providers\n            GET  /api/v1/services/cable-tv/packages?provider=DSTV\n            POST /api/v1/services/cable-tv/verify-smartcard\n            POST /api/v1/services/cable-tv/quote\n            POST /api/v1/services/cable-tv/purchase\n            ```\n\n            Admin settings:\n\n            ```txt\n            GET   /api/v1/admin/services/cable-tv/settings\n            PATCH /api/v1/admin/services/cable-tv/settings\n            ```\n          type: text/markdown\n        items:\n          - info:\n              name: 1. Get Cable TV Providers\n              type: http\n              seq: 1\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/cable-tv/providers'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQ3NDQ2MSwiZXhwIjoxNzgzMDc5MjYxfQ.Kbgp5fh5mdIKWnIn_ssbWrrX3zlYafn_Hclbe9vv2ms\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Get Cable TV Providers\n\n              Use this endpoint to show cable TV providers.\n\n              Supported provider codes:\n\n              ```txt\n              DSTV\n              GOTV\n              STARTIMES\n              ```\n          - info:\n              name: 2. Get Cable TV Packages\n              type: http\n              seq: 2\n            http:\n              method: GET\n              url: '{{baseUrl}}/api/v1/services/cable-tv/packages?provider=DSTV'\n              headers:\n                - name: Authorization\n                  value: Bearer {{authToken}}\n              auth:\n                type: bearer\n                token: '{{authToken}}'\n            runtime:\n              variables:\n                - name: authToken\n                  value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTFlOGZlM2NiODVhYzVmYjkxN2E0YjIiLCJyb2xlIjoiYWRtaW4iLCJhdXRoVGllciI6InRpZXJfMiIsImlhdCI6MTc4MjQ3NDQ2MSwiZXhwIjoxNzgzMDc5MjYxfQ.Kbgp5fh5mdIKWnIn_ssbWrrX3zlYafn_Hclbe9vv2ms\n            settings:\n              encodeUrl: true\n              timeout: 0\n              followRedirects: true\n              maxRedirects: 5\n            docs: |-\n              # Get Cable TV Packages\n\n              Use this endpoint after the user selects a provider.\n\n              Query:\n\n              `provider`\n              Required. Use `DSTV`, `GOTV`, or `STARTIMES`.\n\n              The backend fetches packages from VTpass and applies BillXpress markup to return `sellingPrice`.\n          - info:\n              name: 3. Verify Smartcard\n              type: http\n              seq: 3\n            http:\n              method: POST\n
