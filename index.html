n-pin/reset\n        DELETE /api/v1/users/me\n        ```\n\n        Users can update their own basic profile, change password, reset transaction PIN with an email code, and deactivate their account.\n\n        ## Admin-Side Endpoints\n\n        Admin endpoints use:\n\n        ```txt\n        Authorization: Bearer {{authToken}}\n        ```\n\n        The authenticated user must have:\n\n        ```json\n        {\n          \"role\": \"admin\"\n        }\n        ```\n\n        Admin user management endpoints:\n\n        ```txt\n        GET    /api/v1/admin/users\n        POST   /api/v1/admin/users\n        GET    /api/v1/admin/users/:userId\n        PATCH  /api/v1/admin/users/:userId\n        PATCH  /api/v1/admin/users/:userId/status\n        DELETE /api/v1/admin/users/:userId\n        ```\n\n        Role changes are intentionally separate:\n\n        ```txt\n        PATCH /api/v1/admin/make-admin/:userId\n        PATCH /api/v1/admin/remove-admin/:userId\n        PATCH /api/v1/admin/make-vendor/:userId\n        ```\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Get My Profile\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/users/me'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get My Profile\n\n          Gets the logged-in user's profile.\n\n          ## Endpoint\n\n          `GET /api/v1/users/me`\n      - info:\n          name: 10. Admin Set User Status\n          type: http\n          seq: 10\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}/status'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"isActive\": false\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Set User Status\n\n          Admin suspends or activates a user.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/users/:userId/status`\n      - info:\n          name: 11. Admin Delete User\n          type: http\n          seq: 11\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Delete User\n\n          Soft-deletes a user by setting `isActive` to `false`.\n\n          ## Endpoint\n\n          `DELETE /api/v1/admin/users/:userId`\n      - info:\n          name: 12. Get My KYC Status\n          type: http\n          seq: 12\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/users/me/kyc'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTQyNTg5NjlhMjY5MzJkODU3NWYxZGYiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8xIiwiaWF0IjoxNzgyNzMzMDMxLCJleHAiOjE3ODMzMzc4MzF9.M-AHfkIe9pktipNYu417NDRJUL9u_y7Hc5hmCHSHWqY\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get My KYC Status\n\n          Returns the logged-in user's current BillXpress tier and Maplerad customer status.\n\n          ## Endpoint\n\n          `GET /api/v1/users/me/kyc`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Expected Response\n\n          ```json\n          {\n            \"user\": {\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0\n            },\n            \"mapleradCustomer\": null\n          }\n          ```\n      - info:\n          name: 13. Upgrade My Maplerad Tier 1\n          type: http\n          seq: 13\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/users/me/kyc/maplerad-tier1'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"dob\": \"20-10-1988\",\n                \"identificationNumber\": \"11111111111\",\n                \"phoneNumber\": \"08123456789\",\n                \"address\": {\n                  \"street\": \"12 Example Street\",\n                  \"city\": \"Ikeja\",\n                  \"state\": \"Lagos\",\n                  \"country\": \"NG\",\n                  \"postalCode\": \"100001\"\n                },\n                \"photo\": \"https://example.com/selfie.jpg\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTQyNTg5NjlhMjY5MzJkODU3NWYxZGYiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8xIiwiaWF0IjoxNzgyNzMzMDMxLCJleHAiOjE3ODMzMzc4MzF9.M-AHfkIe9pktipNYu417NDRJUL9u_y7Hc5hmCHSHWqY\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Upgrade My Maplerad Tier 1\n\n          Upgrades the logged-in user to BillXpress `tier_3` by creating/upgrading their Maplerad customer to Maplerad Tier 1, then creates a dedicated NGN virtual account.\n\n          ## Endpoint\n\n          `POST /api/v1/users/me/kyc/maplerad-tier1`\n\n          ## Authentication\n\n          Required. The user's email must already be verified.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `dob`\n          Required. Date of birth in `DD-MM-YYYY` format.\n\n          `identificationNumber`\n          Required. BVN or supported identification number.\n\n          `phoneNumber`\n          Optional when the user's existing phone is valid.\n\n          `address`\n          Required. Must include `street`, `city`, `state`, `country`, and `postalCode`.\n\n          `photo`\n          Optional. Selfie/photo URL if available.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Tier upgrade completed successfully\",\n            \"user\": {\n              \"authTier\": \"tier_3\",\n              \"kycLevel\": 1\n            },\n            \"mapleradCustomer\": {\n              \"customerId\": \"...\",\n              \"tier\": 1,\n              \"status\": \"COMPLETED\"\n            },\n            \"virtualAccount\": {\n              \"provider\": \"maplerad\",\n              \"bankName\": \"Wema Bank\",\n              \"accountNumber\": \"9003001001\",\n              \"accountName\": \"JOHN DOE\"\n            }\n          }\n          ```\n      - info:\n          name: 2. Update My Profile\n          type: http\n          seq: 2\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/users/me'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"Imo\",\n                \"lastName\": \"Ben\",\n                \"username\": \"imoben\",\n                \"phone\": \"08125128766\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update My Profile\n\n          Lets a user update their own basic profile.\n\n          ## Endpoint\n\n          `PATCH /api/v1/users/me`\n\n          ## Editable Fields\n\n          `firstName`, `lastName`, `username`, `phone`\n\n          Email is not editable here for now because email changes should have a verification flow later.\n      - info:\n          name: 3. Change My Password\n          type: http\n          seq: 3\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/users/me/password'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"Password123\",\n                \"newPassword\": \"Password456\",\n                \"confirmPassword\": \"Password456\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Change My Password\n\n          User changes their password after confirming the current password.\n      - info:\n          name: 4a. Request Transaction PIN Reset Code\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/users/me/transaction-pin/reset-code'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTM3ZWEyMzI0M2YyYmNiNWM0ODI5YWUiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8xIiwiaWF0IjoxNzgyMDYwMDExLCJleHAiOjE3ODI2NjQ4MTF9.DG2RX61bNFrFpwuDhup5V76AJ74SRSzooJJ52FDRun0\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Request Transaction PIN Reset Code\n\n          Sends a 5-digit reset code to the logged-in user's email address.\n\n          The frontend should not ask for the old transaction PIN. It should also not ask the logged-in user to type their email again; the backend uses the email on the user's account.\n\n          The response includes `maskedEmail`, so the app can show:\n\n          ```txt\n          A reset code has been sent to im******en@gmail.com\n          ```\n\n          Codes expire after 10 minutes. A user can request another code once every 60 seconds, with a maximum of 3 requests per 10 minutes.\n      - info:\n          name: 4b. Reset My Transaction PIN\n          type: http\n          seq: 5\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/users/me/transaction-pin/reset'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"resetCode\": \"53634\",\n                \"newTransactionPin\": \"5566\",\n                \"confirmTransactionPin\": \"5566\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        runtime:\n          variables:\n            - name: authToken\n              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTM3ZWEyMzI0M2YyYmNiNWM0ODI5YWUiLCJyb2xlIjoidXNlciIsImF1dGhUaWVyIjoidGllcl8xIiwiaWF0IjoxNzgyMDYwMDExLCJleHAiOjE3ODI2NjQ4MTF9.DG2RX61bNFrFpwuDhup5V76AJ74SRSzooJJ52FDRun0\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Reset My Transaction PIN\n\n          Resets the logged-in user's 4-digit transaction PIN using the code sent to their email.\n\n          This endpoint does not require the old transaction PIN.\n\n          `resetCode` can also be sent as `resetToken`, `code`, or `otp` if the mobile app already uses one of those field names.\n      - info:\n          name: 5. Deactivate My Account\n          type: http\n          seq: 5\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/v1/users/me'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"password\": \"Password123\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Deactivate My Account\n\n          User deactivates their own account after confirming password.\n      - info:\n          name: 6. Admin List Users\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/users?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin List Users\n\n          Admin lists and searches users.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/users`\n\n          ## Query Params\n\n          `search`\n          Search first name, last name, username, email, or phone.\n\n          `role`\n          Optional: `user`, `vendor`, `admin`.\n\n          `status`\n          Optional: `active` or `inactive`.\n\n          `authTier`\n          Optional: `tier_1`, `tier_2`, or `tier_3`.\n\n          `page`, `limit`\n          Pagination.\n      - info:\n          name: 7. Admin Create User\n          type: http\n          seq: 7\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/admin/users'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"Test\",\n                \"lastName\": \"User\",\n                \"username\": \"testuseradmin\",\n                \"email\": \"testuseradmin@example.com\",\n                \"phone\": \"08012345678\",\n                \"password\": \"Password123\",\n                \"transactionPin\": \"1234\",\n                \"authTier\": \"tier_1\",\n                \"kycLevel\": 0,\n                \"emailVerified\": false,\n                \"isActive\": true\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Create User\n\n          Admin creates a normal user account.\n\n          ## Endpoint\n\n          `POST /api/v1/admin/users`\n\n          This creates `role: \"user\"`. To make the user admin or vendor, use the role-specific admin endpoints.\n      - info:\n          name: 8. Admin Get User\n          type: http\n          seq: 8\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Get User\n\n          Admin views one user with wallet summary and transaction count.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/users/:userId`\n      - info:\n          name: 9. Admin Update User\n          type: http\n          seq: 9\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/users/{{userId}}'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"Updated\",\n                \"lastName\": \"User\",\n                \"authTier\": \"tier_1\",\n                \"kycLevel\": 0,\n                \"emailVerified\": false,\n                \"isActive\": true\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Update User\n\n          Admin updates safe user fields.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/users/:userId`\n\n          ## Editable Fields\n\n          `firstName`, `lastName`, `username`, `email`, `phone`, `isActive`, `emailVerified`, `authTier`, `kycLevel`\n\n          Role changes are intentionally not handled here.\ndocs:\n  content: |-\n    # BillXpress Backend API\n\n    This Bruno collection documents the BillXpress backend endpoints for frontend developers and testers.\n\n    ## Base URLs\n\n    Production:\n\n    ```txt\n    https://billxpressbackend-production.up.railway.app\n    ```\n\n    Local development:\n\n    ```txt\n    http://localhost:5000\n    ```\n\n    In Bruno, choose the right environment before testing:\n\n    - `Production` for the deployed Railway API.\n    - `Local` when the backend is running on your computer.\n\n    ## How to use this collection\n\n    1. Select `Production` or `Local`.\n    2. Run `Health Check` first.\n    3. Run `Register User` if you need a new account.\n    4. Run `Login User`. This saves the JWT into `authToken`.\n    5. Run `Get Current User` to confirm the token works.\n    6. Run wallet requests such as `Get Wallet` and `Get Transactions`.\n    7. Run banking requests such as `Get Virtual Account`, `Create One-Time Funding Account`, or `Send Bank Transfer`.\n    8. Run service requests such as `Data Plans` and `Purchase Data`.\n\n    Every protected endpoint needs:\n\n    ```txt\n    Authorization: Bearer {{authToken}}\n    ```\n\n    ## Mobile PIN / Biometric Unlock\n\n    Password login returns two tokens:\n\n    - `accessToken`: used as `Bearer {{authToken}}` for API calls.\n    - `refreshToken`: stored securely by the mobile app.\n\n    PIN and biometric checks happen on the phone. The backend does not receive fingerprint, Face ID, or local app PIN data.\n\n    After local PIN/biometric unlock, call:\n\n    ```txt\n    POST /api/v1/auth/refresh-session\n    ```\n\n    The backend returns a fresh `accessToken` and a rotated `refreshToken`.\n\n    There is no backend PIN-login endpoint. The backend standard is JWT access token + refresh token.\n\n    ## Important Auth Rule\n\n    BillXpress does not block login when email is unverified. New users start at `authTier: \"tier_1\"`. Later dollar card, betting, BVN/KYC, wallet limits, and other sensitive service actions can require a higher `authTier`.\n\n    ## Frontend Registration Rule\n\n    Registration now collects:\n\n    - `firstName`\n    - `lastName`\n    - `username`\n    - `email`\n    - `phone`\n    - `password`\n    - `confirmPassword`\n    - `transactionPin`\n\n    Email OTP verification remains available as an optional/future flow, but it is not required for tier 1 registration.\n\n    ## Banking / Wallet Funding Rule\n\n    The frontend should use only BillXpress API endpoints. Do not call PocketFi, Monnify, Maplerad, or any provider directly from the app.\n\n    These requests are documented in the `Banking` folder.\n\n    Permanent funding account:\n\n    ```txt\n    GET /api/v1/wallet/virtual-account\n    ```\n\n    One-time Monnify funding account:\n\n    ```txt\n    POST /api/v1/wallet/funding-intents\n    ```\n\n    When the user taps **I have transferred the money**:\n\n    ```txt\n    POST /api/v1/wallet/funding-intents/:fundingIntentId/confirm\n    ```\n\n    The frontend should never credit the wallet itself. The backend credits the wallet after webhook confirmation or Monnify status confirmation.\n\n    Funding charges are admin-configurable, but the wallet credit is always the exact amount the user transferred.\n\n    Referral earnings are redeemed into the user's main wallet, not withdrawn to bank.\n\n    ## Data Service Rule\n\n    The frontend should fetch data plans from:\n\n    ```txt\n    GET /api/v1/services/data/plans\n    ```\n\n    The backend fetches live plans from the active provider, applies BillXpress markup, and returns `sellingPrice`.\n\n    When buying data, send:\n\n    ```txt\n    POST /api/v1/services/data/purchase\n    ```\n\n    The backend debits the wallet, calls the active provider, and refunds automatically if the provider fails.\n\n    ## Admin Dashboard Provider Balance\n\n    The admin dashboard earnings endpoint also returns provider wallet balances:\n\n    ```txt\n    GET /api/v1/admin/dashboard/earnings\n    ```\n\n    Frontend can display SMEAPI balance from:\n\n    ```txt\n    providerBalances.smeapi.balance\n    ```\n\n    Only show the balance when:\n\n    ```txt\n    providerBalances.smeapi.available === true\n    ```\n\n    If `available` is `false`, show an unavailable state while keeping the rest of the dashboard visible.\n\n    ## Airtime Service Rule\n\n    The frontend should fetch airtime networks from:\n\n    ```txt\n    GET /api/v1/services/airtime/networks\n    ```\n\n    The user enters the airtime amount. Frontend can call:\n\n    ```txt\n    POST /api/v1/services/airtime/quote\n    ```\n\n    Then purchase with:\n\n    ```txt\n    POST /api/v1/services/airtime/purchase\n    ```\n\n    The backend calculates markup, debits wallet, calls the active provider, and refunds automatically if the provider fails.\n\n    ## Social Growth Service Rule\n\n    The frontend should fetch social growth services from:\n\n    ```txt\n    GET /api/v1/services/social-growth/services\n    ```\n\n    Before placing an order, quote the selected service and quantity:\n\n    ```txt\n    POST /api/v1/services/social-growth/quote\n    ```\n\n    Then place the order with:\n\n    ```txt\n    POST /api/v1/services/social-growth/orders\n    ```\n\n    The backend calculates tiered markup, debits wallet, calls VheeBoost, saves order history, and refunds automatically if the provider fails.\n  type: text/markdown\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-06-30T19:33:47.239Z'\n    exportedUsing: Bruno/3.4.2\n";
