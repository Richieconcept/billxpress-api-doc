        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: Billxpress Backend API\nconfig:\n  environments:\n    - name: Local\n      variables:\n        - name: baseUrl\n          value: https://billxpressbackend-production.up.railway.app\n        - name: vendorApiKey\n          value: paste-vendor-api-key-here\n        - name: adminSetupSecret\n          value: change-me\n        - name: pocketfiSignature\n          value: generated-hmac-signature\n        - name: monnifySignature\n          value: generated-hmac-signature\n        - name: walletAmount\n          value: '1000'\n        - name: fundingIntentId\n          value: paste-funding-intent-id-here\n        - name: userId\n          value: 6a1c4dff954fafd73329d772\n        - name: registeredEmail\n          value: imobonifaceben@gmail.com\n        - name: emailOtp\n          value: '44156'\n        - name: authToken\n          secret: true\n    - name: Production\n      variables:\n        - name: baseUrl\n          value: https://billxpressbackend-production.up.railway.app\n        - name: vendorApiKey\n          value: paste-vendor-api-key-here\n        - name: adminSetupSecret\n          value: change-me\n        - name: pocketfiSignature\n          value: generated-hmac-signature\n        - name: monnifySignature\n          value: generated-hmac-signature\n        - name: walletAmount\n          value: '1000'\n        - name: fundingIntentId\n          value: paste-funding-intent-id-here\n        - name: userId\n          value: paste-user-id-here\n        - name: registeredEmail\n          value: user@example.com\n        - name: emailOtp\n          value: '12345'\n        - name: authToken\n          secret: true\nitems:\n  - info:\n      name: Health Check\n      type: http\n      seq: 1\n    http:\n      method: GET\n      url: '{{baseUrl}}/api/v1/health'\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: |-\n      # Health Check\n\n      Use this request first. It confirms the Billxpress backend is online before you test auth, wallet, or funding endpoints.\n\n      ## Base URL Used By This Request\n\n      ```txt\n      {{baseUrl}}\n      ```\n\n      Production base URL:\n\n      ```txt\n      https://billxpressbackend-production.up.railway.app\n      ```\n\n      Full production health URL:\n\n      ```txt\n      https://billxpressbackend-production.up.railway.app/api/v1/health\n      ```\n\n      ## Endpoint\n\n      `GET /api/v1/health`\n\n      ## Expected Success Response\n\n      Status: `200 OK`\n\n      Body:\n\n      ```json\n      {\n        \"status\": \"ok\",\n        \"message\": \"Billxpress API is running\",\n        \"service\": \"billxpress-backend\",\n        \"environment\": \"production\",\n        \"timestamp\": \"2026-06-02T12:00:00.000Z\"\n      }\n      ```\n\n      ## Common Issues\n\n      If this fails on production, check Railway deployment logs and required environment variables.\n\n      If this fails locally, start the backend:\n\n      ```txt\n      npm run dev\n      ```\n\n      Then make sure the `Local` environment uses:\n\n      ```txt\n      http://localhost:5000\n      ```\n  - info:\n      name: Auth\n      type: folder\n      seq: 1\n    docs:\n      content: |-\n        # Auth Endpoints\n\n        These endpoints handle tier 1 registration, password login, JWT access tokens, refresh sessions, admin role management, admin vendor approval, optional email OTP verification, API-key auth, and fetching the logged-in user's profile.\n\n        ## Current Auth Flow\n\n        1. Frontend shows registration as 3 UI steps.\n        2. Frontend sends one final `Register User` request when the user taps `Create Account`.\n        3. Backend creates the account as `authTier: \"tier_1\"`.\n        4. Registration does not send an email OTP and does not require email verification.\n        5. User can login after registration.\n        6. Frontend stores the returned `accessToken` and `refreshToken`.\n        7. Frontend sends the access token as `Bearer {{authToken}}` for protected endpoints.\n        8. Mobile PIN/biometric unlock happens locally on the phone.\n        9. After local unlock, frontend calls `Refresh Mobile Session` to get a fresh access token.\n\n        ## Mobile And Web Session Standard\n\n        The backend does not receive fingerprint, Face ID, or local app-unlock PIN data.\n\n        Standard flow for mobile, iOS, and web:\n\n        1. User logs in once with password using `Login User`.\n        2. Backend returns `accessToken` and `refreshToken`.\n        3. App stores the refresh token securely.\n        4. Mobile/iOS can ask for PIN or biometric locally before unlocking the saved session.\n        5. If local unlock succeeds, the app calls:\n\n        ```txt\n        POST /api/v1/auth/refresh-session\n        ```\n\n        6. Backend returns a new `accessToken` and a rotated `refreshToken`.\n\n        The frontend should save the new refresh token every time it calls refresh session.\n\n        If refresh fails with `401`, send the user back to password login.\n\n        There is no backend PIN-login endpoint. PIN and biometric unlock are frontend/device security. The backend only accepts JWT access tokens and refresh tokens.\n\n        `transactionPin` is still used for sensitive wallet actions, such as redeeming referral balance or future payments/transfers.\n\n        ## Admin Role Management\n\n        Admin-only routes use:\n\n        ```js\n        protect, authorizeRoles(\"admin\")\n        ```\n\n        Available admin role actions:\n\n        ```txt\n        PATCH /api/v1/admin/bootstrap-admin/:userId\n        GET /api/v1/admin/admins\n        PATCH /api/v1/admin/make-admin/:userId\n        PATCH /api/v1/admin/remove-admin/:userId\n        ```\n\n        `bootstrap-admin` creates the first admin from an existing active user. It requires `X-Admin-Setup-Secret`, only works when `ADMIN_SETUP_SECRET` is configured, and stops working after an active admin exists.\n\n        `make-admin` upgrades an active existing user to `role: \"admin\"`.\n\n        `remove-admin` changes another admin back to `role: \"user\"`. The backend prevents an admin from removing their own admin role and prevents removing the last active admin.\n\n        ## Vendor Approval\n\n        Users cannot self-register as vendors. Every user registers normally first.\n\n        An admin upgrades a user with:\n\n        ```txt\n        PATCH /api/v1/admin/make-vendor/:userId\n        ```\n\n        This route requires:\n\n        ```js\n        protect, authorizeRoles(\"admin\")\n        ```\n\n        When approved, the backend sets:\n\n        ```json\n        {\n          \"role\": \"vendor\",\n          \"discountRate\": 0.2,\n          \"isVendorActive\": true,\n          \"vendorApprovedAt\": \"current-date\"\n        }\n        ```\n\n        The backend also generates and returns an `apiKey` using the existing `generateApiKey` utility.\n\n        Use `Admin Make Vendor` in this Bruno folder to test vendor approval.\n\n        ## Vendor API Key Auth\n\n        Normal protected routes use JWT auth:\n\n        ```txt\n        Authorization: Bearer {{authToken}}\n        ```\n\n        Vendor API-key requests send the key directly:\n\n        ```txt\n        Authorization: {{vendorApiKey}}\n        ```\n\n        Do not prefix vendor API keys with `Bearer`.\n\n        API-key auth succeeds only for users where:\n\n        ```json\n        {\n          \"role\": \"vendor\",\n          \"isVendorActive\": true\n        }\n        ```\n\n        Use `Vendor API Key Auth` to test the API-key path against `/api/v1/auth/me`.\n\n        ## Registration UI Steps\n\n        Step 1:\n\n        - first name\n        - last name\n        - username\n        - phone\n        - email\n        - referral code\n\n        Step 2:\n\n        - password\n        - confirm password\n\n        Step 3:\n\n        - transaction PIN\n\n        The frontend handles these 3 screens locally. The backend receives only one final registration request.\n\n        ## Auth Tier\n\n        New users start at:\n\n        ```json\n        {\n          \"authTier\": \"tier_1\",\n          \"emailVerified\": false,\n          \"kycLevel\": 0\n        }\n        ```\n\n        Future BVN/KYC upgrades can move the user to `tier_2` or `tier_3`.\n\n        ## Login Identifier\n\n        The login field is called `identifier`. It can be any one of:\n\n        - email\n        - username\n        - phone number\n\n        ## Tier Rule\n\n        Do not block login because email is not verified. Later dollar card, betting, wallet limits, bill payment, transfer, and vendor actions can require a higher product tier.\n\n        Backend middleware is available for those future routes:\n\n        ```js\n        protect, requireAuthTier(\"tier_2\")\n        ```\n\n        `requireVerifiedEmail` is still available for routes that specifically need a verified email address.\n\n        Vendor-only routes can use:\n\n        ```js\n        protect, requireVendor\n        ```\n\n        Admin-only routes can also use:\n\n        ```js\n        protect, requireAuthTier(\"tier_2\"), authorizeRoles(\"admin\")\n        ```\n\n        ## Auth Rate Limits\n\n        The auth routes currently apply these API-level limits:\n\n        - Register: 5 attempts per 15 minutes per IP/user details\n        - Login: 10 attempts per 15 minutes per IP/identifier\n        - Verify OTP: 5 attempts per 10 minutes per IP/email\n        - Resend OTP: 3 attempts per 10 minutes per IP/email\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Register User\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/register'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"firstName\": \"imo\",\n                \"lastName\": \"ben\",\n                \"username\": \"imoben\",\n                \"email\": \"{{registeredEmail}}\",\n                \"phone\": \"08125128766\",\n                \"password\": \"Password123\",\n                \"confirmPassword\": \"Password123\",\n                \"transactionPin\": \"1234\",\n                \"referredBy\": \"\"\n              }\n        runtime:\n          variables:\n            - name: registeredEmail\n              value: imo@gmail.com\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Register User\n\n          Creates a new Billxpress user account at `tier_1`.\n\n          Tier 1 registration does not require email verification and does not send an email OTP.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/register`\n\n          ## Body Fields\n\n          `firstName`  \n          Required. The user's first name. Some downstream services require this.\n\n          `lastName`  \n          Required. The user's last name. Some downstream services require this.\n\n          `username`  \n          The user's unique username. It is saved in lowercase.\n\n          `email`  \n          The user's email address. This must be real if you want to receive the verification email.\n          In the frontend, keep this email in registration state/client storage after the request succeeds.\n\n          `phone`  \n          The user's phone number. It must be unique, 11 digits, and start with `0`.\n\n          `password`  \n          Minimum 5 characters.\n\n          `confirmPassword`  \n          Must match `password`.\n\n          `transactionPin`  \n          Exactly 4 digits. This will be used later for wallet and bill payment actions.\n\n          `referredBy`  \n          Optional. Use another user's referral code if available. Leave empty if there is no referral.\n\n          ## Frontend 3-Step UI\n\n          The frontend should collect registration details in 3 screens, but send only one final request to this endpoint.\n\n          Step 1:\n\n          - first name\n          - last name\n          - username\n          - phone\n          - email\n          - referral code\n\n          Step 2:\n\n          - password\n          - confirm password\n\n          Step 3:\n\n          - transaction PIN\n\n          ## Expected Success Response\n\n          Status: `201 Created`\n\n          ```json\n          {\n            \"message\": \"Account created successfully\",\n            \"requiresVerification\": false,\n            \"virtualAccount\": {\n              \"id\": \"...\",\n              \"provider\": \"pocketfi\",\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (Billxpress)\",\n              \"status\": \"active\",\n              \"createdAt\": \"...\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (Billxpress)\"\n                },\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"kuda\",\n                  \"accountNumber\": \"1234567890\",\n                  \"accountName\": \"Test User (Billxpress)\"\n                }\n              ],\n              \"feePolicy\": {\n                \"paidBy\": \"user\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"message\": \"Funding fee is 1% and is paid by the user. The wallet is credited with the amount after fee.\"\n              }\n            },\n            \"virtualAccounts\": [\n              {\n                \"provider\": \"pocketfi\",\n                \"bankName\": \"paga\",\n                \"accountNumber\": \"0742053373\",\n                \"accountName\": \"Test User (Billxpress)\"\n              },\n              {\n                \"provider\": \"pocketfi\",\n                \"bankName\": \"kuda\",\n                \"accountNumber\": \"1234567890\",\n                \"accountName\": \"Test User (Billxpress)\"\n              }\n            ],\n            \"virtualAccountCreated\": true,\n            \"virtualAccountError\": null,\n            \"virtualAccountErrors\": [],\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"referralCode\": \"TES1234\",\n              \"referredBy\": null,\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0,\n              \"createdAt\": \"...\"\n            }\n          }\n          ```\n\n          Users always register as normal users. Vendors must be approved later by an admin using `PATCH /api/v1/admin/make-vendor/:userId`.\n\n          After registration succeeds, the user can continue to login. The backend also attempts to create the user's Paga and Kuda funding accounts immediately.\n\n          If `virtualAccount` is `null`, registration still worked. The frontend can later call `Create Virtual Account` from the wallet screen.\n\n          If only one account is returned, show that account and continue.\n      - info:\n          name: 10. Admin Make Vendor\n          type: http\n          seq: 9\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/make-vendor/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Make Vendor\n\n          Upgrades an existing normal user into a vendor.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/make-vendor/:userId`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          The authenticated user must have:\n\n          ```json\n          {\n            \"role\": \"admin\"\n          }\n          ```\n\n          ## Important\n\n          Users cannot self-register as vendors. Every user registers normally first, then an admin approves the vendor upgrade.\n\n          When approved, the backend sets:\n\n          ```json\n          {\n            \"role\": \"vendor\",\n            \"discountRate\": 0.2,\n            \"isVendorActive\": true,\n            \"vendorApprovedAt\": \"current-date\"\n          }\n          ```\n\n          The backend also generates and returns a unique `apiKey`.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"User upgraded to vendor successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"role\": \"vendor\",\n              \"authTier\": \"tier_1\",\n              \"discountRate\": 0.2,\n              \"isVendorActive\": true,\n              \"vendorApprovedAt\": \"...\"\n            },\n            \"apiKey\": \"generated-api-key\"\n          }\n          ```\n\n          Copy the returned `apiKey` into the Bruno `vendorApiKey` environment variable to test vendor API-key auth.\n      - info:\n          name: 11. Vendor API Key Auth\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/auth/me'\n          headers:\n            - name: Authorization\n              value: '{{vendorApiKey}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Vendor API Key Auth\n\n          Tests vendor authentication using an API key instead of a JWT token.\n\n          ## Endpoint\n\n          `GET /api/v1/auth/me`\n\n          For the vendor-only test endpoint, use:\n\n          ```txt\n          GET /api/v1/test/vendor\n          ```\n\n          ## Authentication\n\n          Send the vendor API key directly in the `Authorization` header:\n\n          ```txt\n          Authorization: {{vendorApiKey}}\n          ```\n\n          Do not prefix vendor API keys with `Bearer`.\n\n          Create the vendor API key through `Admin Make Vendor`; users cannot create vendor accounts during registration.\n\n          `Bearer` is reserved for JWT auth:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Required Vendor State\n\n          API-key auth succeeds only when the matching user has:\n\n          ```json\n          {\n            \"role\": \"vendor\",\n            \"isVendorActive\": true\n          }\n          ```\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"Vendor\",\n              \"username\": \"testvendor\",\n              \"email\": \"vendor@example.com\",\n              \"phone\": \"08087654321\",\n              \"role\": \"vendor\",\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0\n            }\n          }\n          ```\n\n          ## Common Errors\n\n          Missing or invalid API key:\n\n          ```json\n          {\n            \"message\": \"Invalid vendor API key\"\n          }\n          ```\n\n          If the API key belongs to a non-vendor user or an inactive vendor, the request also returns `401`.\n      - info:\n          name: 2. Verify Email OTP\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/verify-email-otp'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{registeredEmail}}\",\n                \"otp\": \"{{emailOtp}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Verify Email OTP\n\n          Verifies a user's email address using a 5-digit OTP.\n\n          Tier 1 registration does not send an OTP automatically. Use `Resend Email OTP` first if you want to run this optional email-verification flow.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/verify-email-otp`\n\n          ## Body Fields\n\n          `email`  \n          The email address used during registration. Prefer the logged-in user's email from `/me`.\n\n          `otp`  \n          The 5-digit code sent to the user's email.\n\n          ## Frontend Email Handling\n\n          If the user is logged in, use the current user's email:\n\n          ```js\n          const email = currentUser.email;\n\n          await api.post(\"/api/v1/auth/verify-email-otp\", {\n            email,\n            otp,\n          });\n          ```\n\n          The user should only type the OTP. They should not be asked to type their email again.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Email verified successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"isActive\": true,\n              \"emailVerified\": true,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 1\n            }\n          }\n          ```\n\n          ## What Backend Does\n\n          If the OTP is correct and not expired:\n\n          - sets `emailVerified` to `true`\n          - sets `kycLevel` to `1`\n          - clears the OTP from the account\n\n          ## Common Errors\n\n          Wrong or expired OTP:\n\n          ```json\n          {\n            \"message\": \"OTP is invalid or has expired\"\n          }\n          ```\n\n          Already verified:\n\n          ```json\n          {\n            \"message\": \"Email is already verified\"\n          }\n          ```\n\n          OTP codes expire after 10 minutes.\n      - info:\n          name: 3. Resend Email OTP\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/resend-email-otp'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{registeredEmail}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Resend Email OTP\n\n          Sends a fresh 5-digit email verification code to a user who has not verified their email yet.\n\n          Tier 1 registration does not send this automatically. Call this only when the app intentionally starts the optional/future email verification flow.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/resend-email-otp`\n\n          ## When To Use This\n\n          Use this if:\n\n          - the app starts an optional email verification flow\n          - the previous OTP expired\n          - the user requests another verification code\n\n          ## Body Fields\n\n          `email`  \n          The email address used during registration. Prefer the logged-in user's email from `/me`.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Verification code sent successfully\"\n          }\n          ```\n\n          ## Frontend Email Handling\n\n          Do not ask the user to type their email again if the user is logged in.\n\n          Use:\n\n          ```js\n          const email = currentUser.email;\n          ```\n\n          Then call:\n\n          ```js\n          await api.post(\"/api/v1/auth/resend-email-otp\", { email });\n          ```\n\n          ## Rate Limits\n\n          The user can request a new code once every 60 seconds.\n\n          The route also has API-level rate limiting:\n\n          - maximum 3 resend requests per 10 minutes per IP/email\n\n          If they request too early:\n\n          ```json\n          {\n            \"message\": \"Please wait before requesting another code\",\n            \"retryAfterSeconds\": 43\n          }\n          ```\n\n          ## Notes For Frontend\n\n          If the response says the email is already verified, send the user to the normal app/dashboard flow.\n      - info:\n          name: 4. Login User\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/login'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"identifier\": \"testuser@example.com\",\n                \"password\": \"Password123\"\n              }\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                if (res.body && (res.body.accessToken || res.body.token)) {\n                  const accessToken = res.body.accessToken || res.body.token;\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"authToken\", accessToken);\n                  } else {\n                    bru.setVar(\"authToken\", accessToken);\n                  }\n                }\n                if (res.body && res.body.refreshToken) {\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"refreshToken\", res.body.refreshToken);\n                  } else {\n                    bru.setVar(\"refreshToken\", res.body.refreshToken);\n                  }\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Login User\n\n          Logs in a user with password and returns an access token plus a mobile refresh token.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/login`\n\n          ## Body Fields\n\n          `identifier`  \n          This can be the user's email, username, or phone number.\n\n          `password`  \n          The user's password.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Login successful\",\n            \"token\": \"access-token-here\",\n            \"accessToken\": \"access-token-here\",\n            \"refreshToken\": \"long-mobile-refresh-token-here\",\n            \"session\": {\n              \"id\": \"...\",\n              \"deviceName\": \"Android phone\",\n              \"expiresAt\": \"...\"\n            },\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0\n            }\n          }\n          ```\n\n          ## Auto Save Tokens\n\n          This Bruno request automatically saves:\n\n          - `accessToken` into `authToken`\n          - `refreshToken` into `refreshToken`\n\n          After login succeeds, you can run protected requests like `Get Current User`.\n\n          ## Mobile PIN / Biometric Unlock Flow\n\n          The backend does not receive fingerprint, Face ID, or local app PIN data.\n\n          Mobile app flow:\n\n          1. User logs in with password once.\n          2. App stores `refreshToken` securely on the phone.\n          3. On next app open, app asks for PIN or biometric locally on the device.\n          4. If local unlock succeeds, app calls `Refresh Mobile Session`.\n          5. Backend returns a fresh `accessToken`.\n\n          The access token can expire. The refresh token is what keeps mobile login smooth.\n\n          There is no backend PIN-login endpoint. PIN and biometric unlock are handled by the frontend/device.\n\n          ## Current Tier 1 Behavior\n\n          Login is allowed without email verification.\n\n          A newly registered user object includes:\n\n          ```json\n          {\n            \"emailVerified\": false,\n            \"authTier\": \"tier_1\",\n            \"kycLevel\": 0\n          }\n          ```\n\n          Later features like dollar card, betting, BVN-gated flows, wallet limits, or other KYC-sensitive actions can require a higher `authTier`.\n\n          ## Rate Limit\n\n          Maximum 10 login attempts per 15 minutes per IP/identifier.\n      - info:\n          name: 5. Get Current User\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/auth/me'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Current User\n\n          Returns the profile of the currently logged-in user.\n\n          ## Endpoint\n\n          `GET /api/v1/auth/me`\n\n          ## Authentication Required\n\n          Yes.\n\n          For normal app auth, this request needs a Bearer token:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          For vendor API-key auth, send the API key directly:\n\n          ```txt\n          Authorization: {{vendorApiKey}}\n          ```\n\n          Do not prefix vendor API keys with `Bearer`.\n\n          Run `Login User` first for JWT auth. The login request saves the token automatically.\n\n          For vendor API-key auth, approve a vendor with `Admin Make Vendor`, copy the returned `apiKey` into `vendorApiKey`, then run `Vendor API Key Auth`.\n\n          The frontend can call this after app refresh to restore the current user and check:\n\n          ```json\n          {\n            \"emailVerified\": false,\n            \"authTier\": \"tier_1\",\n            \"kycLevel\": 0\n          }\n          ```\n\n          `authTier` is the product access tier. New users start at `tier_1`.\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"phone\": \"08012345678\",\n              \"role\": \"user\",\n              \"referralCode\": \"TES1234\",\n              \"referredBy\": null,\n              \"isActive\": true,\n              \"emailVerified\": false,\n              \"authTier\": \"tier_1\",\n              \"kycLevel\": 0,\n              \"createdAt\": \"...\"\n            }\n          }\n          ```\n\n          ## Common Error\n\n          If token is missing, invalid, or expired:\n\n          ```json\n          {\n            \"message\": \"Invalid or expired token\"\n          }\n          ```\n      - info:\n          name: 7. Admin List Admins\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/admin/admins'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin List Admins\n\n          Returns all users with the `admin` role.\n\n          ## Endpoint\n\n          `GET /api/v1/admin/admins`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"admins\": [\n              {\n                \"id\": \"...\",\n                \"firstName\": \"Test\",\n                \"lastName\": \"Admin\",\n                \"username\": \"testadmin\",\n                \"email\": \"admin@example.com\",\n                \"phone\": \"08012345678\",\n                \"role\": \"admin\",\n                \"authTier\": \"tier_1\",\n                \"isActive\": true\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 8. Admin Make Admin\n          type: http\n          seq: 7\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/make-admin/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Make Admin\n\n          Upgrades an existing active user into an admin.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/make-admin/:userId`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## What Backend Does\n\n          - sets `role` to `admin`\n          - removes vendor API access if the user was previously vendor-related\n          - sets `isVendorActive` to `false`\n          - resets `discountRate` to `0`\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"User upgraded to admin successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"User\",\n              \"username\": \"testuser\",\n              \"email\": \"testuser@example.com\",\n              \"role\": \"admin\",\n              \"authTier\": \"tier_1\",\n              \"isActive\": true\n            }\n          }\n          ```\n      - info:\n          name: 9. Admin Remove Admin\n          type: http\n          seq: 8\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/admin/remove-admin/{{userId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Remove Admin\n\n          Removes the admin role from another admin and changes them back to a normal user.\n\n          ## Endpoint\n\n          `PATCH /api/v1/admin/remove-admin/:userId`\n\n          ## Authentication Required\n\n          Admin JWT only:\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Safety Rules\n\n          The backend will not allow:\n\n          - removing your own admin role\n          - removing the last active admin\n          - removing admin from a user who is not currently an admin\n\n          ## Expected Success Response\n\n          Status: `200 OK`\n\n          ```json\n          {\n            \"message\": \"Admin role removed successfully\",\n            \"user\": {\n              \"id\": \"...\",\n              \"firstName\": \"Test\",\n              \"lastName\": \"Admin\",\n              \"username\": \"testadmin\",\n              \"email\": \"admin@example.com\",\n              \"role\": \"user\",\n              \"authTier\": \"tier_1\",\n              \"isActive\": true\n            }\n          }\n          ```\n      - info:\n          name: 6. Refresh Mobile Session\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/refresh-session'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"refreshToken\": \"{{refreshToken}}\"\n              }\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                if (res.body && (res.body.accessToken || res.body.token)) {\n                  const accessToken = res.body.accessToken || res.body.token;\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"authToken\", accessToken);\n                  } else {\n                    bru.setVar(\"authToken\", accessToken);\n                  }\n                }\n                if (res.body && res.body.refreshToken) {\n                  if (typeof bru.setEnvVar === \"function\") {\n                    bru.setEnvVar(\"refreshToken\", res.body.refreshToken);\n                  } else {\n                    bru.setVar(\"refreshToken\", res.body.refreshToken);\n                  }\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Refresh Mobile Session\n\n          Use this after mobile PIN or biometric unlock.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/refresh-session`\n\n          ## Body Fields\n\n          `refreshToken`\n          Required. This is returned by `Login User` and should be stored securely by the mobile app.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Session refreshed successfully\",\n            \"token\": \"new-access-token\",\n            \"accessToken\": \"new-access-token\",\n            \"refreshToken\": \"new-refresh-token\",\n            \"session\": {\n              \"id\": \"...\",\n              \"expiresAt\": \"...\"\n            },\n            \"user\": {\n              \"id\": \"...\",\n              \"email\": \"user@example.com\"\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          The mobile app should verify PIN or biometric locally first. If local unlock succeeds, call this endpoint to get a fresh access token.\n\n          Store the new `refreshToken` returned by this endpoint. The backend rotates refresh tokens for better security.\n\n          If this endpoint returns `401`, send the user back to password login.\n      - info:\n          name: 6c. Logout Mobile Session\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/auth/logout'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"refreshToken\": \"{{refreshToken}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Logout Mobile Session\n\n          Logs out the current mobile session by revoking the refresh token.\n\n          ## Endpoint\n\n          `POST /api/v1/auth/logout`\n\n          ## Body Fields\n\n          `refreshToken`\n          Required. The refresh token returned by login or refresh session.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Logged out successfully\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          After logout succeeds, delete both tokens from secure storage:\n\n          - access token\n          - refresh token\n\n          The user must login with password again after logout.\n  - info:\n      name: Wallet\n      type: folder\n      seq: 2\n    docs:\n      content: |-\n        # Wallet Endpoints For Frontend\n\n        These are the wallet endpoints the app should use for a logged-in user.\n\n        ## What The User Sees\n\n        The user has two balances:\n\n        - `mainBalance`: money the user can spend on airtime, data, bills, cards, betting, and other services.\n        - `referralBalance`: referral rewards. This is not spendable directly.\n\n        To spend referral rewards, the user redeems them into `mainBalance`.\n\n        ## Suggested Frontend Flow\n\n        1. Call `Get Wallet` after login and on app refresh.\n        2. Call `Get Virtual Account`.\n        3. If there is no virtual account, show a `Create Account` button and call `Create Virtual Account`.\n        4. Show the virtual account details on the wallet funding screen.\n        5. As an alternative, let the user enter an amount and call `Create One-Time Funding Account`.\n        6. Tell the user to transfer money to the account shown.\n        7. When the user taps **I have transferred the money**, call `Confirm One-Time Funding Payment`.\n        8. If the response status is `paid`, update the wallet and transaction UI from the response.\n        9. If the response status is `pending`, show a waiting message and let the user try again after a few seconds.\n        10. After payment, refresh `Get Wallet` and `Get Transactions`.\n        11. If the user has enough referral balance, call `Redeem Referral Balance`.\n\n        The frontend should not call payment provider APIs directly.\n\n        ## Funding Fees\n\n        Funding charges are paid by the user.\n\n        The backend returns a `feePolicy` object so the frontend can show the fee clearly.\n\n        Example with `1%` fee:\n\n        - User transfers: `N2,000`\n        - Fee: `N20`\n        - Wallet receives: `N1,980`\n\n        For PocketFi permanent accounts, show the fee message before the user transfers.\n\n        For Monnify one-time accounts, show the exact `fee` and `amountToReceive` returned by the API.\n\n        ## Supported Funding Account Banks\n\n        The backend uses PocketFi as the wallet funding gateway.\n\n        The backend tries to create these funding accounts in this order:\n\n        1. `paga`\n        2. `kuda`\n\n        The app should display the accounts returned in `virtualAccount.accounts` or `virtualAccounts`.\n        If only one account is returned, show that one and let the user continue.\n\n        Each account includes `provider: \"pocketfi\"`.\n\n        ## Backend Setup Note\n\n        The backend uses PocketFi keys for provider API calls and webhook signature checks. The frontend should never receive any provider key.\n\n        ## One-Time Funding Account\n\n        The one-time funding account is powered by Monnify.\n\n        This is useful when the PocketFi account is unavailable or the user wants to fund a specific amount from a checkout-style screen.\n\n        It returns an `expiresAt` time. The frontend should use that value for the countdown.\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Get Wallet\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/wallet'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Wallet\n\n          Use this endpoint to show the user's wallet balances.\n\n          ## Endpoint\n\n          `GET /api/v1/wallet`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## When Frontend Should Call This\n\n          - after login\n          - when the wallet screen opens\n          - after the user funds their account\n          - after redeeming referral balance\n          - after paying for any service\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"wallet\": {\n              \"id\": \"...\",\n              \"currency\": \"NGN\",\n              \"mainBalance\": 5000,\n              \"referralBalance\": 1000,\n              \"balances\": {\n                \"main\": 5000,\n                \"referral\": 1000\n              }\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          Show `mainBalance` as the user's spendable balance.\n\n          Show `referralBalance` separately as rewards/cashback balance.\n      - info:\n          name: 2. Get Transactions\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/wallet/transactions'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          params:\n            - name: limit\n              value: '50'\n              type: query\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Transactions\n\n          Use this endpoint to show the user's wallet history.\n\n          ## Endpoint\n\n          `GET /api/v1/wallet/transactions`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Query Parameters\n\n          `limit`  \n          Optional. Number of transactions to return. Default is `50`, maximum is `100`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"transactions\": [\n              {\n                \"id\": \"...\",\n                \"type\": \"funding\",\n                \"walletType\": \"main\",\n                \"direction\": \"credit\",\n                \"amount\": 1980,\n                \"balanceBefore\": 0,\n                \"balanceAfter\": 1980,\n                \"currency\": \"NGN\",\n                \"reference\": \"PFI_...\",\n                \"provider\": \"pocketfi\",\n                \"status\": \"successful\",\n                \"narration\": \"Wallet funding via PocketFi virtual account\",\n                \"createdAt\": \"...\"\n              }\n            ]\n          }\n          ```\n\n          ## Frontend Notes\n\n          Use `direction` to decide the display style:\n\n          - `credit`: money came in\n          - `debit`: money went out\n\n          Use `walletType` to show whether it affected the main wallet or referral wallet.\n\n          For funding transactions, `amount` is the actual amount credited to the wallet after user-paid fees.\n\n          The app can ignore `provider`, `providerReference`, `metadata`, and raw IDs unless a screen specifically needs them.\n      - info:\n          name: 3. Create Virtual Account\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/virtual-account'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: '{}'\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create Virtual Account\n\n          Use this endpoint when a logged-in user does not yet have a wallet funding account.\n\n          This creates a permanent bank account number the user can transfer money into to fund their Billxpress wallet.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/virtual-account`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          No body fields are required.\n\n          The backend creates supported PocketFi funding accounts. Current order is `paga`, then `kuda`.\n\n          ## Important\n\n          The frontend does not need to send the user's name, phone, or email. The backend already gets those from the logged-in user's profile.\n\n          The user's saved phone number must be 11 digits and start with `0`, for example `08012345678`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Virtual account created successfully\",\n            \"virtualAccount\": {\n              \"id\": \"...\",\n              \"provider\": \"pocketfi\",\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (Billxpress)\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (Billxpress)\"\n                },\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"kuda\",\n                  \"accountNumber\": \"1234567890\",\n                  \"accountName\": \"Test User (Billxpress)\"\n                }\n              ],\n              \"feePolicy\": {\n                \"paidBy\": \"user\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"message\": \"Funding fee is 1% and is paid by the user. The wallet is credited with the amount after fee.\"\n              },\n              \"status\": \"active\"\n            }\n          }\n          ```\n\n          If the user already has a virtual account:\n\n          ```json\n          {\n              \"message\": \"Virtual account already exists\",\n              \"virtualAccount\": {\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (Billxpress)\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (Billxpress)\"\n                }\n              ],\n              \"feePolicy\": {\n                \"paidBy\": \"user\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"message\": \"Funding fee is 1% and is paid by the user. The wallet is credited with the amount after fee.\"\n              }\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          After success, show every item in `virtualAccount.accounts` on the funding screen. If `accounts` is empty for an older user, show the top-level `bankName`, `accountNumber`, and `accountName`.\n\n          `accountName` is the PocketFi account name formatted with `(Billxpress)` for display, so it matches what users see when transferring.\n\n          `feePolicy` tells the frontend what to show before the user transfers. If the user transfers `N2,000` and the fee is `1%`, the fee is `N20` and the wallet receives `N1,980`.\n      - info:\n          name: 4. Get Virtual Account\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/wallet/virtual-account'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Virtual Account\n\n          Use this endpoint to display the user's wallet funding account.\n\n          ## Endpoint\n\n          `GET /api/v1/wallet/virtual-account`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"virtualAccount\": {\n              \"id\": \"...\",\n              \"provider\": \"pocketfi\",\n              \"bankName\": \"paga\",\n              \"accountNumber\": \"0742053373\",\n              \"accountName\": \"Test User (Billxpress)\",\n              \"accounts\": [\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"paga\",\n                  \"accountNumber\": \"0742053373\",\n                  \"accountName\": \"Test User (Billxpress)\"\n                },\n                {\n                  \"provider\": \"pocketfi\",\n                  \"bankName\": \"kuda\",\n                  \"accountNumber\": \"1234567890\",\n                  \"accountName\": \"Test User (Billxpress)\"\n                }\n              ],\n              \"status\": \"active\"\n            }\n          }\n          ```\n\n          ## Common Error\n\n          If the user does not have a virtual account yet:\n\n          ```json\n          {\n            \"message\": \"Virtual account has not been created\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          If this returns `404`, show a button like `Create Funding Account`, then call `Create Virtual Account`.\n\n          Show the list in `virtualAccount.accounts`. It may contain Paga, Kuda, or both depending on what PocketFi returns.\n      - info:\n          name: 5. Redeem Referral Balance\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/referral/redeem'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"amount\": \"{{walletAmount}}\",\n                \"transactionPin\": \"1234\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Redeem Referral Balance\n\n          Use this endpoint when the user wants to move referral rewards into their main wallet.\n\n          This is not a bank withdrawal. It is like cashback becoming spendable balance inside the app.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/referral/redeem`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `amount`  \n          Required. Amount to move from referral wallet to main wallet.\n\n          `transactionPin`  \n          Required. User's 4-digit transaction PIN.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Referral earnings redeemed successfully\",\n            \"wallet\": {\n              \"mainBalance\": 6000,\n              \"referralBalance\": 0\n            },\n            \"transactions\": [\n              {\n                \"type\": \"referral_redeem\",\n                \"walletType\": \"referral\",\n                \"direction\": \"debit\",\n                \"amount\": 1000\n              },\n              {\n                \"type\": \"referral_redeem\",\n                \"walletType\": \"main\",\n                \"direction\": \"credit\",\n                \"amount\": 1000\n              }\n            ]\n          }\n          ```\n\n          ## Common Errors\n\n          Referral balance is below the minimum:\n\n          ```json\n          {\n            \"message\": \"Minimum referral redeem amount is 1000\"\n          }\n          ```\n\n          Wrong transaction PIN:\n\n          ```json\n          {\n            \"message\": \"Invalid transaction PIN\"\n          }\n          ```\n\n          Not enough referral balance:\n\n          ```json\n          {\n            \"message\": \"Insufficient wallet balance\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          Only show the redeem button when `referralBalance` is at least the minimum redeem amount.\n      - info:\n          name: 6. Create One-Time Funding Account\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/funding-intents'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"amount\": 2000\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create One-Time Funding Account\n\n          Use this when the user enters an amount and wants a temporary transfer account like a checkout screen.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/funding-intents`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## Body Fields\n\n          `amount`  \n          Required. Amount the user wants to transfer, in naira.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Funding account created successfully\",\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"provider\": \"monnify\",\n              \"providerReference\": \"MNF...\",\n              \"paymentReference\": \"MNFUND_...\",\n              \"accountNumber\": \"6023240261\",\n              \"accountName\": \"Billxpress Checkout\",\n              \"bankName\": \"SafeHaven MFB\",\n              \"amount\": 2000,\n              \"fee\": 20,\n              \"amountToReceive\": 1980,\n              \"feePolicy\": {\n                \"paidBy\": \"user\",\n                \"percent\": 1,\n                \"flat\": 0,\n                \"message\": \"Funding fee is 1% and is paid by the user. The wallet is credited with the amount after fee.\"\n              },\n              \"expiresAt\": \"...\",\n              \"status\": \"pending\",\n              \"createdAt\": \"...\"\n            }\n          }\n          ```\n\n          ## Frontend Notes\n\n          Show this like a checkout screen:\n\n          - countdown from `expiresAt`\n          - account number\n          - bank name\n          - account name\n          - amount\n          - fee\n          - amount to receive\n\n          If the user enters `N2,000` and the fee is `1%`, show:\n\n          - Amount entered: `N2,000`\n          - Fee: `N20`\n          - Amount to receive: `N1,980`\n\n          When the user taps **I have transferred the money**, call:\n\n          `POST /api/v1/wallet/funding-intents/:fundingIntentId/confirm`\n\n          Use the `fundingIntent.id` from this response as `:fundingIntentId`.\n\n          The frontend should not credit the wallet itself. The backend credits the wallet after Monnify confirms the payment through the webhook or the confirmation endpoint.\n      - info:\n          name: 7. Confirm One-Time Funding Payment\n          type: http\n          seq: 7\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/funding-intents/{{fundingIntentId}}/confirm'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Confirm One-Time Funding Payment\n\n          Use this endpoint for the **I have transferred the money** button.\n\n          ## Endpoint\n\n          `POST /api/v1/wallet/funding-intents/:fundingIntentId/confirm`\n\n          ## Authentication\n\n          Required.\n\n          ```txt\n          Authorization: Bearer {{authToken}}\n          ```\n\n          ## URL Params\n\n          `fundingIntentId`\n          Required. Use the `fundingIntent.id` returned by `POST /api/v1/wallet/funding-intents`.\n\n          ## Body\n\n          No body is required.\n\n          ## What This Does\n\n          The backend checks the payment status from Monnify. If Monnify confirms the transfer, the backend credits the user's wallet and creates the transaction history.\n\n          The frontend must not credit the wallet by itself.\n\n          ## If Payment Is Still Pending\n\n          ```json\n          {\n            \"message\": \"We have not received this transfer yet. Please wait a moment and try again.\",\n            \"status\": \"pending\",\n            \"alreadyProcessed\": false,\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"status\": \"pending\"\n            }\n          }\n          ```\n\n          Show a friendly waiting state and let the user try again after a few seconds.\n\n          ## If Payment Is Successful\n\n          ```json\n          {\n            \"message\": \"Payment confirmed and wallet credited\",\n            \"status\": \"paid\",\n            \"alreadyProcessed\": false,\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"status\": \"paid\",\n              \"amount\": 2000,\n              \"fee\": 20,\n              \"amountToReceive\": 1980\n            },\n            \"wallet\": {\n              \"mainBalance\": 1980,\n              \"referralBalance\": 0\n            },\n            \"transaction\": {\n              \"type\": \"funding\",\n              \"direction\": \"credit\",\n              \"amount\": 1980,\n              \"provider\": \"monnify\",\n              \"status\": \"successful\"\n            }\n          }\n          ```\n\n          Show success, update the wallet balance, and display the transaction.\n\n          ## If The Account Expired\n\n          ```json\n          {\n            \"message\": \"This funding account has expired. Please create a new funding account.\",\n            \"status\": \"expired\",\n            \"alreadyProcessed\": false,\n            \"fundingIntent\": {\n              \"id\": \"...\",\n              \"status\": \"expired\"\n            }\n          }\n          ```\n\n          Ask the user to create a fresh funding account.\n      - info:\n          name: Admin - Credit Referral Balance\n          type: http\n          seq: 92\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/wallet/admin/referral-credit'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"userId\": \"{{userId}}\",\n                \"amount\": \"{{walletAmount}}\",\n                \"narration\": \"Referral earning test credit\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin - Credit Referral Balance\n\n          This request is for admin/backend testing only.\n\n          This gives us a way to test `Redeem Referral Balance` before the full referral trigger is implemented.\n\n          The frontend user app should not call this endpoint.\n      - info:\n          name: Internal - PocketFi Webhook\n          type: http\n          seq: 90\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/webhooks/pocketfi'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: HTTP_POCKETFI_SIGNATURE\n              value: '{{pocketfiSignature}}'\n          body:\n            type: json\n            data: |-\n              {\n                \"reference\": \"provider-reference\",\n                \"amount\": 1000,\n                \"accountNumber\": \"0742053373\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Internal - PocketFi Webhook\n\n          PocketFi calls this endpoint after a user transfers money into their virtual account.\n\n          This is internal backend/provider traffic. The frontend should not call this endpoint.\n      - info:\n          name: Internal - Monnify Webhook\n          type: http\n          seq: 91\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/webhooks/monnify'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: monnify-signature\n              value: '{{monnifySignature}}'\n          body:\n            type: json\n            data: |-\n              {\n                \"eventType\": \"SUCCESSFUL_TRANSACTION\",\n                \"eventData\": {\n                  \"paymentReference\": \"MNFUND_...\",\n                  \"transactionReference\": \"MNF...\",\n                  \"amountPaid\": 2000,\n                  \"paymentStatus\": \"PAID\"\n                }\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Internal - Monnify Webhook\n\n          Monnify calls this endpoint when a one-time funding transfer is paid.\n\n          This is internal backend/provider traffic. The frontend should not call this endpoint.\n  - info:\n      name: Notifications\n      type: folder\n      seq: 3\n    docs:\n      content: |-\n        # Notification APIs\n\n        These endpoints let the app show in-app notifications, popup notifications after login, unread badges, and mobile push notifications.\n\n        This folder also includes admin notification endpoints because they belong to the notification system:\n\n        ```txt\n        POST /api/v1/admin/notifications\n        GET /api/v1/admin/notifications\n        ```\n\n        ## How Push Notifications Work\n\n        The React Native app must first get a push token from its push provider, then register it with the backend:\n\n        ```txt\n        POST /api/v1/notifications/devices\n        ```\n\n        After that, the backend can send push notifications when:\n\n        - admin creates an announcement\n        - wallet funding succeeds\n        - referral reward is credited\n        - future service purchase succeeds or fails\n\n        For v1, backend supports Expo push tokens with:\n\n        ```json\n        {\n          \"provider\": \"expo\"\n        }\n        ```\n\n        If the app uses bare React Native Firebase later, we can add FCM server delivery while keeping the same device-token endpoint.\n\n        ## Popup Notifications After Login\n\n        After login or app unlock, frontend can call:\n\n        ```txt\n        GET /api/v1/notifications/popup\n        ```\n\n        Show returned notifications as popup cards/modals. After displaying a popup, call:\n\n        ```txt\n        PATCH /api/v1/notifications/:notificationId/seen\n        ```\n\n        This prevents the same popup from showing repeatedly.\n\n        ## Read vs Seen\n\n        `seenAt` means the frontend has displayed the notification popup.\n\n        `readAt` means the user opened/read the notification in the notification center.\n      type: text/markdown\n    items:\n      - info:\n          name: 1. Register Device Token\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/notifications/devices'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"token\": \"ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]\",\n                \"provider\": \"expo\",\n                \"platform\": \"android\",\n                \"deviceName\": \"Samsung A15\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Register Device Token\n\n          The mobile app calls this after login when it gets a push notification token.\n\n          ## Endpoint\n\n          `POST /api/v1/notifications/devices`\n\n          ## Body Fields\n\n          `token`\n          Required. Push token from the mobile app.\n\n          `provider`\n          Use `expo` for Expo push tokens. Future options are `fcm` and `apns`.\n\n          `platform`\n          `android`, `ios`, `web`, or `unknown`.\n\n          `deviceName`\n          Optional. Friendly device name.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"message\": \"Device token registered successfully\",\n            \"device\": {\n              \"id\": \"...\",\n              \"provider\": \"expo\",\n              \"platform\": \"android\",\n              \"deviceName\": \"Samsung A15\",\n              \"isActive\": true\n            }\n          }\n          ```\n      - info:\n          name: 2. List Notifications\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/notifications?limit=20&page=1'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # List Notifications\n\n          Use this for the notification center screen.\n\n          ## Endpoint\n\n          `GET /api/v1/notifications`\n\n          ## Query Params\n\n          `page`\n          Optional. Defaults to `1`.\n\n          `limit`\n          Optional. Defaults to `20`. Maximum is `100`.\n\n          `status`\n          Optional. Use `unread` or `read`.\n\n          `type`\n          Optional. Filter by notification type.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"notifications\": [\n              {\n                \"id\": \"...\",\n                \"title\": \"Wallet funded successfully\",\n                \"message\": \"Your wallet has been credited with NGN 990.\",\n                \"type\": \"wallet_funding_success\",\n                \"priority\": \"normal\",\n                \"readAt\": null,\n                \"seenAt\": null,\n                \"createdAt\": \"...\"\n              }\n            ],\n            \"pagination\": {\n              \"page\": 1,\n              \"limit\": 20,\n              \"total\": 1,\n              \"pages\": 1\n            },\n            \"unreadCount\": 1\n          }\n          ```\n      - info:\n          name: 3. Popup Notifications\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/notifications/popup'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Popup Notifications\n\n          Call this after login or app unlock.\n\n          ## Endpoint\n\n          `GET /api/v1/notifications/popup`\n\n          ## Frontend Behavior\n\n          If this returns notifications, show them as popup messages.\n\n          After displaying each popup, call `Mark Notification Seen`.\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"notifications\": [\n              {\n                \"id\": \"...\",\n                \"title\": \"Scheduled maintenance\",\n                \"message\": \"Billxpress will be unavailable from 12am to 1am.\",\n                \"type\": \"admin_announcement\",\n                \"priority\": \"high\",\n                \"seenAt\": null\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 4. Unread Count\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/v1/notifications/unread-count'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Unread Count\n\n          Use this for notification badges.\n\n          ## Endpoint\n\n          `GET /api/v1/notifications/unread-count`\n\n          ## Expected Success Response\n\n          ```json\n          {\n            \"unreadCount\": 3\n          }\n          ```\n      - info:\n          name: 5. Mark Notification Read\n          type: http\n          seq: 5\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/notifications/{{notificationId}}/read'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Mark Notification Read\n\n          Use this when the user opens a notification.\n\n          ## Endpoint\n\n          `PATCH /api/v1/notifications/:notificationId/read`\n      - info:\n          name: 6. Mark Notification Seen\n          type: http\n          seq: 6\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/notifications/{{notificationId}}/seen'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Mark Notification Seen\n\n          Use this after frontend displays a popup notification.\n\n          ## Endpoint\n\n          `PATCH /api/v1/notifications/:notificationId/seen`\n\n          This prevents the same popup from showing again after login.\n      - info:\n          name: 7. Mark All Notifications Read\n          type: http\n          seq: 7\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/v1/notifications/read-all'\n          headers:\n            - name: Authorization\n              value: Bearer {{authToken}}\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Mark All Notifications Read\n\n          Use this for a notification center \"mark all as read\" action.\n\n          ## Endpoint\n\n          `PATCH /api/v1/notifications/read-all`\n      - info:\n          name: 8. Remove Device Token\n          type: http\n          seq: 8\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/v1/notifications/devices'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"token\": \"ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]\"\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Remove Device Token\n\n          Use this on logout or when the app disables push notifications.\n\n          ## Endpoint\n\n          `DELETE /api/v1/notifications/devices`\n      - info:\n          name: 9. Admin Create Notification\n          type: http\n          seq: 9\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/v1/admin/notifications'\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Authorization\n              value: Bearer {{authToken}}\n          body:\n            type: json\n            data: |-\n              {\n                \"target\": \"user\",\n                \"userId\": \"{{userId}}\",\n                \"title\": \"Welcome to Billxpress\",\n                \"message\": \"Your account is ready. You can now fund your wallet and start using services.\",\n                \"type\": \"admin_announcement\",\n                \"channel\": \"both\",\n                \"priority\": \"normal\",\n                \"data\": {\n                  \"screen\": \"wallet\"\n                }\n              }\n          auth:\n            type: bearer\n            token: '{{authToken}}'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Create Notification\n\n          Admin creates an in-app notification and optional push/email notification.\n\n          ## Endpoint\n\n          `POST /api/v1/admin/notifications`\n\n          ## Authentication\n\n          Admin JWT required.\n\n
